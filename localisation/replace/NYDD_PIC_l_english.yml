l_english:


FRA_ANGLOS_NAME:"Angleterre"
FRA_ANGLOS_NAME_ADJ:"Anglois"

NYDD_PIC_my_wish_title:"As I Wish"
NYDD_PIC_my_wish_desc:"As we wish. Under the reactionary actions of the so-called Association for the Revival of France, all the nobles of France, great and small, have united. Though each harbors their own agenda, our current goal is one and the same: overthrow the military junta, and let France belong to the nobility!"
NYDD_PIC_britany_title:"The General Weeps"
NYDD_PIC_britany_desc:"I have heard that the old codger in Brittany constantly indulges in fantasies about a certain holy maiden, leaving him melancholy. I shall grant you release forthwith."

NYDD_PIC_my_wish_modifier:"Heaven’s Mandate"
desc_NYDD_PIC_my_wish_modifier:"All is proceeding according to plan."
NYDD_PIC_britany_tt:"We shall decide how to rule §YBrittany§!, whether to §MFrankify§! them, or §Ykeep them as they are§!.\n"
NYDD_PIC_britany_modifier:"Francophone Court"
desc_NYDD_PIC_britany_modifier:"Yes, you too shall learn."

NYDD_PIC_bloody_paris_title:"The Bloody Night of Paris"
NYDD_PIC_bloody_paris_desc:"What happened in Paris? What does it have to do with us? Why must my mission be blocked, ahhhhhhhhh."
NYDD_PIC_no_hate_title:"No Room for Resentment"
NYDD_PIC_no_hate_desc:"Capet, this is the path you chose for yourself. You must walk it to the end, even if weeping and wailing."
NYDD_PIC_long_night_ending_title:"Long Night Ends in Embers" # The Long Night Ends in Embers
NYDD_PIC_long_night_ending_desc:"Every night gives way to dawn; we shall soon have our day. Yet the night has been far too long."
NYDD_PIC_smash_charter_title:"Tear Up the Magna Carta"
NYDD_PIC_smash_charter_desc:"Who signed this? Certainly not me. Tear it up, and be done with it. NBCS."

NYDD_PIC_bloody_paris_ttt:"§YThis mission will be completed automatically after @FRA[FRA.GetName]’s opening event chain concludes.\n§!"
NYDD_PIC_no_hate_modifier:"Accumulating Strength in Haste"
desc_NYDD_PIC_no_hate_modifier:"Consolidate gains, advance steadily."
NYDD_PIC_no_hate_tt:"§Y[Root.GetName]§! loses §G-50§! aggressive expansion.\n"
NYDD_PIC_bloody_paris_tt:"We need only wait for the opportune moment…"
NYDD_PIC_my_wish_ttt2:"The §YAssociation for the Revival of France§! holds sole power in @FRA§Y[FRA.GetName]§!."
NYDD_PIC_no_hate_ttt2:"@FRA§Y[FRA.GetName]§! has chosen §YMalcolm§! as its ruler."
NYDD_PIC_public_union_ttt2:"@FRA§Y[FRA.GetName]§! has chosen the §YYoung Prince§! as its ruler."
NYDD_PIC_smash_charter_tt:"£icon_ideas£ National idea III '§YThe Lesson of the Magna Carta§!' will be replaced with '§YCommand the Channel§!', with the following effects:\nTrade Efficiency: §G+20.0%§!\n"
NYDD_PIC_smash_charter_modifier:"Integrate English Merchants"
desc_NYDD_PIC_smash_charter_modifier:"The English merchants have decided that the wise man adapts to circumstances and shall assist us in trade."

NYDD_PIC_public_union_title:"The Public Weal"
NYDD_PIC_public_union_desc:"To counter the centralization efforts in Paris, the dukes have decided to gather, share a fine cask of wine, and discuss matters of the realm."
NYDD_PIC_starlight_title:"Homeward Bound Star" # The Night-Sailing Star Homeward Bound
NYDD_PIC_starlight_desc:"The time in my homeland that I thought forever lost—I have reclaimed it. O night-sailing star, so far from home, when will you return?"
NYDD_PIC_long_road_title:"A Long Road Finds Its End" # The Long Road Finds Its End
NYDD_PIC_long_road_desc:"A long road, yet it finally finds its end.\n\nWhat was lost shall return. Our forebears lost everything on the battlefield, and we shall reclaim it all upon it.\n\nNow Capet’s homeward journey has reached its conclusion. Will the fluttering fleurs-de-lis pause for us?\n\nWhat follows, is your path."

NYDD_PIC_public_union_ttt:"This country is a member of the §YPublic Weal§!.\n"
NYDD_PIC_public_union_tt:"For every member of the §YPublic Weal§!, we gain:"
NYDD_PIC_public_union_tt2:"\n§YPublic Weal§! members also receive this reward.\n"

NYDD_PIC_new_friend_or_old_enemy_title:"New Friend, Old Foe"
NYDD_PIC_new_friend_or_old_enemy_desc:"The Duke of Champagne was once irreconcilable with us, simply because we happened to be neighbors. As everyone knows, neighbors are often the targets of expansion, hence the irreconcilability. But now the fate of France hangs in the balance—truly a moment of life and death. Let us unite! Only then is there a glimmer of hope."
NYDD_PIC_homecoming_title:"Eager to Return"
NYDD_PIC_homecoming_desc:"Just like university students awaiting their holiday, we yearn to return to Paris, from which we have been parted so long. We wish to depart at once, and arrive at Paris’s doorstep by tomorrow."
NYDD_PIC_octania_title:"Occitania Reclaimed"
NYDD_PIC_octania_desc:"Our Occitan compatriots have such poor manners, defecting to the Empire at the slightest disagreement. Fear not, we old French comrades shan’t devour you."

NYDD_PIC_homecoming_modifier:"Widespread Unease"
desc_NYDD_PIC_homecoming_modifier:"Troubling rumors are spreading through Paris."
NYDD_PIC_new_friend_or_old_enemy_tt:"When we form the §YPublic Weal§!, @CHP§Y[CHP.GetName]§! will join it.\n"
NYDD_PIC_new_friend_or_old_enemy_tt2:"@CHP§Y[CHP.GetName]§! will join the §YPublic Weal§!.\n"
NYDD_PIC_new_friend_or_old_enemy_tt3:"£yes£ As we have already completed the mission '§YNew Friend, Old Foe§!', @CHP§Y[CHP.GetName]§! will join the §YPublic Weal§!.\n"
NYDD_PIC_new_friend_or_old_enemy_tt4:"We shall endeavor to persuade @CHP§Y[CHP.GetName]§!’s duke to pass his title to a relative, thereby preventing @FRA§Y[FRA.GetName]§! from §Rinheriting§! @CHP§Y[CHP.GetName]§!.\n"
NYDD_PIC_octania_modifier:"Reclaim the South"
desc_NYDD_PIC_octania_modifier:"With the southern provinces returned to the fold, France is at last united."

NYDD_PIC_no_one_is_island_title:"A Crumbling Roof" # Under a Crumbling Roof
NYDD_PIC_no_one_is_island_desc:"Before France sweeps us aside, we had best sweep France aside and become ourselves again."
NYDD_PIC_super_bad_boy_title:"Wipe the Slate Clean"
NYDD_PIC_super_bad_boy_desc:"Our generations-old feud with the Duke of Champagne is about to end. Naturally, this is because the Duke of Champagne is no more, not because we have met a worthy end."
NYDD_PIC_empire_help_title:"Approach the Empire"
NYDD_PIC_empire_help_desc:"The might of France terrifies me. I must seek aid from the Holy Roman Emperor at once."
NYDD_PIC_lorrine_title:"Lorraine Restored"
NYDD_PIC_lorrine_desc:"Alas, how wicked the Holy Roman Emperor is, seizing the opportunity to invade Lorraine—our sacred and inseparable territory since time immemorial. We must strike back with force and reclaim Lorraine."

NYDD_PIC_no_one_is_island_tt:"§Y[Root.GetName]§! gains §Ypermanent claims§! on all provinces held by @FRA§Y[FRA.GetName]§!’s §Yappanage§! subjects.\n"
NYDD_PIC_no_one_is_island_modifier:"A Ducal Island"
desc_NYDD_PIC_no_one_is_island_modifier:"The Duchy of Picardy under Capet rule is far from the seat of power in Paris, and no one pays it any mind."
NYDD_PIC_super_bad_boy_modifier:"Integrate Ducal Lands"
desc_NYDD_PIC_super_bad_boy_modifier:"Taking the first step toward expansion."
NYDD_PIC_lorrine_modifier:"Frontier Defense"
desc_NYDD_PIC_lorrine_modifier:"Lorraine taught us one thing: always guard your borders."

NYDD_PIC_empire_help_tt:"This event allows us to abandon §YLorraine§! or join the §YHoly Roman Empire§! in exchange for the Emperor’s support.\n\nIf §Y[Root.GetName]§! is an independent nation or the §YHoly Roman Empire§! has been dissolved, this event will not trigger.\n"

NYDD_PIC_netherland_title:"The Long Dike Across the Sea"
NYDD_PIC_netherland_desc:"The lengthy Low Countries coastline is the wealthiest region in all the Holy Roman Empire. Yet of late, the people of the Low Countries have grown restless. Let us extend a helping hand to them."
NYDD_PIC_italy_title:"Mountains and Distant Roads"
NYDD_PIC_italy_desc:"Italy is too far for the Holy Roman Emperor, who often rules from Germany, but it lies close to us. We shall cross the Rubicon and rule these subjects in the Emperor’s stead."
NYDD_PIC_north_german_title:"No Man’s Land"
NYDD_PIC_north_german_desc:"Me thinks no one wants this part of North Germany anyway."
NYDD_PIC_south_german_title:"Heart of the Empire"
NYDD_PIC_south_german_desc:"Since the founding of the Holy Roman Empire, South Germany has been its core. If the Emperor cannot restrain his subjects, then let us discipline them instead."
NYDD_PIC_holy_roma_title:"Emperor Beyond Fate"
NYDD_PIC_holy_roma_desc:"As time passed, our realm reached heights beyond any imagining. The former princes, all at once, now flock to acclaim our ruler to take up the scepter of the Holy Empire and become the honored Emperor ruling over all realms."

NYDD_PIC_netherland_modifier:"Monopolize Low Countries Trade"
desc_NYDD_PIC_netherland_modifier:"Trade in the Low Countries is prosperous, and we have great need of it."
NYDD_PIC_italy_modifier:"Italian Possessions"
desc_NYDD_PIC_italy_modifier:"As we conquer Italy, the royal house shall be cultivated by Italian humanist thought."
NYDD_PIC_italy_tt:"For each province in a §Mmission requirement§! region that meets the §Mdiplomatic§! condition, we gain §G1§! imperial authority.\n"
NYDD_PIC_north_german_modifier:"Black Eagle Legions"
desc_NYDD_PIC_north_german_modifier:"The Germanic peoples of North Germany are valiant warriors. Let us harness their strength."
NYDD_PIC_south_german_modifier:"The Capetian Touch"
desc_NYDD_PIC_south_german_modifier:"The mighty hand of Capet—if you know, you know."
DD_FRA_mission_50_PP:"The Unforeseen Holy Empire"

NYDD_PIC_netherland_ttt:"Provinces in the §YLow Countries§! region:\n At least one of the following conditions must be met:\n - Belongs to §Y[Root.GetName]§! or its non-tributary subjects\n - §Y[Root.GetName]§! is the §YHoly Roman Emperor§!, the province owner is part of the §YHoly Roman Empire§!, and is §Mallied§! to §Y[Root.GetName]§! or has §G100§! opinion"
NYDD_PIC_italy_ttt:"Provinces in the §YItaly§! region:\n At least one of the following conditions must be met:\n - Belongs to §Y[Root.GetName]§! or its non-tributary subjects\n - §Y[Root.GetName]§! is the §YHoly Roman Emperor§!, the province owner is part of the §YHoly Roman Empire§!, and is §Mallied§! to §Y[Root.GetName]§! or has §G100§! opinion"
NYDD_PIC_north_german_ttt:"Provinces in the §YNorth Germany§! region:\n At least one of the following conditions must be met:\n - Belongs to §Y[Root.GetName]§! or its non-tributary subjects\n - §Y[Root.GetName]§! is the §YHoly Roman Emperor§!, the province owner is part of the §YHoly Roman Empire§!, and is §Mallied§! to §Y[Root.GetName]§! or has §G100§! opinion"
NYDD_PIC_south_german_ttt:"Provinces in the §YSouth Germany§! region:\n At least one of the following conditions must be met:\n - Belongs to §Y[Root.GetName]§! or its non-tributary subjects\n - §Y[Root.GetName]§! is the §YHoly Roman Emperor§!, the province owner is part of the §YHoly Roman Empire§!, and is §Mallied§! to §Y[Root.GetName]§! or has §G100§! opinion"



DD_PIC_1_t:"The Long Dark Night"
DD_PIC_1_d:"It has been over a century since that great catastrophe. The Capetian king fell in battle on the fields of Poitou, and the Governor of Anjou seized the opportunity to claim the fleur-de-lis throne that rightfully belonged to Capet. Yet the House of Anjou paid dearly for their usurpation. Since then, France has been plunged into a dark age, which later generations have come to call the 'Century of Chaos.’ We, the last surviving Capetian bloodline, wandered in displacement to Picardy, far from Paris, watching the future of France in a daze, trembling with apprehension.\n\nBut someone has torn through the darkness, letting sunlight shine into the gloomy lands of Picardy. According to reliable intelligence, France is about to witness a terrible, bloody strife. Perhaps we were wrong all along—sitting idly by, content with a corner of the land, is merely placing the noose around our own necks. Fate can only be seized by the Capets themselves. This may well be our final chance—a hope to see Capet return to Paris. Even if we must tread through countless mountains of corpses and seas of blood, we shall triumph and plant our banner in Paris."
DD_PIC_1a:"Fifty years of life is but a dream; what matters not is the fleeting days and nights."
DD_PIC_1a_tt:""
DD_PIC_1a_modifier:"Capetian Resolve"
desc_DD_PIC_1a_modifier:"The best opportunity still awaits me."

DD_PIC_2_t:"The Bloody Night of Paris"
DD_PIC_2_d:"The king is dead. He did not fall on the battlefield, nor to the fires of rebellion or the schemes of enemies—he died in his own bed.\n\nWhen this news reached Picardy, [Root.Monarch.GetName] showed no surprise. All unfolded as he had foreseen. The one who would now dominate France was but a fledgling youth, who would have no energy to spare for the appanages for the time being.\n\n[Root.Monarch.GetName] clutched his quill, swiftly penning letter after letter to every name and ally he could think of. Though it was still spring, he felt as though he had plunged into an icy abyss. For the throne of France, for the glory of Capet, how much time did he have left? How much remained to be done? The sword of Damocles hung high above his head."
DD_PIC_2_d2:"The king is dead. He did not fall on the battlefield, nor to the fires of rebellion or the schemes of enemies—he died in his own bed.\n\nWhen this news reached Picardy, [Root.Monarch.GetName] showed no surprise. All unfolded as he had foreseen. The one who now dominated France was a cunning old fox, willing to abandon the centralization his ancestors had so fervently pursued just to secure his throne, generously and foolishly granting ever more privileges to the nobles.\n\n[Root.Monarch.GetName] clutched his quill, hesitating. Every name and every ally he could think of seemed susceptible to being bought off by the crown. Though it was still spring, he felt as though he had plunged into an icy abyss, a deep sense of powerlessness overwhelming him. With matters having come to this, he could only abandon any illusions of alliance and attempt to seize the throne of France by force."
DD_PIC_2_d3:"The king is dead. He did not fall on the battlefield, nor to the fires of rebellion or the schemes of enemies—he died in his own bed.\n\nWhen this news reached Picardy, [Root.Monarch.GetName] was genuinely astonished. Unexpectedly, the one who now dominated France was a bewildered widow, yet everyone knew in their hearts that the true power lay with a secret organization called the Association for the Revival of France. General Millet, the Association’s leader, had decided to subjugate the appanages by force, and a bloody storm was about to sweep across France.\n\n[Root.Monarch.GetName] clutched his quill, swiftly penning reply after reply. Letters of alliance arrived like falling snowflakes, as the nobles, each feeling imperiled, debated how to drive these officers from power. Though it was still spring, he felt a restless agitation. For the throne of France, for the glory of Capet, he had no other choice."
DD_PIC_2a:"We have nothing left but desperation, courage, and blood."
DD_PIC_2a_tt:"@FRA§Y[FRA.GetName]§! is expected to launch an offensive within a few months. It would be best for us to preemptively seize control of §YParis§!.\n"
DD_PIC_2a_modifier:"Preparations for the Advance"
desc_DD_PIC_2a_modifier:"Charge!"
DD_PIC_2a_tt2:"With @FRA§Y[FRA.GetName]§!’s new king §Y[FRA.GetName]§! devolving power to the great nobles, we have no choice but to fight for ourselves.\n"
DD_PIC_2a_modifier2:"Standing Alone"
desc_DD_PIC_2a_modifier2:"We have no other choice."
DD_PIC_2a_tt3:"Once the §YPublic Weal§! is formed, we will unlock the decision '§YPublic Weal War§!', allowing us to declare war on @FRA§Y[FRA.GetName]§! when ready.\n"
DD_PIC_2a_modifier3:"Forging Broad Alliances"
desc_DD_PIC_2a_modifier3:"Win over every ally that can be won."

DD_PIC_3_t:"The Royal House"
DD_PIC_3_d:"The gates of the royal capital stood wide open. In days past, the wind could not penetrate Paris. The broad Seine and the towering city walls kept everything at bay. All of France yearned to surge into its capital—but leaving Paris was easy; returning was the true trial.\n\nAs difficult as scaling the heavens, [Root.Monarch.GetName] mused, seated in a carriage slowly making its way out of the city. Embroidered upon the carriage was the elegant, noble fleur-de-lis, accompanied by proud knights mounted on lofty steeds. Flanking the city gates stood ranks of armored city guards in solemn stillness, and trailing behind the procession were cheering citizens casting roses into the air—yet a century ago, it had been otherwise. A hundred years past, along this desolate dirt road trudging toward distant lands, there had been only a defeated host, having lost both kingdom and territory; a royal dynasty at its end, reviled by ten thousand; a pack of mongrels abandoned by all.\n\nMoments later, the long-familiar royal palace appeared at the far end of the thoroughfare. [Root.Monarch.GetName] passed the battle-worn soldiers, passed the trembling ministers bowed in reverence, passed the banners dancing in the wind, passed the assembled nobles crying out in acclaim—at last, yet another King of France from the House of Capet laid his hands once more upon the throne of the fleur-de-lis.\n\n‘Long live the king!’ The roaring voice, like a surging tide, once again swept through the royal hall, heralding the return of a true royal house."
DD_PIC_3a:"Capet has returned."
DD_PIC_3a_tt:"@FRA§Y[FRA.GetName]§! will abandon their lands in the §YFrance§! region and flee to Britain.\n\n§Y[Root.GetName]§! gains all provinces in the §YFrance§! region previously held by @FRA, along with their §Gautonomous cores§!.\n\nAll subjects of @FRA§Y[FRA.GetName]§! will be released. Those that are §Mallied§! to us or are §Ymembers of the Public Weal§! will become our §Yappanages§!.\n\nIf @LOR§Y[LOR.GetName]§! exists and the §YHoly Roman Empire§! has not been dissolved, they will become a §Yvassal§! of the §YEmperor§!.\n"
DD_PIC_3a_tt2:"£yes£ As we previously promised to relinquish §YLorraine§!, we will lose our claims on the §YLorraine§! region. If we hold §YLorraine§!, it will be ceded to the §YEmperor§!.\n"
DD_PIC_3a_tt3:"£yes£ As we previously promised to join the §YHoly Roman Empire§!, §Y[Root.GetName]§! and all its subjects will become part of the §YHoly Roman Empire§!.\n"
DD_PIC_3a_modifier:"King of Paris"
desc_DD_PIC_3a_modifier:"It has been far too long—Paris, how we have missed you."

DD_PIC_4_t:"The Rebellious King"
DD_PIC_4_d:"Louis's life was filled with countless regrets: regretting letting his father control him in his youth, regretting giving up the girl he loved for the sake of an arranged marriage, regretting remaining silent when his elder brother and nephew were exiled by his father. He was afraid—afraid to question his own heart in the countless dusks and deep nights. He was remorseful—remorseful for failing to seize every opportunity that had once been within his grasp.\n\nThus, there was only one thing he was determined not to miss: the day when Capet would reclaim what was rightfully theirs. He felt shame before his brother, shame before his kin, shame before his ancestors and the kings who came before him—for he had let Capet wallow in humiliation day and night. Therefore, Louis devoted his entire life to planning this great rebellion. Even if his own days were numbered, his descendants would carry on this monumental endeavor—\n\nNow, the true king of this realm, the rightful master of France, was about to reclaim his inheritance and unleash this great insurrection to save the kingdom. The usurper would fall, the traitors would be put to the sword, the defeated would become mere footnotes in the history of France, and the victor would reign."
DD_PIC_4a:"Fight until only one remains."
DD_PIC_4a_modifier:"The Grand Rebellion"
desc_DD_PIC_4a_modifier:"Launch the Grand Rebellion against Anjou!"
DD_PIC_5_t:"Seek Aid from the Empire?"
DD_PIC_5_d:"We may not be able to stand against the wicked Angevin kings on our own. The Holy Roman Emperor styles himself King of France, and he will surely seek to extend his influence into northern France. Take, for instance, the Duke of Lorraine, who has been quiet of late. Given his position on the border, we have reason to suspect he maintains close ties with the Empire. But should we do the same? Should we sell the interests of France to the Emperor, all for our own sake?"
DD_PIC_5a:"Relinquish our claims on Lorraine…?"
DD_PIC_5b:"Trust that the Emperor wishes to rule all of France…?"
DD_PIC_5c:"We can only rely on ourselves."
DD_PIC_5a_tt:"£yes£ If the §YEmperor§! §Gagrees§!, we will skip the mission '§YLorraine Restored§!' and gain:"
DD_PIC_5b_tt:"£yes£ If the §YEmperor§! §Gagrees§!, after gaining independence we will join the §YHoly Roman Empire§!. The Imperial incident '§YFrance and the Empire§!' will no longer trigger. We will also gain:"
DD_PIC_5a_modifier:"Imperial Aid"
desc_DD_PIC_5a_modifier:"The Empire has graciously agreed to lend us its support."
DD_PIC_6_t:"Secret Letter from [From.GetName]"
DD_PIC_6_d:"An envoy from [From.GetName] has arrived at court, proposing to exchange Lorraine for the Empire’s support."
DD_PIC_6a:"That sounds agreeable."
DD_PIC_6b:"But I refuse."
DD_PIC_6a_tt:"We will support §Y[From.GetName]§! in their conspiracy against @FRA§Y[FRA.GetName]§!. In return, §Y[From.GetName]§! will relinquish their claims on §YLorraine§!, which also means their related mission will be bypassed.\n"

DD_PIC_7_t:"Secret Letter from [From.GetName]"
DD_PIC_7_d:"An envoy from [From.GetName] has arrived at court, seeking the Empire's support to rebel against France. Should they succeed, [From.GetName] will join the Holy Roman Empire."
DD_PIC_7a_tt:"We will support §Y[From.GetName]§! in their conspiracy against @FRA§Y[FRA.GetName]§!. In return, §Y[From.GetName]§! will join the §YHoly Roman Empire§! after gaining independence. Additionally, the Imperial incident '§YFrance and the Empire§!' will no longer trigger.\n"
DD_PIC_8_t:"[From.GetName] Agrees to Aid"
DD_PIC_8_d:"The Holy Roman Emperor has secretly agreed to lend us aid. In exchange, we need only pay a small, insignificant price…"
DD_PIC_8a:"This is a necessary evil."
DD_PIC_9_t:"[From.GetName] Refuses Aid"
DD_PIC_9_d:"The Holy Roman Emperor has refused to lend aid. The envoy insists it is not in the Empire's interest."
DD_PIC_9a:"Very well. We must rely on ourselves."
DD_PIC_10_t:"Capet in the Dungeon"
DD_PIC_10_d:"In the gloom and damp of the dungeon, beyond the skittering whispers of rats, the crackling of burning torches, and the mad ramblings of prisoners lost to darkness, there was only the silence of death. Thus, to the man who spent his days curled silently in the corner, the approaching footsteps were particularly jarring.\n\nTap, tap, tap.\n\nThey were not the worn, flat cloth shoes of the gaoler, nor the dull, heavy iron boots of a knight, but the elegant, supple heeled boots of a nobleman. Likely an envoy come to announce the execution. The man waited calmly, listening to the distinct footfalls drawing nearer in the gloom.\n\nYet beyond the iron bars, a face appeared—both familiar and foreign. It took the man several moments, searching through memories he had long since wished to forget, to recall who stood before him. Uncle. The uncle who had watched him and his father as they were driven into exile—grieving, seething with anger, torn by conflict, yet silent.\n\n'Charles,' the rusty iron gate groaned as the door, which had once symbolized death itself, slowly swung open. 'It has been a long time.'"
DD_PIC_10a:"'Are you willing… to believe in this name once more?'"
DD_PIC_10b:"'You have suffered much, my child.'"
DD_PIC_11_t:"Capet Returns"
DD_PIC_11_d:"In the bloody battle of Poitou a century ago, we lost half a nation, half a people, and the entire throne. The traitors fell upon us, devouring our flesh, carving up our inheritance, and usurping the seat of the fleur-de-lis. The realm convulsed; snakes and rats scurried freely. The heir of the Franks, the master of Europe, saw its great edifice crumble in a single night—a giant fell, an era came to an end.\n\nAnd now, the House of Capet has once again defeated its enemies, once again vanquished the usurpers who laid false claim to the throne, once again saved France from war, chaos, and division. The shattered kingdom is at last reunited under a true King of France. The Gallic roars of the lion echo across the world, proclaiming that a truly sacred bloodline has at last returned to the throne of Paris."
DD_PIC_11a:"The Usurper falls, Capet returns!"
 #
DD_PIC_11a_tt:"Thank you for playing @PIC§YPicardy§!!\n"
DD_PIC_11a_modifier:"King of the Fleur-de-Lis"
desc_DD_PIC_11a_modifier:"Capet is divine."
DD_PIC_12_t:"The Victor Reigns"
DD_PIC_12_d:"Never had anyone imagined that a King of France would become the Holy Roman Emperor, yet fate ever delights in mocking the world. We are far from the destined emperor the Empire foresaw—we are the vanquished whose chariots were overturned, the king cast from his throne and driven far westward—yet here we stand, holding high the sword of destiny in the name of King of France and Germany.\n\nWith the fall of the Hohenstaufen’s overweening hegemony, the German princes sought a new protector. As the defender of Christendom, the eldest son of the Church, the Sword of Christ, we have unassumingly taken up this burden and become Emperor of the Romans. Just as our forebear Charlemagne did before us, the newborn France shall defend Christendom and bear the weight of the Roman crown. As the Empire once believed—"
DD_PIC_12a:"The vanquished fall, and the victor reigns."
DD_PIC_13_t:"Clear Skies Along the Bank"
DD_PIC_13_d:"Charles leaned on his cane, supported as he walked along the riverbank at dusk. The sun was setting, the waters gleamed pale, and candlelight rose from both shores, its glow dancing and frolicking across the river’s surface. The evening path along the embankment left the two of them more intoxicated than any wine; a faint rosy blush, matching the setting sun, lightly colored their faces.\n\nSilence. So quiet that one could hear the sound of silence itself. Behind the wind, more wind; above the sky, more sky; ahead of the road, more road.\n\nIn the still shadows of the night, he turned to look at the one beside him.\n\nShe wore a white gown, standing on a slope near the riverbank. The satin ribbon at her waist fluttered in the gentle breeze, and the sunset-hued satin of the sky danced upon her flowing skirts. The sheer fabric swayed contentedly in the wind. Dusk no longer felt melancholy; amid the deep crimson, the blue-ochre evening sky sparkled with scattered stars.\n\n‘You seem happy?’ Charles could not help but ask.\n\n‘Yes. I’m glad you’ve returned.’ She nodded, radiant smiles spilling endlessly from her eyes, narrowed just enough to contain them. ‘The starry skies I love, the shores I love, and…’ The girl suddenly stopped, her face, tinged with vermillion, growing warm. She could not see herself, but surely others could—and with that thought, the crimson of dusk deepened even further.\n\nOn the journey back.\n\nThe sunset had fully faded. The early moon hung like a faint kiss-mark. The dim nightscape beyond the carriage blurred and vanished behind them, and the girl on his right had drifted into a gentle sleep. Her forehead rested against the edge of the seatback, leaning softly upon his shoulder. Charles reached out to brush away a strand of hair from her brow, but his hand was caught mid-air—\n\nTheir heartbeats seemed to drum against their ribs; the bashful blush did not fade. Charles could feel, against his shoulder and the side of his face, the girl’s soft breath, warm against his ear, against his cheek."
DD_PIC_13a:"‘Caught you,’ Sylvie breathed, her voice like fragrant air. ‘Brother.’"
DD_PIC_13a_modifier:"A Life of Happiness"
desc_DD_PIC_13a_modifier:"Such an unusual love story, unlike any before."
