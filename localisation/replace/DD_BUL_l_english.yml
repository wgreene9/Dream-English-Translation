l_english:
BU1:0 "Tarnovo"
BU1_ADJ:0 "Tarnovan"
DD_BUL_Gorko_ruler_modifier:0 "Stoyan's Indomitability"
DD_BUL_support_of_Bogomilists:0 "Aid of the Bogomils"
DD_BUL.0.t:0 "Restless Serfs"
DD_BUL.0.d:0 "A lowly stable hand shattered a tax collector's skull with a rock, then fled into the night. This should have been but a minor disturbance, a local incident easily brushed aside.\n\nYet, we were wrong.\n\nThis Stoyan, called "Gorko", was not fleeing – he was sowing. When he appeared before the walls of Tarnovo, wielding that blood-stained heavy axe, the beasts of burden, who usually only bowed their heads and grubbed in the dirt, seemed seized by some malignant fervor. They no longer scattered before the charge of heavy cavalry, but hurled their bodies against the shield walls, seeking gaps in the armor with pitchforks and tools.\n\nLast night, Tarnovo fell. The garrison within couldn't even close the inner portcullis before being overwhelmed by former serfs, weavers, and priests. The Baron's head was hoisted upon the very mast where his banner once flew, a mockery of all established order.\n\nThis is no longer a revolt. This is a plague – a plague born from the soil, feeding on resentment. The fall of Tarnovo is only the beginning. In Dobruja, deep in the valleys and mountains, the Bulgarians are refusing to be silent. And those always-compliant, yet craven, Boyars can no longer maintain order."
DD_BUL.0.a:0 "Those damned Bulgarians!"
DD_BUL.1.t:0 "Day of Shattered Shackles"
DD_BUL.1.d:0 "Stoyan was born in a remote village at the foot of the Rila Mountains. From a young age, to survive, he became a servant for the local Latin lord's hunt – feeding the knights' horses, cleaning their tack, and sometimes ringing the bell at the local church. In his memory, his homeland was once beautiful; the fertile lands by the Maritsa River, the bustling markets, should have raised strong youths. But all that is in the past.\n\nWhen the Latin tax collectors tried to forcibly take the village's last plow ox and shackled the protesting priest with heavy chains, the long-silent populace erupted in a moment of chaos. The Latin horsemen trampled through, turning the village to ash. The surviving children were strung together with chains, driven like cattle to the dungeons of Tarnovo for culling. Generation after generation, the Latin Barons of Tarnovo trampled upon the spine of Bulgaria.\n\nYoung Stoyan witnessed all this, not with cries or flight, but by pressing the silence deep into his heart, forging it into something far more dangerous. After yet another sweep by the Latin knights, their drunken laughter still echoed in the camp during their celebration. This youth quietly picked up a shard of a broken millstone – heavy, rough, and cracked. Then, with his calloused hands, he smashed the skulls of several drunk knights. Before the smell of blood had even faded, he stood beneath the oak by the camp and, in a voice hoarse as grinding gravel, shouted his first call to arms. Then, grabbing a heavy woodcutter's axe, while the stunned onlookers were still reeling, he cleaved the mast of the Latin banner with one blow.\n\nSerfs from Dobruja followed him, calling him the "Cabbage King" after Ivaylo Bardokva, a rebel of their homeland's past. Yet, many more whispered behind his back, calling him "Gorko" – one who distills bitterness into potent liquor. He is neither a prince nor a general, but the power he wields is far beyond any Latin commander's comprehension – it is the wrath of the earth itself, the indomitability of Bulgaria. While the Boyars willingly bent their knees to the Latins, he alone straightened his spine from the mud."
DD_BUL.1.a:0 "Let them taste blood too!"
DD_BUL.2.t:0 "Defection in [Root.Province.GetName]"
DD_BUL.2.d:0 "We once thought these Bulgarians were as silent, obedient, and helpless as the soil beneath their plows. In the palace at [Root.Province.GetName], we feasted on their tax-grain and listened to their cringing acquiescence. Yet, when that thug nicknamed "Cabbage" – Stoyan – appeared on the horizon with his ragged mob, all pretense crumbled.\n\nThe mutiny did not begin outside the walls, but in every dark corner. Servants who usually only groomed horses and cleaned boots suddenly pulled sharpened axes from the haystacks; impoverished priests no longer prayed for peace in their sermons, but whispered the fearsome name of "Gorko". In the dead of night, the door bolts were greased for silence, and the garrison's drinking water was laced with hallucinogenic herbs.\n\nWhen Stoyan's crude banner surged through the gate, he was met not with resistance, but with the near-frantic cheers of the Bulgarians. The order we cultivated here for decades, in the face of this fury surging from the mud, proved more fragile than parchment. This land is awakening, and we will either be consumed by it or utterly cast out."
DD_BUL.2.a:0 "These mud-foots dare turn on their masters!"

DD_BUL_ideas:0 "Bulgarian Ideas"
DD_BUL_ideas_start:0 "Bulgarian Tradition"
DD_BUL_ideas_bonus:0 "Bulgarian Ambition"
BUL_basic_ideas_1:0 "Establish Order"
BUL_basic_ideas_1_desc:0 "Like all Slavic peoples of Eastern Europe, the Boyar aristocratic system was once the core of Bulgarian society. But with Stoyan rising from the foot of the Rila Mountains, the old shackles have shattered. We no longer place our hopes in those nobles who bent the knee to the Latins. Instead, we must establish a new order, rooted in the soil, where the farmers wielding axes become the true backbone of the state."
BUL_basic_ideas_2:0 "Eradicate the Oppressors"
BUL_basic_ideas_2_desc:0 "Centuries of religious strife and the tyranny of foreign lords have left bloody marks upon our land. The chains of the Latin tax collectors and the doctrines of heretics sought to extinguish our soul. We must uproot these dangerous remnants – for Bulgaria's purity and strength can only be built upon absolute unity and an indomitable will."
BUL_basic_ideas_3:0 "Unity Beneath the Millstone"
BUL_basic_ideas_3_desc:0 "Having regained our freedom in a pool of blood, we must never allow Bulgaria's leaders to fall back into the selfish infighting of the past. Bulgaria shall never again descend into the darkness of being trampled by foreigners! United under the banner of 'Gorko', we will reclaim the dignity and territories that rightfully belong to the land."
BUL_basic_ideas_4:0 "Heavy Axe and Gunpowder"
BUL_basic_ideas_4_desc:0 "The age of knights is crumbling. In a new world dominated by gunpowder, light cavalry skirmishers, and siege artillery, even the highest walls will turn to rubble. We must adapt the heavy woodcutter's axe to warfare, making the Bulgarian army stronger to meet any challenge that seeks to enslave us again."
BUL_basic_ideas_5:0 "Pillar of the People"
BUL_basic_ideas_5_desc:0 "The Bulgarian Church, once the pride of the Slavic world, withered under the oppression of Latin dungeons and lords. Now, the hands that once rang the bells have taken up arms. Free Bulgarians will once again regard the Church as the chief pillar of society – but no longer as an ornament for the nobility, but as a spiritual fortress for every suffering subject."
BUL_basic_ideas_6:0 "Wrath of the Ridges"
BUL_basic_ideas_6_desc:0 "Our land spans steppes, plains, and mountains. Born at the foot of Rila, Stoyan knows the power of every rock. The Bulgarian warrior must be proficient in every type of terrain – from the fertile banks of the Maritsa to the treacherous ridges of Rila. Our ancestors used mud as a shield and rock as a blade; this legendary resilience will once again guard our borders."
BUL_basic_ideas_7:0 "The Tsardom Rises Again"
BUL_basic_ideas_7_desc:0 "Rome's Golden Age perished with the weakness of the Greeks; those hypocrites no longer deserve the legacy of 'Rome'. Bulgaria twice ascended in glory, and twice was extinguished in blood – first destroyed by Greek treachery, then crushed under the hooves of the Latins. The world thought Bulgaria's spine was broken, that we could only remain eternal slaves amidst the ruins. But the land never forgot its true masters; the resentment buried in the soil will eventually blossom into the flower of vengeance. Now, through our mastery of the earth and the will called 'Gorko', the Third Bulgarian Tsardom is being reforged from the ashes. Let the usurpers of the East and the lords of the West tremble at our roar. This time, we will settle accounts not only for territory, but for all the bitterness accumulated over these centuries!"
DD_BUL_1_event_tooltip:0 "While the modifier '§YStoyan's Indomitability§!' is active, provinces of §YBulgarian§! culture that are §Toccupied§! by our nation will gradually be incorporated into our territory and provide §G1§! infantry unit."
