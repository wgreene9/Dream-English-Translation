DD_SAN_Thessaloniki_Despotate_reform:0 "Despotate of Thessalonica"
DD_SAN_Thessaloniki_Despotate_reform_desc:0 "The Despotate of Thessalonica is a new polity formed from the remnants of the former Despotate of Epirus. Unlike many of its former competitors, the original Epirote aristocracy was relatively weak; the old noble families mostly fled to Asia Minor when the city fell. The lack of powerful aristocratic counterbalances instead gave Epirus an advantage when implementing reforms and strengthening centralization. The Despot can govern more directly, relying on the army and the bureaucratic system."
DD_ERO_bureaucracy_reform:0 "Roman Bureaucratic System"
DD_ERO_bureaucracy_reform_desc:0 "The greatness of Rome lies not only in its strong shields and sharp spears, but also in its administrative machinery, precise as clockwork. This reform aims to rebuild the bureaucratic network that once left barbarians in awe – restoring the control of the 'Logothetes tou Genikou' over taxation, and the oversight of intelligence and diplomacy by the 'Logothetes tou Dromou'. Within this system, complex documents are no longer redundant burdens, but extensions of the central will. Efficient administrators will replace hereditary magnates, ensuring that every pulse from the imperial heart can precisely deliver sustenance to the most distant frontiers, making the state machinery once again hum with fearsome efficiency."
DD_ERO_Tribunal_of_Apocalypse_reform:0 "Tribunal of the Apocalypse"
DD_ERO_Tribunal_of_Apocalypse_reform_desc:0 "The trials of purgatory have tempered our people; the weakness of mortal flesh has been consumed, leaving only pure divine wrath. Our sovereign is no longer a secular ruler, but the eschatological judge riding the white horse, wielding a sword from his mouth as described in the Apocalypse. Every imperial edict is not a political decision, but a direct transmission of divine oracle. Under this system, our sole reason for existence is to act as agents of God's fury, to thoroughly purify this fallen world with sword and fire before the end comes."
DD_ERO_Patriarch_Tutor_reform:0 "Guardian of Order and Civilization"
DD_ERO_Patriarch_Tutor_reform_desc:0 "The lands of Europa lie in ruins, seeing only slaughter and bloodshed. Whether Franks, Germans, or Slavs, they fight like wild boars over scraps in the mud. They have stolen fragments of Rome, yet learned only the veneer of barbarism. As the eldest son of civilization, we cannot stand idly by. We must step forward, confiscate their weapons, and reshape the former order until they understand what order and civilization mean – that is, to act as we do. This is not merely conquest, but a mandatory rite of passage, necessary to reforge the consensus of Europa."
DD_ERO_Princeps_Oecumene_reform:0 "System of the Princeps Oecumene"
DD_ERO_Princeps_Oecumene_reform_desc:0 "Augustus is not only the commander of the armies, but also the guardian of the European world. We shall remove imperial power from the throne of the 'Conqueror' and place it upon the altar of law. The Emperor is no longer merely the Basileus of the Greeks, but the common protector and arbiter of all peoples sheltered by Roman law and the European consensus. Under this system, lineage takes a back seat; loyalty to the imperial ideal becomes the sole measure of a citizen's worth. We will build an 'Oecumenical Empire' that transcends nations and borders, allowing the Pax Romana to descend once more."
