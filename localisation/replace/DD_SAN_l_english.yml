ERO_Autocephaly_vassal_long_desc:0 "An Autocephalous Patriarchate refers to a local polity granted limited autonomy by charter from the Ecumenical Patriarch and the Emperor. It possesses almost completely independent diplomatic and territorial rights, but the appointment of its highest-ranking bishops and the coronation of its ruler require the approval of the Patriarch and the Emperor. It is also required to provide regular tribute to its suzerain."
