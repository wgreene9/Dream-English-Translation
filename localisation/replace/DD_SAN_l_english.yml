ERO_enermy_ERO_Feast_of_Wolve_Pack:0 "The Heart of the Anti-Roman Hegemony"
ERO_Feast_of_Wolve_Pack_dis:0 "The Feast of the Wolf Pack"
desc_ERO_Feast_of_Wolve_Pack_dis:0 "Romania is growing stronger by the day, but our enemies will never surrender their struggle without a fight!"
