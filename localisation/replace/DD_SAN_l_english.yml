integrate_subject_to_Autocephaly_desc: "An Autocephalous Patriarchate is a local polity granted limited autonomy by charter from the Ecumenical Patriarch and the Emperor, but its autonomy has been restricted following ecclesiastical reforms. Using this action, at the cost of §R15.00§! §YPatriarchal Authority§!, will revoke [From.GetName]'s autonomy, returning it to the direct rule of the Imperial center. We will gain the modifier '§YIntegrate Autocephalous Patriarchate§!': Monthly Administrative Power £adm£: §R-4§!. Each point of §Tdevelopment§! will extend its duration by §Y45§! days. The integration time for a single Patriarchate is at most §M30§! years (i.e., when development reaches §Y240§!)."
