DD_SAN.0.t:0 "The Shattered Empire"
DD_SAN.0.d:0 "The Fourth Crusade, for the Latin brigands who plundered Constantinople and sacked cities along the way, was a feast of boundless plunder; but for the Empire, it was the beginning of centuries of suffering and calamity. The once-glorious Roman Empire was torn asunder, shattered into fragments; the once-peaceful and prosperous lands were depopulated, transformed into wastelands and ruins, with the remaining Greek subjects barely surviving under the oppression of foreigners and the servitude of usurpers.\n\nYet upon these remains, the Komnenos Doukas family rose in arms from Epirus, guarding the last shreds of dignity through over a century of tenacious perseverance. From Michael I's founding of a state in Arta to Isaac I's victory in Albania, this bloodline's legacy remained unbroken. Though plagued by usurpations and coups, though oppressed by Latins and Venetians, they rebuilt time and again from the ruins, preserving the embers of the Empire amidst court intrigues and encircling foes.\n\nThe young [Root.Monarch.GetTitle]—[Root.Monarch.GetName]—is the heir to this legacy. With the meager strength amassed in Epirus, and guided by his father's trusted friend, Ioannes Sgouros, he carved a path through the inept Latin lords from the Pindus Mountains to the Aegean Sea, his spearpoint aimed at Thrace. Yet fate is fickle; through the betrayal of cunning Latins and the plots of treacherous schemers, he ultimately lost his trusted mentor and the foundation of Epirus, forced to hold fast in Thessalonica—the final bastion of the Roman remnant.\n\nEven so, the encircling Latin lords watch with predatory intent, even insolently retorting that we are 'savage and cruel,' 'deceitful and hypocritical,' and 'mercenary.' Little do they know that it is the blood and corpses of countless  compatriots spilled over centuries that nurtured our courage and daring; it is the pain and tears from centuries of betrayal that cultivated our shrewdness and resilience; it is the centuries of exorbitant taxes and extortion that taught us the value of thrift and saving.\n\nThough now trapped in Macedonia, [Root.Monarch.GetName] retains the loyalty of the army and the last elite forces through his illustrious military exploits. He navigates deftly between powerful foes, using strategy and concessions to gain breathing room; his rhetoric is fiery, his words unify the faithful; he is skilled in accounting, amassing gold and silver through prudent finance; he is adept at economy, filling the treasury through meticulous governance; he is careful in stockpiling, gathering strength through long-term planning for future restoration. In just a few short years, this broken city, which languished for a century under the Latin yoke, has been restored to its former vitality and prosperity.\n\nBut [Root.Monarch.GetName] knows that forbearance and compromise are not permanent solutions. His fame now spreads across the ancestral lands; the remaining Greeks, weary of foreign oppression, feel the fire of vengeance surging in their veins. Popular sentiment stirs restlessly, hope quietly sprouts, and this universally acclaimed star of dawn patiently waits—waits for the moment that can reverse the course of fate, perhaps even to reclaim the Empire's legacy."
DD_SAN.0.a:0 "One day, we shall reclaim the stolen legacy!"
DD_SAN.1.t:0 "Dawn's Resurgence"
DD_SAN.1.d_war:0 "The air in Constantinople still reeks of sulfur and the suffocating despair of the apocalypse.\n\n[LAT.Monarch.GetName]'s mercenaries and Crusader knights, mustered from Adrianople, have completely encircled the already battered city of Constantinople. Though the Latin host lacks the glory of yesteryear, it remains an insurmountable nightmare for this solitary city defended only by its citizens. The vastly outnumbered garrison struggles on behind the crumbling battlements. Heavy stone shot and bolts pound the Theodosian Walls day and night; each thunderous impact sounds like the final death rattle of a dying beast.\n\nThe breaches in the walls widen daily. Citizens tear beams from their old homes, strip bricks from churches, and even pry up stone slabs from ancestral tombs, all to plug the gaps leading to hell. Before the walls, Latin knights taunt without restraint, brandishing bloodied war hammers and crosses, already squabbling fiercely in their tents over the spoils of the anticipated fall—women, children, gold, silver, holy relics, all considered prizes within their grasp. On the walls, able-bodied men, wrapped in blood-soaked rags, fight on in a near stupor through endless days and nights; beneath the dome of the Hagia Sophia, the aged and infirm don freshly laundered monastic habits and pray in silence by flickering candlelight.\n\n[LAT.Monarch.GetName], seated in his tent, raises a golden goblet, placating his generals' greedy demands while secretly congratulating himself on regaining control of the situation. Suddenly, a dust-covered, terrified messenger bursts into the camp on horseback: 'Sire! The defenses at Dorostolon have collapsed! The Thessalonians are marching at full speed towards Thrace!'\n\nThe Latins initially dismiss it as scattered remnants of previously routed forces, until that banner, gleaming like the afterglow of sunset, fully unfurls on the horizon. The clamor in the camp freezes instantly. These are not ragged refugees, but disciplined, scale-armored professional phalanxes. [Root.Monarch.GetName] did not hesitate for a moment, personally leading his main army to sweep through Eastern Thrace like thunder, while his vanguard has been ordered to race over the waves, heading straight for Constantinople.\n\nAnother night of fierce battle. As the first rays of dawn tear through the gloom, the exhausted defenders, in a daze, see it on the horizon—a host, bearing the image of Saint Michael and the double-headed eagle banner, advances slowly, then crashes into the startled Latin flank with terrifying force. In an instant, flames erupt, and screams fill the air.\n\n'It's the Greek phalanxes! It's the relief force from Thessalonica! [Root.Monarch.GetName] kept his word, he didn't abandon us, they've truly come!'\n\n[LAT.Monarch.GetName] stares in terror at the chaos engulfing his rear, while [Root.Monarch.GetName]'s main army relentlessly approaches Adrianople like a flood. On the smoke-blackened soil of Thrace, the last vestiges of Latin arrogance are being ground into dust. On the walls, the soldiers, who had resolved to die, erupt in cheers—in that moment, hope shines brighter than the sun."
DD_SAN.1.d_peace:0 "The air in Constantinople still holds the lingering traces of sulfur and scorched stone, but the suffocating despair has finally begun to dissipate in the cold morning breeze.\n\nBeneath the Theodosian Walls, the shattered trebuchets and abandoned siege engines are being dismantled piece by piece. The Latin encampments stand empty, nothing remains but toppled flagpoles and scattered belongings, telling tales of a delusional ambition amidst the wild grass. The heavy, grating city gates groan slowly open, not to surrender, but to welcome long-awaited kin returning home.\n\nThe army from [Root.GetName] arrays itself in perfect order outside the city. Lamellar armor glints faintly in the sunlight, but they advance no further. Horns sound low, the formations move forward steadily—no looting clamor, no victory cries—this is a reclamation, a restoration, not a conquest. Soldiers sheathe their weapons and enter the city along the time-worn main thoroughfares; the echo of their boots on the stone flags resonates clearly through the empty streets.\n\nCitizens emerge from behind broken doorways and half-collapsed houses. Some whisper prayers, others weep silently, while many simply watch the procession pass. No one cheers, no one flees—they merely witness this scene calmly: an event their fathers and grandfathers never experienced, something existing only in ancient texts—the true sight of an army composed of Romans returning in victory.\n\nAs [Root.Monarch.GetName] steps into the Hagia Sophia, candlelight flickers like stars beneath the great dome. The gold of the mosaics remains tarnished, but the prayers grow ever more steadfast within the hall. The clergy approach, offering blessings in a ceremony somewhat restrained yet dignified; the bells ring out thereafter, deep and lingering, proclaiming the city's return to order.\n\nUpon the walls, the cracks remain etched as clearly as before; the work of restoration has only just begun. But on this day, those scars no longer symbolize an empire at death's door; they have become medals proving a civilization's survival. Constantinople was not destroyed in its final hour. Under the watchful eye of the Theotokos and with the return of temporal authority, it has gained recognition and continuity.\n\nRome still endures."
DD_SAN.1.a:0 "The Theotokos still watches over her city."

DD_SAN.2.t:0 "The Coronation of Rightful Rites"
DD_SAN.2.d:0 "Leading his army, tempered by long trials and hardships, [Root.Monarch.GetName] slowly passes through the Theodosian Walls. Unlike the slaughter and plunder of the Crusaders centuries ago, unlike the riots of the old Empire, there are now no cries, no commotion—only a solemnity as if ordained by fate itself.\n\nThe streets on both sides are packed with onlooking citizens, gazing in awe at this disciplined army—no mercenary arrogance, only an ironclad sense of order. As [Root.Monarch.GetHerHim] rides a white horse onto the Mese, a low murmur of amazement ripples through the crowd. They see not a conqueror, but a guardian entrusted by prophecy; the solitary star who held high the torch as the Empire crumbled has truly returned.\n\nThe coronation takes place within the Hagia Sophia. [Root.Monarch.GetName] personally researches every aspect of the ceremony, striving to restore the golden age before it was tainted by Latin rites. The gems that once adorned the imperial crown may have long been taken as treasures by the Venetians, but it matters not. As the Ecumenical Patriarch gently places the crown—perhaps plain, yet bearing absolute legitimacy—upon [Root.Monarch.GetName]'s brow, the air beneath the dome seems to stand still. Both the old nobles remaining in Thrace and the officers from Epirus feel, in that same instant, the profound power of legacy stirring their souls.\n\nThis is the turning of fate's wheel, God once again entrusting the tottering Roman authority to one capable of reversing the course of destiny. In a trance, the figures of the past merge with the present; it is as Heraclius marching from Asia Minor, crushing the Persian claws and recovering the True Cross; as Leo donning armor, obliterating the Arab delusion with Greek Fire, guarding the gateway of Europe; as John fighting across deserts and mountains, striking fear into all foes; as Alexius Komnenos turning the tide after the disaster at Manzikert, propping up the crumbling Empire.\n\nWe have waited so long, but the new age has finally crossed the endless night, like the dawn after the stars have returned to their appointed places. The heroic spirits never truly departed; they were merely awaiting a new vessel. Now, the courage, wisdom, and faith spanning millennia converge perfectly upon the shoulders of [Root.Monarch.GetName] alone. [Root.Monarch.GetHerHim]'s exalted, semi-divine status requires no adornment of gold or silver; the thunderous methods of blinding foes and sweeping away infidels stand as irrefutable proof of divine anointment.\n\nAfter the ceremony, led by the Caesar and the Despot, the new Emperor returns to the Blachernae Palace amidst the acclamations of the people. Though dangers still lurk beyond the walls, though the path ahead remains thorny, this night the Romans may sleep soundly—for the sword has returned to its rightful master's hand."
DD_SAN.2.a:0 "God the Father's providence is manifest! The King of Kings is restored!"

DD_SAN.3.t:0 "Prelude to Reckoning"
DD_SAN.3.d:0 "The jubilation of recovery recedes quickly before the shattered ruins of Constantinople, like a fleeting tide, leaving behind only the bitter intertwining of despair and deathly stillness.\n\n[Root.Monarch.GetName] stands alone on the broken terrace of the Blachernae Palace, gazing down upon the dilapidated city amidst the sparse, flickering lights. The moonlight is cold, illuminating the colonnades from which the Latins pried away the marble and stripped the gold leaf—they stand jagged and bare, like the skeletal remains of behemoths, flayed of flesh and abandoned in the wilderness. Every atrocity the Empire endured over the centuries, every cry beneath iron hooves, now seems to echo in the ears of [Root.Monarch.GetTitle]. They are unhealable scars, rooted in the very marrow of every survivor of the fallen realm.\n\n'The Latins stole our crown, the Franks emptied our treasuries, and the barbarians around us, like vultures, wait to tear at the Empire's still-warm flesh,' [Root.Monarch.GetTitle]'s voice echoes through the vast hall, as cold and sharp as an ice blade. 'They thought the Empire would die a humble, disgraceful death amidst this feast of plunder. They thought we would be grateful for the scraps they tossed our way. But a century of suffering has not worn down our will; instead, like the tempering of steel, it has forged our souls into an even sharper blade.'\n\nThis night, meant for celebrating the restoration, finds the lights within the administrative bureau burning without cease. The officials are not busy preparing silk and garlands for a triumph; instead, by flickering candlelight, they compile a ledger of blood debts: records of atrocities gathered from the populace, lists of territories lost and rightfully claimed, inventories of plundered saintly relics and holy remains, and a register of every compatriot who once willingly swore fealty to the Latin pretenders, every lord who betrayed the old Empire and feasted on the spoils of Rome's heritage. All counsels of moderate political persuasion are thrown into the fire, replaced by cold, precise mobilization orders.\n\nWe shall make the usurpers start awake in the dead of night, make them hear the roar of Greek Fire consuming wickedness upon the sea, make them behold the Double-Headed Eagle once more soaring above their vaunted fortresses. Since God has permitted this three-century-long trial, He shall surely witness this long-meditated judgment.\n\nOur state is rebuilt, yet the fire of vengeance remains unquenched—it shall burn from the Golden Horn to the Adriatic, consuming every debt, washing away every shame, reshaping every order. Until it sweeps through the lands of all the unrighteous, until not a single Latin sail dares to rise upon these seas, until nowhere remains upon this earth for the faithless to stand, until they taste suffering a thousandfold more bitter than ours. This hatred is boundless, this wrath is sky-high; only utter annihilation can silence the lamentations of the afflicted. [Root.Monarch.GetTitle] shall personally lead the Empire, transformed into the flame that consumes all the base. The account is opened, and we shall use the tears and blood of the guilty to inscribe the final period upon this boundless sin."
DD_SAN.3.a:0 "Blood must be answered with blood!"

DD_SAN.4.t:0 "The Anointing of the Hellenikon"
DD_SAN.4.d:0 "The Empire of old relied on the charges of Frankish knights, depended on the fleets of the Latins for escort, hired Slav mercenaries to storm positions, and employed Turkish archers to guard the frontiers... But history has taught us through bloody lessons: a sword bought with coin may, for coin, eventually be turned against its payer. Indeed, during that long, darkest hour, a very few foreign veterans did honor their contracts with their blood; these righteous men of noble soul have been granted the dignity of Roman citizenship and eternal respect.\n\nBut the Empire can no longer stake its fate on such fortunate exceptions. Rather than retain a multitude of uncertain elements, it is better to place our trust in our own kinsmen. The refugees of Asia Minor, the farmers of Thrace, the hunters of Epirus, the artisans of Macedonia, the merchants of the Morea, or the fishermen of the islands. Only those who share the same blood, bear the same scars, and speak the same tongue would never abandon their brothers in times of peril.\n\nAn army's strength lies in its quality; blood is thicker than water. This will, by design, not be a vast host. Worthy of proving their merit can only be those youths whose features are as deeply etched as ancient Greek sculptures, whose eyes burn with an inner fire. For them, we forge the sturdiest swords, we fit the strongest armor, we guarantee the most ample pay and provisions. And they, in the name of the Hellenikon tagma, shall become our most irresistible spear, our most steadfast shield. Where their arms point, they press forward with unmatched resolve."
DD_SAN.4.a:0 "Forged from the very flesh and blood of Rome."

DD_SAN.5.t:0 "The Triumph"
DD_SAN.5.d:0 "The roar of the Hippodrome of Constantinople subsides like receding thunder. [Root.Monarch.GetName] stands upon the newly restored Spina platform. Arrayed before him is not a parade of impeccably dressed but combat-ineffective guards, but a silent, resolute legion covered in glory and achievements.\n\nThey have personally witnessed the Empire's great journey back from Epirus to Constantinople. Within their ranks are Greeks born in Thrace, as well as faces from Armenia, Wallachia, Albania, and even among the Slavs. Through the long and cruel campaigns, in the countless crucibles where life and death intertwined, the boundaries of ethnicity have long been dissolved by the blood and sweat shed in common cause.\n\nIn ages past, our ancestors established a sacred sanctuary in Egypt called the Hellenikon. It was more than just a temple; it was the place where all the Greek city-states—Ionian, Dorian, and Aeolian alike—swore their oaths together and deposited their covenants, a symbol of the convergence of many streams into one.\n\nToday, this principle is reawakened.\n\nAll who shed blood for [Root.GetName] are sons of Rome; all who defend civilization are pillars of the Hellenikon. These battle-hardened veterans, regardless of their birthplace or dialect, are formally inducted into the Hellenikon Tagma. Henceforth, they are no longer auxiliaries, nor a foreign legion, but the core of the imperial military establishment, holding the highest honor, stipends, and privileges.\n\nTheir deeds shall be inscribed upon stone stelae, sung in poetry and folk ballad—for they have proven through their actions that they are the bulwark guarding the flame of civilization, the iron shield supporting the Eternal Empire until the very last."
DD_SAN.5.a:0 "Bestow upon them the highest honors!"

DD_SAN.6.t:0 "The Eternal Home"
DD_SAN.6.d:0 "When the cataclysmic disaster of 1204 befell the world, all believed the sun of Rome had finally set forever. The East was reduced to scorched earth, the plateaus of Asia Minor fell silent; the Porphyrogennetos was nowhere to be seen upon the waves of the Black Sea, and a thousand years of Roman glory seemed erased from the earth by God. In that godforsaken dark age, only among the mountains of Epirus did a single faint yet defiant flame remain unextinguished. We were not exiles; we were the final bastion.\n\nThe bloodline of the House of [Root.Monarch.Dynasty.GetName] became the last thread connecting the glorious past with the reality of the end times. For centuries, amidst the chilling winds of the Pindus Mountains and the crashing waves of the Adriatic, we alone upheld the Empire's dignity. Surrounded by wolves on all sides, every breath was an act of resistance against annihilation; every step forward was a struggle against fate. The pagans and barbarians mocked us as phantoms of a bygone era, prophesying that we would vanish silently into the shadows. But today—the phantoms have returned!\n\n[Root.Monarch.GetName] stands on the shores of the Hellespont, gazing upon Constantinople—the Eye of the World, the Key of the Theotokos, the earthly abode of God. Our fleet sails foaming into the Golden Horn; our army marches through the Golden Gate into the City. This is not merely a change of regime; this is the night of rebirth, a miracle made manifest. The true master of New Rome has returned, and no one else in this world remains worthy to wear this City as a crown.\n\nFrom the rugged peaks of the Pindus to the surging waves off Thessalonica, our path home was no straight road, but an Odyssey lasting two centuries. When the hooves of Latin knights trampled the sacred land, it was Michael who raised the banner of resistance among the mountains, becoming the 'Noah of the West' spoken of by the exiles. Usurpers claimed the imperial title, yet withered away amidst corruption and civil war, like the barren fig tree of scripture, consuming the earth in vain. They proved themselves but mediocrities who had seized divine instruments, incapable of bearing the burden.\n\nBut God is a righteous judge; He lets time sift the true gold from the dross. The House of [Root.Monarch.Dynasty.GetName] has finally fulfilled the unfinished mission of the exiles; the Roman Empire still endures, and the phantoms of yesteryear have become the backbone of a new age.\n\nTake up the keys to this City, so that Rome may never be broken."
DD_SAN.6.a:0 "The Eternal State still stands unbroken!"

DD_SAN.7.t:0 "The Eye of the Storm"
DD_SAN.7.d:0 "Through the long years, the world remained in constant turmoil.\nLatin fleets plied the seas; plumes of barbarian smoke rose and fell along the horizons. Alliances and betrayals washed over the land like the recurring tide. War, compromise, concession, further concession—these had long become the norm of survival. To live, the remnants of the Empire learned patience; they learned to bow their heads and press forward under the shadow of clouds.\nAnd amidst all this clamor, the truly dangerous moments were, paradoxically, marked by an eerie stillness.\nThat is the eye of the storm.\nNo thunder, no gale, the very air seeming to stand still. The enemy's gaze was fixed elsewhere, locked in mutual contention; the old order was quietly loosening its grip, while new forces had yet to take shape. Victory and defeat remained unwritten; fate itself hesitated.\n[Root.Monarch.GetName] stood before his desk, long studying the unrolled maps and the letters from spies sent back from every corner.\nWhat he saw was not merely the gain or loss of cities, nor the muster of armies, but the hidden, surging undercurrents—the closing gaps, the fleeting opportunities that would never come again.\nToo early, and we would be crushed;\nToo late, and the spark would be extinguished.\nHistory offers no second chance to the hesitant.\nAnd so, he reached out and placed his hand firmly upon the center of the map.\nIn that moment, there was no need for oaths, no need for stirring speeches.\nOnly a single, brief, and irrevocable command, passed from the court to the camp, and from the camp to the four winds.\nForbearance ends here.\nThe storm is about to break, and [Root.GetName]—\nStands at the eye of the storm, gazing outward with burning eyes."
DD_SAN.7.a:0 "Now is the hour of dawn."

DD_SAN.8.t:0 "The Surging Tide"
DD_SAN.8.d:0 "At first, it was merely a command carried away by the wind.\nAn old banner was raised again upon an unremarkable city wall. A motley band, their weapons uneven, trod the path of compromise into dust under the cover of night. The foreign rulers still sneered, dismissing it as yet another doomed rebellion, easily crushed underfoot—they were long accustomed to bloodshed and to suppression.\nBut this time, there was no turning back.\nThe first city burned the ledgers.\nThe second city cut the bridges leading to the Latin strongholds.\nThe third city dug trenches before its gates and cast the keys into the abyss.\nThey were not waiting for victory.\nThe deeds of [Root.Monarch.GetTitle] [Root.Monarch.GetName] of [Root.GetName] were spreading across the ancestral lands of the fallen Empire, inspiring the restless remnants who refused to accept their fate. They would rather be buried with the old world than return to a life of humiliation.\nOn the plains of Thrace, farmers reforged plowshares into spear-points;\nIn the mountains of Macedonia, hunters lit beacons, marking the path home with blood and smoke;\nIn the island harbors, fishermen patrolled the sea lanes in their small boats, waiting to cut the Latins' supply lines;\nMonasteries tolled their bells not for prayers of forgiveness, but to send forth those marching to their deaths.\nNo one counted the cost anymore.\nNo one asked how it would end.\nElders placed ancestral swords into the hands of the young, as if handing over a history destined for its final chapter;\nMothers embraced their sons before the city gates closed, but no longer bid them to return;\nBishops absolved all sins before the altars, leaving only one command: Forward.\nThis was no rebellion.\nThis was the final chance, the ultimate rupture.\nWhen the Latin lords finally realized the situation was spiraling out of control, they faced not an army, but a land resolved to die. Fortresses collapsed in flames, soldiers turned their cloaks in fear, mercenaries found no place left to flee. The tide engulfed all paths of retreat, and with them, all cowardice.\nThis is the surging tide.\nIt asks not for survival, only for reckoning;\nIt asks not for mercy, only for an end.\nWhen the last city lit its beacon, heaven and earth seemed to answer in kind.\nFrom this moment, the Empire would either be fully restored, or be buried in history together with its foes—\nBut no matter the outcome, no one would ever again force Rome to bow."
DD_SAN.8.a:0 "If Rome is fated to fall, then let us be the final wave that rises."

DD_SAN.9.t:0 "The Endless Night Ends at Dawn"
DD_SAN.9.d:0 "The triumphal procession of [Root.Monarch.GetName] once again treads the main thoroughfare of Constantinople, advancing amidst the thunderous acclamation of the citizens, finally halting before the Hagia Sophia. As the heavy bronze doors slowly swing open, the dust of two centuries dances lightly in the dawn light streaming through the broken windows—in that moment, the entire city seemed to heave a long, relieved sigh.\n\nFor so long, Constantinople, under the suffocating rule of Latin usurpers, was like a dying giant robbed of breath; the years of unending turmoil under their heel left the former Imperial City covered in grime. Golden mosaics crumbled in the darkness, weeds overran the ancient processional ways. Yet, from the moment the banner of the House of [Root.Monarch.Dynasty.GetName] was replanted atop the highest point of the Theodosian Walls, this 'endless night,' which had stretched across centuries, finally welcomed a dawn piercing the very heavens.\n\n[Root.Monarch.GetTitle] walks slowly towards the altar. The tread of his boots upon the Omphalion stone, where emperors of old once stood, echoes and re-echoes beneath the dome, as if penetrating time itself, answering the lament of that blood-red evening in 1204. From the bitter, cold mountains of Epirus, to the golden wheat fields of Thessaly, to the bustling harbors of Thessalonica—this road home was paved with the bones of countless generations of nameless veterans.\n\nNow, the cursed, the plundered, the forgotten—all have finally met their reckoning and redemption.\n\nThe scepter held in the hand of [Root.Monarch.GetName] no longer merely symbolizes a single beleaguered city or a surviving remnant of land; what it represents is a miracle—survival returned from the very brink of destruction. The specter of the Latins has vanished with the wind, and the recent tidings of victory, as the army sweeps forth and mountains and rivers are restored, continuously reawaken the memory of every Roman citizen. The old Empire, once so feeble and frail, has, through this unbroken chain of bloody struggle, in the sight of all its citizens, completed its true rebirth.\n\nAs the cheers crash like thunder against the dome, shaking the very waves of the Golden Horn, the world shall once again remember that indisputable truth:\n\nThe sun may set in the west—\nBut as long as the blood of the House of [Root.Monarch.Dynasty.GetName] endures, Rome shall never know night."
DD_SAN.9.a:0 "The Eye of All Cities opens once more."

DD_SAN.10.t:0 "A Renewal of All Things"
DD_SAN.10.d:0 "As the smoke from the final campaign dissipates, the gloom that hung over the Greek peninsula and the plains of Thrace has finally, completely cleared. Once, this land was shattered by the iron hooves of the Latins, dismembered by the ambitions of petty lords, gnawed upon by greedy barbarians, leaving only the barking of dogs and the sound of wailing amidst the ruins. Now, from the olive groves of the Taygetus Mountains to the outposts along the Danube's banks, the wings of the Double-Headed Eagle have re-stitched the shattered realm.\n\nWhat [Root.Monarch.GetName] now beholds is no longer abandoned fields and blood-stained ruins, but the vibrant, burgeoning life of a world renewed. Long-neglected aqueducts, now cleared, flow once more with sweet water, irrigating lands parched during centuries of upheaval. Within monasteries, once stripped bare, golden mosaics are being made to gleam anew by the hands of a new generation of craftsmen. The people no longer need to hide in the mountains; instead, they push their plows, lead their oxen and sheep, and establish new towns and villages amidst long-forgotten ancient sites, bringing the scenes of prosperity from old manuscripts back to life upon the land.\n\nYet, while the sword can recover territory, only sound institutions can ensure stable governance and reshape order. With the restoration of local administrative structures at every level, the bureaucratic system that sustained the Empire for a millennium is being methodically reconstructed under the impetus of [Root.Monarch.GetTitle]. In the government offices of Constantinople, the scent of ink has replaced the odor of sulfur and rust. Carefully selected officials labor tirelessly, repairing the surviving account books and tax codes, re-establishing the links between the provinces and the capital.\n\nThis is a silent remolding. By appointing learned scholars and just magistrates, the Empire is uprooting the lingering poison of warlord domination, once again bringing the fragmented territories under direct central rule. When the first detailed census is presented for review, the long-silent imperial bureaucracy stirs to life within this new order. The entire Empire, like a great clock meticulously repaired, once again emits a deep, powerful, and steady pulse."
DD_SAN.10.a:0 "This is the dawn of the next millennium!"

DD_SAN.11.t:0 "The Sevenfold Reckoning"
DD_SAN.11.d:0 "Our heavy past has now condensed into a ledger filled with hatred and judgment. Behind each name lies a burned homestead; beneath every title lurks a base usurpation.\n\nThe heavy scroll slowly unfurls upon the stone table depicting the lands of the Mediterranean. The fingertip first comes to rest upon that turbid lagoon—the 'Sin of Rapacious Devouring' owed by the Venetians. They dismembered the body of the Empire, piling the spoils of plundered sanctuaries high as monuments to their own glory. Next comes the dark forest sea of the north, the 'Sin of Usurping a Name' committed by the Holy Roman Empire. They falsely claim the title of Rome, borrowing the name of the Eternal, illuminating the darkness with a counterfeit flame. Then follow the 'Sin of Parasitism' perpetrated by the Frankish and Latin Crusader remnants, and the unforgivable 'Sin of Broken Oaths' of the Bulgarians.\n\n[Root.Monarch.GetTitle]'s gaze crosses the Bosporus, towards the endless yellow sands and high plateaus of the East. The Turks sowed seeds of scorched earth in Anatolia; the Arabs once cut off the path of faith; and the specter of Persia, which repeatedly tore up covenants and arrogantly claimed the title of King of Kings, still dares to challenge the sole eternity of Rome.\n\nMere recovery of ancestral lands cannot forge true peace. We must reclaim every last gold coin from Venice, shatter the false crown of the Germans, expel the barbarians grazing in the Empire's orchards, and crush every ancient enemy that presumes to stand as an equal to Rome.\n\nThe Empire no longer seeks forgiveness, nor does it plead for mercy. When the Double-Headed Eagle stoops to strike, it swears to grind all who have offended into dust. Only reckoning can restore order; only judgment can establish eternity. The ledger is full; the remaining blank spaces will be inscribed with the lamentations of our foes and the triumphs of the Empire."
DD_SAN.11.a:0 "Let all sins be judged, forever unforgiven!"

DD_SAN.12.t:0 "The Golden Chain of Venice"
DD_SAN.12.d:0 "When the first rays of dawn should have illuminated the golden dome of the Hagia Sophia, the inhabitants of Constantinople instead beheld a suffocating shadow. The vast fleet of the Venetian Doge, [VEN.Monarch.GetName]—those ships, like floating fortresses—patrolled back and forth across every strategic strait of the Aegean. The banner, embroidered with the golden-winged lion standing upon the Book of the Gospels, flapped wildly in the damp, cold sea wind, a sound like a predator tearing flesh. Within four hours of the blockade being decreed, our merchant vessels were mercilessly sunk by the Venetians; their broken masts, silhouetted against the setting sun, resembled shattered crosses. The usually bustling docks of Constantinople fell into an eerie silence.\n\nWheat from the Black Sea, spices from the Orient, furs from the North—all were intercepted just beyond sight on the horizon. In the markets, bakers trembled as they put away their empty baskets; the price of bread doubled overnight, then quintupled. The anxiety of the populace was no longer a murmur, but a surging, brackish tide, crashing madly against the iron gates of the Blachernae Palace. Standing on the terrace, [Root.Monarch.GetName] could smell in the sea breeze that stale, unmistakable Venetian stench of copper coins and gunpowder. On the ledgers left by Ioannes Sgouros, the alarming deficits spread like poison; the remaining silver in the treasury would not sustain them for long. This 'Golden Chain' not only locked the harbors but was also tightening its grip around the throat of the Empire, so recently reborn."
DD_SAN.12.a:0 "We must take action!"

DD_SAN.13.t:0 "The Whisper of the Bogomils"
DD_SAN.13.d:0 "In the remote mountain farmsteads of Bulgaria and the low stone cottages of Thrace, the followers of the Bogomil faith gather around dim hearth fires, proclaiming that all worldly authority—including the imperial power of [Root.Monarch.GetTitle]—is a creation of the demonic. Peasants, once docile, now grip their sickles tightly during the harvest season, their eyes reflecting not attachment to the land, but a fervor for the destruction of order. The Bogomils declare that since all earthly authority belongs to the Evil One, acts like Stoyan's smashing of his lord's skull are not merely rebellion, but sacred redemption.\n\nThose Bulgarian serfs dwelling within [Root.GetName] burn orthodox icons in their underground gatherings while heeding the call of that brigand known as [BU1.Monarch.GetName]. He does not fight alone—for every priest who whispers doubts about the legitimacy of [Root.Monarch.GetTitle] during his sermons, a hundred wood-chopping axes are sharpened. This resentment, spawned from the very soil, is using the guise of heresy to turn every valley in Bulgaria into an abyss that devours order. [Root.Monarch.GetName] must realize: if we cannot silence this 'whisper' spreading from the depths of souls, then Stoyan's heavy axe may soon fall upon the very bolts of the Blachernae Palace gates."
DD_SAN.13.d2: "While the fervent whisper of the Bogomils echoed through the Bulgarian valleys, [Root.Monarch.GetName] had already prepared to muster the army for suppression.\n\nYet, it was Eirene Strategopoulina who knocked upon the door of the council chamber late that night. This Basilissa, whose roots were long planted in the very soil of Thrace, understood clearly that these so-called 'heretics' were, in essence, farmers crushed repeatedly over two centuries by Latins, by famine, by despair—people with nowhere left to turn, seeking only their final breath of air within their faith.\n\nShe presented to [Root.Monarch.GetName] a petition, jointly signed by dozens of Bulgarian villages. The parchment was coarse, the script crude and crooked, some marks even made with charcoal. But the meaning pieced together from those symbols was unmistakable: they did not hate the imperial authority; they hated the unending hunger and trampling upon their lives.\n\nThrough her mediation, the tenant farmers, who had been sharpening their axes and preparing for a desperate struggle, laid down their arms. In the name of the Crown, she pledged relief from taxes, respect for the ancient customs of Bulgaria, and the promise that all upon this land might live.\n\nWith a clemency rooted in the 'earth' itself, she quelled the bloody storm that was about to sweep across the northern frontier. When the last seditious heretic leader was escorted beyond the borders amidst the silence of the people, the farmsteads along the Thracian-Bulgarian border returned to tranquility. But this time, the people there added a new name to their prayers—the name of the Basilissa who understood the suffering of the soil.\n\nThey called her: 'Our Mother.'"
DD_SAN.13.a:0 "I knew these people could not be trusted."
DD_SAN.13.b:0 "Sometimes, clemency is mightier than the sword."

DD_SAN.14.t:0 "The Turmoil of the Apostates"
DD_SAN.14.d:0 "There was a time when the lords surrounding Epirus swore oaths of loyalty to the House of [Root.Monarch.Dynasty.GetName]. Yet not long ago, upon the moss-covered walls of Arta, the banner of [Root.GetName] was ruthlessly torn asunder, its fragments drifting down into the mud of the moat. In its place rose the Lion of Saint Mark and the emblems of the old Despotate of Epirus—specters buried by the Empire for decades, now resurrected, nourished by Venetian gold.\n\nWith secret funding and military guarantees from the Venetian Doge, those western lords who once groveled before [Root.Monarch.GetName] have finally cast aside their masks of obedience. They no longer recognize the suzerainty of Constantinople, proclaiming instead the restoration of an 'independent and free' Epirus. The dire news of this schism spreads like a plague throughout [Root.GetName]. Latin mercenaries are disembarking steadily from the Adriatic, seizing control of the fortresses that have turned their cloaks. This is not merely a loss of territory; it is a public execution of [Root.Monarch.GetTitle]'s authority—someone standing atop the ruins of the Empire, spitting contemptuously upon the Porphyra itself.\n\nYet, arriving even before the news of rebellion was the assassin's blade. On the night prior to the tidings, three killers disguised as messengers infiltrated [Root.Monarch.GetName]'s tent. Had it not been for his personal guards' desperate warning, the poisoned dagger would have pierced the Sovereign's throat. Interrogations later revealed they were employed by a certain Epirote noble 'ardently desiring the final extinction of the Komnenodoukas bloodline'—the name of that very family had been conspicuously inscribed upon the most recent oath of fealty.\n\nThe blade missed by a mere inch. Another debt of blood is added to the ledger. The gateway to the west now stands wide open for our ancient foes. If we cannot immediately reclaim these traitorous lands through fire and steel, then the Empire will once again retreat into the narrow corridor of Thrace, marching towards a second annihilation in utter, isolated darkness."
DD_SAN.14.d2: "According to established tradition, [Root.Monarch.GetName] was preparing to depart for Epirus to tour the ancestral lands.\n\nYet, on the very eve of the army's march—Theodora burst into the campaign tent. She was drenched through, her cloak shredded by thorns, her hair undone, wet strands plastered against her pallid cheeks. The woman who quietly arranged flowers in the monastery was gone; in her place stood a madwoman who had crossed mountains through a tempest through the night, only to stop him.\n\n'Michael... stop!' Her voice trembled—not from fear, but the tremor of a soul tearing itself apart. She clutched desperately at his armor, her nails screeching against the steel: 'They mean to kill you... This is not merely a rebellion... it is a trap!' She lifted her head, her eyes brimming with despairing tears: 'I have betrayed my own name. I am but a cadet branch of the Gabrielopouloi; I carry the same blood as those traitors—but I do not care. I only want you to live.'\n\nThen, she spoke the secret buried for so many years: 'Your father's fall from his horse... the horseshoe was tampered with. And Ioannes Sgouros' death... was not merely the plot of a few individuals, either.'\n\nIn that moment, the innocence upon Theodora's face vanished entirely. Replacing it was a bloody resolution—she had torn open his deepest, most agonizing wound with her own hands, solely to make him live.\n\nMichael gazed at her. This woman, shivering from cold and anguish, had shattered her own tranquility to save him, betrayed her own lineage, transformed herself into a bloodied blade. From this moment onward, she would have nothing in the world but him.\n\nHe reached out abruptly, pulling her tightly into his embrace. He held her with such force, as if to meld her into his very bones.\n\nOutside, thunder roared and rain poured in torrents. Within this humble tent, two souls, stripped of all illusions, finally became utterly one amidst the bloody truth."
DD_SAN.14.a:0 "Epirus shall forever belong to the Empire!"
DD_SAN.14.b:0 "These traitors must pay. Every drop of blood they owe, I hold in account."

DD_SAN.15.t:0 "The Rectification of the Rus' Church"
DD_SAN.15.d:0 "For a long time, [This.Monarch.GetTitle] of [This.GetName] has styled [This.Monarch.GetHerHim]self the true successor of Augustus, regarded within the order of Christendom as the supreme authority bearing divine mandate, shaping the state, and guiding the subjects. Yet in the past hundred years and more, [This.Monarch.GetTitle]'s prestige has waned in the interplay of nations, making it difficult to maintain [This.Monarch.GetHerHim] leadership position within the Christian world.\n\nThe Slavic princes, adhering to ancient rites, recalled the Empire's former glory and styled themselves the defenders and spiritual standard-bearers of Orthodoxy, at one point nearly parting ways entirely with the Greek Church of Constantinople.\n\nNow, with the revival of Imperial majesty, the universal authority of [This.Monarch.GetTitle] has been reasserted. The singularity of [This.Monarch.GetTitle] of [This.GetName] is once again proclaimed to all. As the supreme arbiter of politics and faith among the Eastern European states, [This.Monarch.GetTitle] has compelled the Slavic lands to return to the order of the Great Church, bringing the scattered flock back under the one Shepherd."
DD_SAN.15.a:0 "Let division be made whole."
United_Orthodox_effect:"§VGreek Orthodoxy§! and §JRus' Orthodoxy§! shall be reunited as §OOthodoxy§!.\n\nAs the §Yowner§! of §Y[151.GetName]§!, the §OProtector§! of the Ecumenical Patriarch, we gain the following additional benefits:\n- Casus Belli §YPromote the True Faith§! unlocked against neighboring §YChristian§! nations.\n- Special action £ERO_icon1£ §OAccept Autocephalous Patriarchate§! §Tunlocked§! in the diplomatic §YInfluence§! interface against neighboring §OOthodox§! nations.\n"
SAN_religion_vectory_effect:0 "\nAs the §Yowner§! of §Y[151.GetName]§!, the §OProtector§! of the Ecumenical Patriarch, we gain the following additional benefits:\n- Special action £KRO_icon7£ §OWage Righteous War§! §Tunlocked§! in the diplomatic §YRelations§! interface against neighboring §Ynon-Christian§! nations.\n- Additional action £KRO_icon6£ §OConsolidate Autocephalous Patriarchate§! §Tunlocked§! in the diplomatic §YInfluence§! interface.\n\nAll §YAutocephalous Patriarchates§! receive the following modifiers until the end of the game:\nIndependent Tendency: §G-10.0%§!"
ERO_Autocephaly_vassal_EX_modifier1:0 "Loyal Patriarchate"
ERO_Autocephaly_vassal_modifier:0 "Autocephalous Patriarchate"
ERO_Autocephaly_overlord_modifier:0 "Autocephalous Patriarchate"

DD_SAN.16.t:0 "The Majesty of the Ecumenical Patriarch"
DD_SAN.16.d:0 "With the declaration of autocephaly by the Church of the Rus', the Eastern Church seemed on the verge of schism, the unity among the patriarchates growing ever more precarious. Yet, through the joint efforts of the Empire and the Holy See, the supreme authority of the Ecumenical Patriarch of Constantinople has been reaffirmed. The most influential Orthodox patriarchs have been compelled to recognize his judgments and decrees, pledging no further challenge to his spiritual jurisdiction.\n\nThere may have been discord within the Church, but the order of Orthodoxy shall ultimately be restored. Let all who are within the truth submit; whosoever resists shall by their own act be cut off from grace."
DD_SAN.16.a:0 "Submit to Orthodoxy, or be severed from grace."

DD_SAN.17.t:0 "Restoring the Kataphraktoi"
DD_SAN.17.d:0 "The battle lines of the Empire have long been without the thunderous hoofbeats of heavy cavalry. Since the nightmare of Manzikert descended, those once-undefeated, iron-walled Klibanophoroi that shattered enemy formations have quietly withdrawn, existing now only within the text of ancient chronicles, buried beneath the memories of broken ruins.\n\nYet memory alone cannot avert decline. The banners of the Ottomans once flew defiantly on the horizon of Asia Minor, their hordes of horsemen relentlessly pounding the Empire's fragile defenses. Now, as the fertile plains return to our embrace, the resolve to reform the heavy cavalry resonates in the heart of [Root.Monarch.GetName]. This [This.Monarch.GetTitle] is determined to forge a military force capable of facing death, able to stand against the iron tide of any powerful foe.\n\n'In ages past, our hooves trampled the shield-walls of the Franks; the arrows of our heavy cavalry tore through enemy ranks on the fields of Casilinum; the iron horsemen of Narses swept like a storm across the plains of northern Italy.' The Empire's kataphraktoi, striking with both lance and bow, gradually drove the proud Franks to ruin. Narses masterfully deployed his cavalry in ambush on both flanks, drawing bowstrings when the enemy was most densely packed, trapping them in a fatal dilemma between cohesion and dispersal. Frankish axes could not reach the distant horsemen, and when they attempted to close, they were met with a thunderous charge. Glorious victories were once inscribed upon Roman columns and within her epics, now buried in dust-shrouded cloisters, awaiting the day of their return.\n\nAt the urging of [This.Monarch.GetTitle], the armorers' forges, long extinguished, are re-lit. Heavy barding and triple-layered plate begin to take shape once more in the hands of craftsmen. Carefully selected young men of promise are summoned and assembled. The heavy cavalry of the new era shall be not only bearers of glory, but guardians of the Empire's very fate. When their shadows once again fall upon the march, those along their path shall count themselves fortunate to witness with their own eyes this resurgence of Imperial might."
DD_SAN.17.a:0 "Let them feel the impact of steel!"

DD_SAN.18.t:0 "The King of Kings in the East"
DD_SAN.18.d:0 "The Empire's decrees now reach from [Root.Capital.GetName] to the banks of the Tigris and the Nile; the fractured Near East has been brought under a single order. In the North, the churches of the Slavic states have once again submitted to the Ecumenical Patriarch of Constantinople. In the East, the fertile plains of Mesopotamia are again incorporated into our rule, and the old dreams of the Persians have utterly collapsed before the firm defenses of the Two Rivers. In the South, the grain of Alexandria once more fills our harbors, and the tax systems of the Egyptian provinces have been reintegrated into the Empire's treasury. The former monarchs of Persia, the Caliphs of the desert, and the Khans of the North once each styled themselves rulers of the world. But when the Roman Empire truly manifests its power, all such usurping pretenders prove but fleeting clouds.\n\nIn his latest decree, [Root.Monarch.GetTitle] has once again asserted the title 'King of Kings.' This is no clumsy imitation of an ancient Eastern epithet, but a true statement of the reality in the Near East. From the frozen forests of Rus' to the deserts of Aigyptos, from the deep valleys of Mesopotamia to the waves of the Adriatic, every prince, emir, and lord is now but a terminal administrative node within the Empire's governance. The manifold authorities of the world have been gathered together under the dome of the Hagia Sophia."
DD_SAN.18.a:0 "Prostrate yourselves before the King of Kings!"

DD_SAN.19.t:0 "The Augustus of the West"
DD_SAN.19.d:0 "As the Empire's administrative net spreads across the Alps, the kingdoms that once partitioned the West have dissolved, one by one, before the law of Rome. In Francia, the princes who styled themselves heirs of Charlemagne have all been stripped of their pretensions; the court of Lutetia is now merely the seat of an Imperial province. In Britannia, the barrier of the ocean could not prevent the return of the provincial system; the scepters of barbarian kings have been broken upon the tribunal of the Imperial governor. In Iberia, the homeland of Hadrian and Theodosius has at last been restored, and the legal code of Hispania now resonates in real-time with the chanceries of Constantinople. And that so-called 'Holy' and 'Roman' Imperial crown of the Germans has been crushed into scrap metal following the pretender's submission. That usurped crown, worn for six hundred years, is now but a trophy in the arsenal of the Hagia Sophia.\n\n[Root.Monarch.GetName] occasionally travels west to the palaces of Ravenna or Rome, surveying this administrative map encompassing the entire Latin world. From the deep forests of Gaul to the mists of Britannia, from the passes of the Pyrenees to the currents of the Rhine, all the once-presumptuous kings, dukes, and false emperors have now been reduced to bureaucratic terminals within the Empire's governing structure. The illegitimate bulls of the Pope have been confiscated and burned; the jurisdiction of the Western Church has been fully integrated into the sole order of the Universal Orthodox Church. This is not merely the annexation of territory, but the violent termination of the centuries-long division of the very name 'Rome'."
DD_SAN.19.a:0 "The One Empire, the One Augustus."

DD_SAN.20.t:0 "The Death Knell of the Bulgarians"
DD_SAN.20.d:0 "The Basileus stands personally before the long-ruined walls of Tarnovo, yet his thoughts inevitably drift back centuries. Then, the stern and mighty Basil II had also stood here in dominion after his great victory at Kleidion. But he showed a mercy he ought not have shown. He preserved the autonomous Bulgarian Church, granted the Bulgarians the right to pay taxes in cattle and grain, and even attempted to bridge divisions through dynastic marriage. He actually believed he could feed the wolf with bread, could tame the beast with clemency. But history proved this to be Rome's most fatal arrogance.\n\nAnd how did these barbarians repay such grace? At the Empire's first sign of weakness, they tore up their oaths. Instead of rising as loyal subjects, they turned like vipers to bite the hand of their master. They raised the Asen brothers as their leaders, usurping the imperial title. That base and bloodthirsty Kaloyan styled himself 'Slayer of the Romans,' ravaging the lands of Thrace, leaving a trail of atrocities wherever he passed—innocent people plundered and butchered, prosperous cities razed to the ground. This was their thanks for mercy: feasting on betrayal, drinking the wine of blood. Since they see clemency as weakness, and goodwill as an invitation to predation; since they reject the discipline of a father—then today, let them face the scourge of the Judge.\n\nNow, the talons of the Double-Headed Eagle grip the throat of Tarnovo. And we shall not repeat the mistakes of the past. Faced with such a race of wolves and tigers, only the exercise of absolute power, the power to utterly erase them, can attest to Christ's mercy and majesty. Never again shall the name 'Bulgaria' be recorded in the Empire's maps and documents. These 'conquered Scythian barbarians' are to be utterly exterminated and rooted out. The false Archbishopric of Ohrid shall be abolished henceforth; the false Patriarch of Tarnovo shall be excommunicated and exiled. All dioceses shall be placed under the direct jurisdiction of the Ecumenical Patriarch of Constantinople. Slavonic liturgy is an act of blasphemy; liturgical books in foreign tongues shall all be consigned to the flames. God hears only prayers spoken in Greek—from now on, you shall pray only in the tongue of the Romans. The former 'privilege' of paying taxes in kind was the very abyss of your degeneration. Henceforth, all taxes shall be paid in full in gold solidi. Those without gold shall sell their cattle; those without cattle shall sell their lands; those without lands shall sell their children—to pay for the crimes and blood debts of your past. All surviving boyars were summoned to the Church of the Holy Forty Martyrs... and then, along with that church, they vanished in a great conflagration. The lands of Paristrion and Moesia were granted to the Empire's veterans who distinguished themselves in the wars of reconquest. The surviving rebels were either set to till the soil as serfs, or sent as captives to labor in the mines of Thrace.\n\nThe stains of blood at Philippopolis still darken the pages of history; the wails of Thracian peasants still echo in our ears. No one shall ever again plead for mercy on their behalf, for they have exhausted the last measure of pity God ever granted them. Basil II blinded fifteen thousand of their men, leaving only one eye in every hundred to guide the way; today, we shall blind their entire race. Rome has returned; the endless night of the barbarians is at hand.\n\nThis is divine will. This is divine judgment. It is not to be questioned."
DD_SAN.20.a:0 "An eye for an eye, a tooth for a tooth!"

DD_SAN.21.t:0 "The Judgment of Venice"
DD_SAN.21.d:0 "The so-called Most Serene Republic of Venice—a city-state founded by the remnants of the Empire in the West, a mercantile dependency once relied upon by past Emperors, which grew fabulously wealthy through its unique geographic position facilitating trade between the Empire and the Western nations. Yet its ever-increasing power and boundless greed blinded its eyes, causing it to completely lose the reverent fear it should have held for the Empire.\n\nWhen the tragedy of 1204 unfolded, and the Crusaders breached Constantinople, the hearts of the Empire's subjects held only one desire towards this primary culprit: utter revenge. After a desperate final resistance, the city of Venice finally fell into the hands of [This.GetName]. The fleet that once defended this city of the sea was reduced to ashes and smoke; its stout walls were trampled into dust. The cries of anguish everywhere heralded the final days of this great city, built by the base. Soldiers spent days engaged in destruction and plunder within its churches, palaces, and even the Venetian Arsenal. The Bronze Horses and the looted gold and silver treasures were distributed to reward the troops, while the precious holy relics were all transported back to our capital. The despised burial ground of the Dandolo family was raided and destroyed by enraged officers and generals; countless exhumed remains were impaled on stakes in the piazza, then consigned to ashes in a great fire. Even so, many believed we had not done enough, arguing that only by letting flames completely cleanse this Sodom could our wounds truly be soothed."
DD_SAN.21.a:0 "Let the fire purify all!"

DD_SAN.22.t:0 "The Fall of the Franks"
DD_SAN.22.d:0 "These people, hailing from the northern forests—once regarded by our ancestors as mercenaries and frontier settlers—in the Empire's weakest hour, usurped the title of Augustus with astonishing arrogance. They forgot their own wretched performance before the general Narses—in that battle by the River Vulturnus, these Frankish brutes, knowing only reckless courage and devoid of all formation, were utterly shattered by the Empire's precise tactics and the commander's foresight, becoming a laughingstock recorded in the annals. Yet this temporary military setback did not temper their pride; instead, in subsequent centuries, exploiting the weakness of the Popes and the internal strife of the Empire, they constructed a counterfeit regime, styling it 'Holy,' though it was in truth a usurpation.\n\nThey were the source of turmoil in the West, the principal authors of Italy's dismemberment. They once posed as 'defenders of the faith,' yet before the shattered ruins of Constantinople, they revealed their greedy fangs, turning the Crusaders' sacred banners into a cloak for plundering Roman wealth. It was precisely due to the treachery of the Frankish lords that the Empire was forced to endure two centuries of exile and suffering. They not only occupied the prosperous provinces of Hispania and Gaul, but also sought to negate the legitimacy of the one true Imperial authority, both theologically and legally.\n\nNow, the legions of [Root.Monarch.GetTitle] have once again measured those lands, too long ruled by barbaric laws. The old palace of Lutetia no longer echoes with the clamor of barbarian tongues. The ill-fitting counterfeit crown of the Franks now lies in the trophy hall of the Hagia Sophia, silently proclaiming the end of an age of usurpers."
DD_SAN.22.a:0 "The pretenses are stripped away; the truth is restored."

DD_SAN.23.t:0 "The Collapse of the False Order"
DD_SAN.23.d:0 "These Germanic tribes from beyond the Rhine, once retainers feeding on raw flesh outside the Empire's borders, in the most contemptible political transaction of the eighth century, exploited the pretext of a 'Porphyrogennetos' Empress's regency, and in collusion with a depraved Bishop of Rome, staged the most shoddy coronation farce in human history. Not only did they presumptuously claim to be 'Holy,' thereby insulting the true meaning of God; they also usurped the name 'Roman,' thereby defiling the legitimate lineage of Augustus. This persistent provocation against the cosmic order is the ultimate source of the schism within Christendom and the fragmentation of the Western realm.\n\nUsing that ill-fitting iron crown as a pretext, they spawned countless wars and divisions north and south of the Alps. They repeatedly and arrogantly cast the contemptuous epithet 'Greek Emperor' towards Constantinople, yet stood exposed as hollow and fraudulent before the true law of the Empire. It was the arrogance of these northern usurpers that turned the Empire's Exarchate of Italy into a millstone of war, and shattered the glory of Ravenna beneath the hooves of Germanic horses.\n\nNow, the legions of [Root.Monarch.GetTitle] have completely settled this six-hundred-year-old illegal account. That golden counterfeit crown, once enshrined upon their altars, has been cast into the furnace and reforged into the seals for the archives of the Imperial provinces. The so-called 'Prince-Electors' have vanished into the dust of the scaffold and the exile; the so-called 'Imperial Diet' has been reorganized into administrative bureaus subordinate to [Root.Capital.GetName]. The sunlight of the rule of law has once again pierced the gloom of the German forests. This 'Holy' lie, woven from Germanic arrogance and papal greed, has been utterly consigned to the void of history."
DD_SAN.23.a:0 "The false realm is no more; the usurper emperor is slain."

DD_SAN.24.t:0 "The Fate of Asia Minor"
DD_SAN.24.d:0 "The catastrophic defeat at Manzikert, though a memory now centuries old, the wounds of that disaster still gnaw ceaselessly at the Empire's foundations.\n\nThe filthy barbarians exploited the opportunity to surge deep into our lands. Massacres and plunder spread everywhere, like a rolling flood drowning the Empire's Anatolian heartland. Countless villages and towns were put to the torch, countless people were driven from their homes. Refugees poured westwards like a tide, carrying with them suffering and terror, spreading the shadow of defeat throughout the entire Empire.\n\nMore fatally still, the internal divisions within the Empire erupted fully at this moment. Those officials of the eastern themata, who had worn the mask of loyalty, instantly cast aside their disguises, greedily sucking at the Empire's wounds while they were still fresh, fighting and scheming amongst themselves for power and profit. They did not hesitate to invite the wolf into the fold, utterly disregarding the perilous situation on the frontiers.\n\nAsia Minor, this fertile land that had once nourished the Empire, was transformed within a few short years into a pasture for foreign tribes. Prosperous villages reverted to wasteland, left to be wantonly trampled by herds. The Empire's defenses crumbled entirely. Following this came economic collapse and the complete disintegration of the people's faith in the state. The agony of defeat lay not only in the loss of territory, but also in the trembling of the Empire's heart and the shaking of its very convictions.\n\nYet even as the Empire sank into its deepest misery, amidst those shadowed years there still glimmered the memory of deeds more distant, achievements spanning millennia that yet shed their radiant light. The people in their darkest hour never forgot the glorious past. The memory of Heraclius watering his horses at Ctesiphon, of Leo's great victory crushing the Umayyads, of John's fearsome reputation shattering the Fatimids—these still inspired later generations to throw themselves into the struggle.\n\nNow, at last, the battle-hardened generals serving under [Root.Monarch.GetTitle] have pushed the frontiers forward once more, all the way to the Armenian Highlands. All tribes refusing to swear allegiance and pay tribute are to be driven from the interior of Anatolia, resettled in the desolate borderlands. Their pastures and fields shall be resurveyed and granted to those who distinguished themselves in the wars of reconquest, and to loyal Roman farmers. The joyful tidings of the liberation of the eastern marches cause the populace across the Empire to exult. Glory and tranquility shall once again descend upon Asia Minor."
DD_SAN.24.a:0 "Over the Thorny Hills!"
DD_SAN.25.t:0 "The Final Judgment of the Holy Land"
DD_SAN.25.d:0 "Ever since the storms from the desert swept across the Near East in the seventh century, Mecca has stood as the source of another order, challenging the universal authority of New Rome through the long ages. Countless Emperors before us gazed southwards from beneath the dome of the Hagia Sophia, watching as the Empire's provinces of Syria, Egypt, and even North Africa peeled away one by one in the tide of zealotry. That holy city, hidden deep within the wilderness, was ever regarded as a perpetual thorn embedded in the body of Rome's dominion.\n\nNow, the sword's edge of [This.GetName] has finally pierced the barrier of the desert. As the banner of the Double-Headed Eagle is raised upon the mountains surrounding the Kaaba, the 'Age of the Great Migration,' enduring for nearly a millennium, has at last reached its logical conclusion. This is not merely the annexation of territory; it is an ultimate reckoning, both theological and legal. The prayers that once issued from this place, powerful enough to shake the Empire's foundations, have now fallen silent before the thunder of the Empire's cannons.\n\nBy the decree of [Root.Monarch.GetName], the fate of Mecca shall no longer be decided by zealots, but shall be incorporated into the Empire's precise and implacable administrative system. The trade routes to the Red Sea shall be resurveyed; all obstinate resisters shall be exiled deeper into the sea of sand, while loyal border garrisons take control of the oases and fortresses. What we establish here are not merely boundary stones, but the very frontiers of civilization: any attempt originating from this place to challenge the Empire's legitimacy shall henceforth be regarded as an affront to the divine order.\n\nWhat Heraclius left unfinished, we have now accomplished beneath our iron heels. As the morning bell of Mecca tolls across the wilderness, it proclaims to the world an indisputable truth: the blazing sun of the Mediterranean has swallowed the lonely shadow of the desert. In the East, there are no longer forbidden sanctuaries beyond reach; the light of Rome shall illuminate every grain of sand once deemed lost."
DD_SAN.25.a: "All authority of the divine powers belongs to [This.Monarch.GetTitle]."

DD_SAN.26.t:0 "The Collapse of an Ancient Dream"
DD_SAN.26.d:0 "As the waters of the Tigris were stained red by the ashes of the final campaign, the specter that had haunted the high plateau and confronted Rome for a millennium has finally, this day, been utterly dispelled. This is not merely an absolute military victory, but the ultimate judgment upon a blood debt stretching across thirteen centuries.\n\nEver since the head of Crassus, filled with molten gold, fell to the ground, Persia has been the inescapable curse of Roman history. With paranoid arrogance, they humiliated the glory of the legions in the sands of Carrhae; with insatiable greed, they repeatedly daubed blood across the frontiers of the Near East. At the very moment the Empire most needed unity against foreign foes, it was Persia's pathological ambition that dragged both powers into that 'Final Great War' which bled the lifeblood of both civilizations. It was this shortsightedness, leading to mutual destruction, that weakened both the dome of the Hagia Sophia and the arches of Ctesiphon, ultimately granting opportunity to those lurking in the depths of the desert—had it not been for Persia's madness, would the Arab tide ever have overwhelmed half the Empire's provinces?\n\nThey were the disruptors of order, the abettors of civilization's self-mutilation. Countless times they broke their covenants, striking with the dagger from behind while the ink on the peace treaty was still wet. They sought, through the vain reconstruction of their dream of a 'King of Kings,' to negate the universal authority of the Augustus.\n\nNow, the iron hooves of [Root.Monarch.GetTitle] have shattered the very steles inscribed with those usurped titles. The ruins of Ctesiphon no longer echo with the roar of the Persian tongue; they lie silent under the cold, measured survey of Roman administrators. This account, outstanding for a thousand years, has at this moment been forcibly settled. The epic tales of the 'Two Kings in Conflict' have turned to ash. Within the heart of that once-arrogant plateau, only the shadow of the Double-Headed Eagle now passes coldly, gazing down upon this ancient foe, driven to destruction by its own obsession."
DD_SAN.26.a:0 "All debts are cleared; not even embers remain."

DD_SAN.27.t:0 "The Bells of Reconciliation"
DD_SAN.27.d:0 "The Basileus stood upon the heights of Tarnovo. The cold wind swept past the broken walls and ruins, yet it could not drown out the sound of prayers rising from the people within the city. The old grievances, the rebellions, the bloodshed—all have been written into the annals of history. But history is not merely a ledger of hatred; it is also a witness to repentance and renewal.\n\nMen always remember how Basil II blinded his enemies, yet few recall that after his victory, he still preserved their Church and their institutions, securing decades of peace upon the frontier. Iron and blood may conquer cities, but only order and trust can hold them.\n\nThe rebellion of the Bulgarians once brought shame upon the Empire, yet the greatness of the Empire has never lain in trampling the vanquished, but in transforming enemies into subjects, and turning enmity into sworn obligation. If we take hatred as our law and annihilation as our answer, then what difference remains between us and the barbarians?\n\nThe Double-Headed Eagle symbolizes not only majesty but also guardianship. Tarnovo shall not be erased from the map; it shall become a part of the Empire, not a wound upon it. The Archbishopric of Ohrid may be preserved, but must swear allegiance to Constantinople. Slavonic liturgy is no act of blasphemy; God hears the voices of all peoples, and is not confined to a single tongue. If faith requires translation, it loses its sacredness.\n\nThe Boyars were summoned to the Church of the Holy Forty Martyrs, not to the flames, but to swear their oaths of fealty. All who lay down their arms may retain their lands and honors; all who take up the plow shall be subjects of the Empire. The lands of Paristrion and Moesia shall be governed jointly by the local people and the Empire's soldiers and settlers. The tax system shall be reformed gradually, not imposed through sudden rapine.\n\nThe bloodstains at Philippopolis have long since dried, yet the memory remains. If we let the wound continue to bleed, it will never heal. The future of the Empire lies not in plunging an entire people into darkness, but in letting them behold the light.\n\nRome is Rome not because it conquers, but because it embraces. Hatred may win the cheers of today, but only shared governance can secure a century of peace."
DD_SAN.27.a:0 "Only by passing through suffering can we glimpse renewal."

 DD_SAN.28.t:0 ""
 DD_SAN.28.d:0 ""
 DD_SAN.28.a:0 ""
DD_SAN.29.t:0 "Old Friends of the Caucasus"
DD_SAN.29.d:0 "Between the towering Caucasus mountains and the turbulent Black Sea, the Georgian states have since ancient times shared a deep connection with the old Empire. Though separated by vast distances and tumultuous wars, the flame of faith, kindled by the same salvation, has always burned jointly upon the altars of Constantinople and the Caucasus.\n\nThere was a time when the Georgians formed marriage alliances with our ancestors, sent envoys to our court, and their monks traversed the Black Sea vessels carrying sacred texts. Even in the Empire's darkest hours of decline, when land routes were severed and communication grew sparse, the spiritual bond between our peoples was never truly broken.\n\nNow, with the mountains of Asia Minor restored to order, Georgia is no longer a solitary frontier ally. Witnessed by the peaks of Kazbek, they have been formally incorporated into our dominion. These towering ranges are no longer a turbulent borderland, but have become the eternal bulwark of the Empire's eastern flank."
DD_SAN.29.a:0 "Let the mountains stand with the Empire."
DD_SAN.30.t:0 "The Greeks of Italy"
DD_SAN.30.d:0 "Since antiquity, the footsteps of Greeks have been scattered across the southern coasts of Italy. Their ancestors crossed from the shores of the Aegean, putting down roots here, living and multiplying, passing down their language and faith through generations. During Byzantium's brief resurgence, this land was once again connected by blood to the Greek world; yet as the Empire waned, this link faded as well.\n\nNow, these territories have once more come under Greek rule, and their inhabitants can rest easy. Their identity and ancient traditions shall be respected and preserved within the new order. Supporting the Greeks of Italy is not merely an echo of sentiment, but will also strengthen our foundations in this region."
DD_SAN.30.a:0 "Now once more bound tightly to the Queen of Cities!"
DD_SAN.31.t:0 "The Expansion of the Frontiers of [Root.GetName]"
DD_SAN.31.d:0 "With the recovery of the lost lands of Asia Minor, increasing numbers of our people, dispersed for so many years, are returning to the ancestral homelands, encouraged by imperial decree. They are repairing abandoned cottages, reploughing fallow fields, and rekindling the hearth smoke in places once consumed by war.\n\nThis homecoming signifies not only the recovery of territory, but also symbolizes a turning of the ages. The Empire's frontiers are being consolidated, and with them, its population and its faith are flowing back. Those once forced into diaspora are once again becoming the masters of this land."
DD_SAN.31.a:0 "May they rebuild their homes upon ancestral soil."

DD_SAN.32.t:0 "The Return of [Root.GetName]"
DD_SAN.32.d:0 "With our influence expanding in Southern Italy, more and more families claiming Greek lineage are openly reasserting their identity under our decrees and protection. The languages and rites that faded into the Latin world over the passage of time are now returning to their original recognition in the coastal towns and hill villages.\n\nMerchants traveling back and forth bring the customs of the East; monasteries once again recite the Holy Scriptures in Greek; ancient traditions are quietly being revived. The younger generation is beginning to learn the language of their ancestors, and old family names and ancestral memories are being rewritten into the local registries. This is not a sudden transformation, but a slow and steadfast return. Like the tide that inevitably crashes upon the shore, the Hellenic spirit is once again taking root here."
DD_SAN.32.a:0 "The coasts once more hear our voice."
DD_SAN.70.t:0 "Mirror of Suffering"
DD_SAN.70.d:0 "The Empire has just concluded a difficult 'pacification.' [Root.Monarch.GetName] personally leads the troops on an inspection of the area. As the sun sets, the air is thick with the smell of scorched wood and blood. On either side of the road, once-bustling market towns now lie in broken ruins.\n\n[Root.Monarch.GetName]'s gaze sweeps across the roadside. He sees a group of soldiers squabbling over a pile of loot. Like greedy vultures, they tear at silk and silverware adorned with foreign embroidery, pushing and cursing each other for possession of a golden goblet, their faces bearing the unrestrained, vicious grins unique to victors.\n\nIn that instant, time and space seem to warp. The accounts of 1204 recorded in ancient texts flash through [Root.Monarch.GetTitle]'s mind: the crusaders who stormed Constantinople wore the same greedy and savage expressions. Centuries later, the Eagle banner has returned, but the men beneath it seem little different—only the band of plunderers has been replaced.\n\nThe war chariot passes a column of prisoners bound together by long ropes. They are ragged, awaiting sale into slavery or exile to the frontiers. [Root.Monarch.GetTitle]'s gaze inadvertently meets that of a child at the end of the line. A boy of about seven or eight, his face smeared with coal dust and dried blood. He does not cry or wail, merely stands there silently. As he looks toward [Root.Monarch.GetTitle], those eyes, which should hold only innocence, contain neither fear of authority nor the baseness of begging for mercy.\n\nHis eyes hold only fire.\nIt is a pure, distilled hatred, one that seems capable of burning through the very soul."
DD_SAN.70.a:0 "The Eye of Nemesis has manifested in that child's gaze."

DD_SAN.90.t:0 "The Alchemy of Suffering"
DD_SAN.90.d:0 "In the depths of the Hagia Sophia, a debate concerning the very soul of the Empire is underway. The traditional clergy still argue over whether the past two centuries were God's punishment for the Romans' decadence and indulgence. But an ascetic monk from a mountain monastery in Epirus—now the chief theologian—offers a radically different answer, shaking the entire court.\n\n'Do not be ashamed of the suffering that came before,' his withered voice echoes like thunder. 'That was God's crucible. It is only in the raging fire that gold is separated from dross. The Rome of the past was weak, ostentatious, wallowing in pleasure; thus, it had to die. God made us wander in exile amidst the ice and snow of Epirus, made us gnaw on tree bark in desperation, not to destroy us, but to strip away that feeble 'humanity' from our souls.'\n\nIn his sermons, this long history of exile is redefined as a sacred act of alchemy. Those who survived and returned here are no longer mere mortal flesh and blood, but steel-hardened saints, tempered by agony. We survived because we excised fear, pity, and weakness from our being. We are the chosen 'New Humanity'; our very existence is a miracle. Therefore, our conquest of others is not the tyranny of mortals, but the judgment of a higher form of life upon a lower one."
DD_SAN.90.a:0 "Fire refines gold; adversity forges the strong."
DD_SAN.91.t:0 "The Antinomy of Mercy"
DD_SAN.91.d:0 "The Holy Scriptures teach us to love our enemies. Yet within this restored Empire, that doctrine is undergoing a chilling deconstruction. Court philosophers propose a new dialectic: if Rome represents the sole earthly truth of God, then the Latins and Turks who sought to destroy Rome are not merely political foes, but the 'negation of truth' itself, obstacles blocking the advent of the Kingdom of Heaven.\n\n'True mercy,' writes a tutor instructing the children of nobles, 'lies not in tolerating evil, but in severing the spread of sin. If you forgive a man-eating wolf, you are complicit in the slaughter of the flock. The very existence of the unrighteous is a persistent sin; each breath they take defiles the purity of the world. Therefore, their utter annihilation is not only an act of loyalty to Rome, but the ultimate redemption for their own souls—by destroying their bodies, we prevent them from accumulating further transgressions.'\n\nThis 'sacred ruthlessness' rapidly becomes the spiritual pillar of the Empire. Within this logic, the descending blade is no longer an outlet of hatred, but a surgical act of mercy. We do not hate them; we are merely sweeping away the dust, allowing the world's order to return to its original perfection."
DD_SAN.91.a:0 "God tests the world through our hands."

DD_SAN.92.t:0 "The Living Icon"
DD_SAN.92.d:0 "As the restoration deepens, an atmosphere of mysticism envelops the entire Empire. People no longer see the Emperor as a mere secular ruler, nor Constantinople as a mere geographic capital. Having endured a despair that bordered on genocide, the collective subconscious of the Greeks has undergone a qualitative transformation.\n\nWe have come to believe that this restored Empire is the 'Living Icon' of God on Earth. Just as an icon is a window to the divine, the Roman Empire is the sole material vessel of the Heavenly order. Anything existing outside the boundaries of the Empire is, in a theological sense, 'non-existent,' a formless chaos.\n\nThis self-deification engenders an absolute, almost pathological sense of superiority and mission. We need not hate the barbarians, for no one hates shadows or dust. We need only expand, envelop, and illuminate. In the hearts of the soldiers, every advance of the Empire is no longer a territorial struggle, but an 'expansion of existence.' Wherever the Roman eagle banner flies, only there does existence possess meaning; beyond the banner lies only illusion. This spiritual self-aggrandizement renders us utterly immune to any external condemnation—for how can mere mortals judge a miracle?"
DD_SAN.92.a:0 "I am the truth, I am the way, I am the life."
DD_SAN.93.t:0 "The Silent Wrath"
DD_SAN.93.d:0 "During the time of the Despotate of Epirus, the Hesychast tradition taught us to seek the inner light of stillness through breath and prayer. Yet now, this mystical practice has been infused with new meaning. The elders of the monasteries proclaim that within that divine, silent light, they perceive not only peace, but also the 'Divine Wrath' of God against the world of unrighteousness.\n\nThis wrath is different from the wrath of mortals provoked by insult. It is a cold, perpetual will, as inexorable as the motion of the stars. It requires no roaring, no flushed face. It is as calm and as deadly as the deep ocean's undercurrent. Every Roman citizen is taught to internalize this 'Silent Wrath' as a part of their very being.\n\nWe dine in peace, we pray in peace, and in peace we drive our lances into the chests of our enemies. This sublimated anger has shed the fervent exterior of revenge, becoming sacred and solemn. We are not retaliating; we are undertaking a project of cosmic purification. The deeper our hatred, the more our exterior resembles the placid calm of a marble statue. This is a silent terror, an unquestionable judgment belonging to the divine."
DD_SAN.93.a:0 "We are the very footsteps of God walking the earth!"

DD_SAN.94.t:0 "The Mobilization of Truth"
DD_SAN.94.d:0 "When the 'Silent Wrath' became part of the Empire's very soul, war no longer needed to be incited.\nIt grew on its own.\nFrom the farmlands of Thrace to the valleys of Anatolia, from the candlelight of monasteries to the campfires of barracks, a silent resonance flowed through the body of the Empire. No one shouted for revenge, no one was stirred to fervor. People simply grew quieter, more resolute.\nIn the Hippodrome of Constantinople, [Root.Monarch.GetTitle] delivered no long speech. He simply raised the Eagle banner.\nThe crowd did not cheer.\nThey knelt on one knee.\nIt was not a cry of passion, but a calm confirmation—a confirmation that they were part of the order, instruments through which divine will extended. War was no longer an outburst of hatred, but the fulfillment of duty.\nIn the monasteries, monks ceased their debates on forgiveness and instead offered blessings for those departing on campaign; in the marketplaces, merchants quietly marked their goods as military supplies; in the villages, fathers placed family amulets upon their sons.\nThere was no blast of trumpets, yet it was as if the entire Empire rose as one. This was not the beginning of a war, but the arrival of a state of being. We no longer asked 'should we fight?'\nFor once Truth was confirmed, action itself became the only language.\nThe Empire began to move. Like a slow, inexorable temple."
DD_SAN.94.a:0 "Let the Empire march, as it is in Heaven."
DD_SAN.95.t:0 "The Manifestation of the Supreme State"
DD_SAN.95.d:0 "With the majesty of the 'King of Kings' in the East and the authority of the 'Augustus' in the West united as one, a vast administrative machine spanning three continents and encircling the Mediterranean now operates with unprecedented precision. In the North, the Slavic states have accepted the decrees of the Ecumenical Patriarch as the sole truth; in the West, the false crown of Aachen and the usurpations of the Popes have turned to dust in the annals of history; in the East, the lords of Persia and the desert have been reduced to external subjects paying the tithe. This is not merely the restoration of territory, but the final crystallization of the civilized order as we understand it.\n\nFrom the Hellespont to Gibraltar, from the Nile Valley to the banks of the Thames, the once clamorous nations and peoples are now unified under a single state, a single currency, and a single system. The world is no longer a chaotic arena of struggle, but a highly homogenized Supreme State, driven directly from [Root.Capital.GetName].\n\nThe prosperity and harmony of the era of [Root.Monarch.GetTitle] formally proclaim the return of the 'Pax Romana.' Any claim to independence is regarded as a theological heresy; any attempt to deviate from the established order is seen as a logical error. We are the world itself; we are the final stage of history. The Supreme State has arrived. Beneath the stern and eternal gaze of the Double-Headed Eagle, the destiny of humanity has returned to the one true path."
DD_SAN.95.a:0 "Rome is once again the meeting point of all roads."

DD_SAN.96.t:0 "The State of Tranquility"
DD_SAN.96.d:0 "After years of campaigning and reform, the Empire has finally entered a rare period of stable peace. The beacon fires along the frontiers have gradually dimmed; provincial taxes are collected in an orderly fashion; towns and villages, sheltered by order, are reviving once more. Farmers can sow and harvest in peace, merchants travel unimpeded between roads and harbors, and scholars and monks preserve ancient texts within monasteries and academies. Courtrooms are no longer swayed by fear or bribery; judges adjudicate disputes according to written law. Provincial governors administer under the supervision of the Imperial authority, with nobles and commoners each fulfilling their proper roles.\n\nPeople have begun to believe that tomorrow will not be worse than today, and that their children may grow up in an era more stable than that of their fathers. This is not clamorous glory, nor a dazzling triumph, but a more precious achievement: tranquility. The Empire is sustained no longer by force alone, but by order and trust. The strength of Rome grows in silence."
DD_SAN.96.a:0 "May peace long endure."
DD_SAN.97.t:0 "The State of Prosperity"
DD_SAN.97.d:0 "As the Imperial fleet once again commands the sea lanes of the Eastern Mediterranean, and as the masts of merchant ships stand like a forest within the harbors, the wealth of Rome flows back like a rising tide.\n\nEver since Constantinople was hailed as the 'Queen of Cities,' the sea winds have carried the scent of silk, spices, and silver. Now, from the granaries of the Black Sea to the mouths of the Nile, from the trading ports of Syria to the islands of the Aegean, the sea routes face no interruption. Customs revenues accrue to the Empire, commerce is incorporated into order; Latin merchants no longer dictate our markets; the treasures of the East and the gold and silver of the West must all pass through our ports.\n\nThe docks bustle day and night, coinage flows through the markets like water. The sound of mallets in the shipyards mingles with the haggling in the bazaars; an atmosphere of prosperity pervades both within and beyond the walls. New granaries are filled with grain, treasuries piled high with minted coins; guilds and mercantile associations steadily expand under the protection of law.\n\nThis is not the fleeting abundance of plunder, but the enduring prosperity brought by order. The Empire no longer depends on the sea lanes of others, but has become the arbiter of the seas themselves. The Eastern Mediterranean is no longer a contested zone, but the very circulatory system of Imperial wealth. Prosperity has arrived."
DD_SAN.97.a:0 "The flow of gold is our law."
DD_SAN.98.t:0 "The State of Triumph"
DD_SAN.98.d:0 "Through years of campaigning, we have not only shattered the ambitions of usurpers, but have crushed every foe daring to attack us. From rugged mountain ranges to vast plains, every span of land now rests securely under the protection of Imperial arms. The walls of our enemies have been ground to dust under the bombardment of our cannon; their once-proud banners are now merely rags dragged through the mud behind the horses of our triumphs.\n\nWith strict discipline, ample supplies, and thorough training, our professional legions operate as a single organism within the perfected themata system. The experience of veterans and the zeal of new recruits intertwine, forging an invincible force. The beacon fires along the borders are extinguished by fear; the security of our subjects is anchored in strength. Enemies often waver at the mere sight of the Eagle standard, even before battle is joined.\n\nThis is not a series of accidental victories, but a sustained predominance; not a matter of fortunate success, but the product of systemic power. In the eyes of the Empire's subjects, triumph is no longer merely a blessing from the Heavenly Father, but the inevitable outcome of the Roman order."
DD_SAN.98.a:0 "Triumph belongs to us."

DD_SAN.99.t:0 "The Chosen State"
DD_SAN.99.d:0 "As the last Latin cross was torn down by our hands, as the dukes of the Rus' bowed their heads in baptism before the Ecumenical Patriarch and [Root.Monarch.GetTitle], the 'Age of Schism' that had plagued Rome for a millennium finally came to an end. [Root.Monarch.GetName] [Root.Monarch.GetTitle] slowly ascended the ambo of the Great Church; the Golden Bull shone brilliantly in the light of ten thousand candles. From this moment forth, the Empire was no longer merely one part of earthly power, but became the sole projection of God's will upon Earth—the 'Chosen State'.\n\nThe pastoral staff of the Universal Orthodox Church has gathered the scattered flock. The resilience of the Slavs, the wisdom of the Greeks, the piety of the Assyrians—all have been forged into the same Orthodox order. The consolidation of the patriarchates has not only healed the rifts of authority, but has given form to the Empire's will within sacred hymns. Wherever the wings of the Double-Headed Eagle reach, the codex is the Gospel, and Imperial authority is divine mandate. The so-called East-West Schism is but embers before this majesty.\n\nWe no longer pursue the light, for we have become the light itself. There should be no second truth in the world, nor any second salvation. All who once presumptuously claimed holiness or coveted the Holy See shall feel a chill beneath this harmonious hymn. Rome is restored—not only in territory, but within the soul itself.\n\nFrom this day forth, every prayer is a proclamation of eternity, every monastery a wellspring of order, every campaign a manifestation of justice. The age of the Chosen State has begun. Until the Day of Final Judgment, this light shall not be extinguished."
DD_SAN.99.a:0 "The heavens declare our glory."
DD_SAN.100.t:0 "The State of Perpetual Day"
DD_SAN.100.d:0 "Friends, compatriots, Roman citizens, hear me! The great work of the Empire's restoration, through years of steady governance and prudent expansion, has finally reached its consummate conclusion. We are together witnessing this great moment belonging to all the Roman people!\n\nThe restoration of the Empire is no longer merely a vision, but has become reality. Through years of patience, the trials of blood and fire, the reconstruction of faith and order, we have finally arrived at the destination to which fate has guided us. From the rugged coasts of Britannia to the burning deserts of Syria, from the fertile plains of Gaul to the rich lands of the Nile Valley, the provinces once reduced to ruins by war and schism now once again bask in the radiance of peace and prosperity. The Empire's territories have been restored, and a new Roman law shall once again be solemnly enacted across this land, granting order and justice to every citizen.\n\nIn Rome, Ravenna, Thessalonica, and Antioch, the torches of triumph burn through the night without cease. Bells resound, horns blare; the people raise olive branches high, celebrating the victory. Nobles, soldiers, citizens, and clergy pray together, offering reverence for this astonishing work of recovery.\n\nBefore the ceremonial square in [This.Capital.GetCapitalName], [Root.Monarch.GetName] solemnly declared to the assembled subjects: 'The Roman Empire is reborn! Just as our ancestors once wrought miracles! The enemies who once mocked us as the 'Empire of the Greeks' now bow their heads. May the radiance of the Empire forever shine upon the earth, may the deeds of heroes be eternally preserved in history, may the order and peace of Rome endure for generations!'\n\nThis is triumph, and this is tranquility; it is the fulfillment of destiny, and the final chapter of order. The Empire no longer struggles amidst ruins, but stands firmly in glory. Though many challenges yet await us, we shall advance into the future, united in purpose. For the Roman Senate and People! For the eternal glory of Rome! May the world under Roman peace never again descend into darkness!"
DD_SAN.100.a:0 "Let nations bow, let stars grow dim before us!"
DD_SAN_100_tt:"\n§GThank you for playing @ERO§OThessalonica§!§!\n"

DD_SAN.101.t:0 "Defection of [Root.Province.GetName]"
DD_SAN.101.d:0 "The people of [Root.Province.GetName] had remained docile under our rule for so long, yet everything changed the moment enemy vanguard appeared on the horizon.\n\nScarcely had the enemy siege begun when the bakers within the city, the stevedores at the docks, and even the servants in the lord's manor became the eyes and ears of the foe overnight. They defaced icons upon the walls, cut the strings of the ballistae in the dead of night, and even slipped narcotics into the garrison's wine jars. When the enemy army breached the city, they were greeted by widespread celebration.\n\nThe subjects here never truly accepted our order. They were always waiting for that so-called 'legitimacy,' and now, with this most resolute betrayal, they have with their own hands dismantled the foundations we built here over a century. This land is slipping through our fingers, irretrievably, like shifting sand."
DD_SAN.101.a:0 "These rabble!"
DD_SAN.102.t:0 "Support from [Root.Province.GetName]"
DD_SAN.102.d:0 "When our battle flags appeared on the horizon of [Root.Province.GetName], this land did not respond with fear.\n\nThe people, long ruled by foreign lords, quietly stirred into action. Artisans within the city, laborers at the ports, farmers in the countryside passed messages among themselves, cutting off supply lines and sealing key routes without alerting the occupying garrison, while delivering details of the city's defensive weaknesses into the hands of our officers. The church bells no longer tolled for the rulers, but rang out for the returning orthodoxy.\n\nWhen the city gates opened, there was no pillaging, no reprisals. What greeted us were long-suppressed, low cheers and restrained joy. These subjects did not forsake order; after a century of silence, they had simply waited for the rule they were willing to acknowledge.\n\nNow, the people of [Root.Province.GetName] request to be taken back under the Empire's wing. They voluntarily offer provisions, guides, and intelligence, and petition to organize local militias to assist our armies in stabilizing these newly restored lands."
DD_SAN.102.a:0 "Welcome their return."
DD_SAN.102.b:0 "Organize them into reserve forces to protect their homes."
DD_SAN.102.c:0 "Pacify them."
