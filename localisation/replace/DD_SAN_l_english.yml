DD_SAN.200.t:"Coup in the Morea"
DD_SAN.200.d:"Good heavens, a coup has occurred in the Principality of Achaea, which we supported, under the cover of troops from [From.GetName]. We must demand justice!"
DD_SAN_200a_tt:"If they §Rrefuse§! compensation:"
DD_SAN_200a:"Demand compensation!"
DD_SAN_200b:"Let it go, given the circumstances."
DD_SAN_200c:"Strike now, without delay!"

DD_SAN.201.t:"Venetian Threat"
DD_SAN.201.d:"Our support for the Notaras family's invasion of the Principality of Achaea has apparently enraged the Venetians. They have sent envoys demanding, in no uncertain terms, that we provide compensation, leaving war as the only other option."
DD_SAN_201a:"Let them come!"
DD_SAN_201b:"A small token of esteem, Your Serenity, please accept it."

