ERO_bureaucratization_update_1:0 "Select Elite Bureaucrats"
ERO_bureaucratization_update_1_desc:0 "The Empire no longer views governance as a birthright to be bestowed, but transforms it into a precise professional function. By establishing rigorous examination and selection mechanisms, the state begins to draw intellectual resources from a broader spectrum of society. These professionals, systematically trained in law and accounting, replace the old hereditary magnates. They represent no family interests, existing only as the executive endpoints of administrative directives."
ERO_bureaucratization_update_2:0 "Purge Government Institutions"
ERO_bureaucratization_update_2_desc:0 "Through the deep deconstruction and reorganization of existing administrative bodies, the Empire strives to eliminate redundant overlapping jurisdictions and inefficient hierarchies. The core of this purge lies in establishing a 'traceable' system of responsibility: every decree issued and every fund disbursed must leave a clear record in the central archives. Corruption and inefficiency are viewed as desecrations against the national will, not merely personal moral failings."
ERO_bureaucratization_update_3:0 "Expand the Administrative System"
ERO_bureaucratization_update_3_desc:0 "The expansion of the administrative system marks a shift in the state's territorial control from 'point coverage' to 'comprehensive penetration'. An impersonal management network, like nerve fibers, extends to the frontiers. By establishing standard provincial governance templates, unified weights and measures, and a vertical audit system, loose local powers are brought completely under the jurisdiction of the imperial code."
