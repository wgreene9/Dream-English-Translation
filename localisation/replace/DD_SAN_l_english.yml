estate_Paroikoi_tolerance_desc: "The Empire temporarily tolerates these foreigners maintaining their own identity. This is not out of respect, but because they must still exist as a foundation of the Empire before they are thoroughly purified."
estate_Paroikoi_grant_liberties: "Grant Right of Migration"
estate_Paroikoi_grant_liberties_desc: "Exceptional Paroikoi are permitted to leave the land and settle in the cities. This is God's reward for the obedient, and also serves to dilute the concentration of potential rebels."
estate_Paroikoi_ban_on_minority_enlistment: "§OParoikoi Enlistment Ban§!"
estate_Paroikoi_ban_on_minority_enlistment_desc: "Profane and untempered flesh is unworthy to wield the Roman sword. The army must maintain absolute purity; the Paroikoi need only provide labor in the rear."

estate_Paroikoi_lighter_Paroikoi_taxes: "Tithe Exemption"
estate_Paroikoi_lighter_Paroikoi_taxes_desc: "Temporarily lighten the heavy tax burden to appease those souls trembling at their first true experience of imperial majesty. This is a tactical concession."
estate_Paroikoi_manpower: "Conscription of Consumables"
estate_Paroikoi_manpower_desc: "While the sacred steel of the Saints cuts down sin ahead, the Paroikoi shall be conscripted into the auxiliary forces. Their lives are of little value, but their deaths can pave the way for the Empire."
estate_Paroikoi_mandatory_cultural_assimilation: "Overwrite Existence"
estate_Paroikoi_mandatory_cultural_assimilation_desc: "Erase their lowly languages and customs. This is a sacred cultural baptism, making them realize: only by integrating into the Roman order does their life gain meaning."
estate_Paroikoi_promote_product: "Sacred Consecration"
estate_Paroikoi_promote_product_desc: "Oversee the Paroikoi laboring on the land. In the alchemical logic of the Empire, their sweat is the fuel that keeps this holy war machine running."
