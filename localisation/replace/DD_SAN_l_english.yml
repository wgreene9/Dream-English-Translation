estate_Paroikoi: "Paroikoi"
estate_Paroikoi_desc: "The Paroikoi refer to foreign peoples absorbed into the rule of the Empire. Though not quite slaves, they are bound by law to the lands they till, paying taxes to the government, working the land and paying taxes for the state."
estate_Paroikoi_land_rights: "Paroikoi Land Rights"
estate_Paroikoi_land_rights_desc: "The Paroikoi are permitted to own their own land within certain limits, so that they may better contribute to the state."
