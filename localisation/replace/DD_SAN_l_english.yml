ERO_restoring_enthusiasm_interactions_3:0 "Forge Consensus"
ERO_restoring_enthusiasm_interactions_3_desc:0 "A shattered realm requires a unified soul. By patronizing scholars, parading icons, and reaffirming the laws, we transform scattered restoration fervor into absolute loyalty to the throne."
ERO_restoring_enthusiasm_interactions_2:0 "Encourage Production"
ERO_restoring_enthusiasm_interactions_2_desc:0 "Call upon the people to channel their fighting spirit into rebuilding the ruins: clearing aqueducts, reopening mines, mending plowshares. Every turning mill, every bolt of woven silk, is a slow accumulation of greater strength through the resilience of civilization."
ERO_restoring_enthusiasm_interactions_1:0 "Muster the Able-bodied"
ERO_restoring_enthusiasm_interactions_1_desc:0 "The call to arms is no longer a cold decree, but a resonance of blood. Young men filled with righteous fury answer from the fields, volunteering their blood and sweat for the great cause of restoration."
ERO_interactions_3:0 "Judgment of Alien Customs"
ERO_interactions_3_desc:0 "Under the Empire's jurisprudence, alien customs are no longer seen as traditions, but as places where order has not yet arrived. The tribunal will dispatch clergy and administrators to reshape their language, rites, and memory."
ERO_interactions_2:0 "Edict of Reckoning"
ERO_interactions_2_desc:0 "We shall summon the populace to the great cause of reckoning and judgment, not for the sake of profit, but to repay the debts of history. Armaments are forged with priority, reinforcements are allocated with priority, and siege engines operate day and night."
ERO_interactions_1:0 "Consolidate Orthodoxy"
ERO_interactions_1_desc:0 "The Empire's foundation rests upon its orthodox people. When heretics are dispersed and order is restored, the core nation shall be reawakened. The tribunal not only punishes the deviant, but also rewards the loyal. Those who acknowledge the Empire as a symbol of the Heavenly Kingdom shall see their lands prosper, their offspring thrive, and their labors yield more abundant fruit."
ERO_holy_order1_effect:0 "Monthly §TImperial Bureaucratization§! is gained from the total development of provinces with §MEstablished Local Administrative Offices§! (each point of development contributes §G0.005§!)."
