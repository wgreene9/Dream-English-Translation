ERO_Exarchate_vassal_title:0 "Exarchate"
ERO_Exarchate_vassal_title_plural:0 "Exarchates"
ERO_Exarchate_vassal_is_our:0 "§Y$NAME$§! is our Exarchate"
ERO_Exarchate_vassal_long_desc:1 "An Exarchate is a region governed by an Exarch appointed by the central imperial government. Its jurisdiction often encompasses several smaller-scale themata. It is of a higher level than a typical theme and exhibits lower centrifugal tendencies, as the Exarch is usually a close confidant of the Emperor himself, rather than a hereditary ruler. The most notable historical example is the Exarchate of Ravenna, whose administrative scope covered all of coastal Northern and Central Italy. It represented one of the Empire's few military presences in Western Europe, until its eventual fall to the Lombards."
ERO_Exarchate_vassal_reform:0 "Exarchate"
ERO_Exarchate_vassal_reform_desc:0 "The Exarchate serves as the civil and military authority of the Empire in non-core territories, governing on behalf of the Emperor. The military governors (dukes) and infantry commanders (magistri militum) within the Exarchate's jurisdiction must all submit to the authority of the Exarch. This establishes a relatively strict and complete political system, making it a vital local administrative institution of the imperial government."
enable_ERO_Exarchate_effect:0 "§TUnlocks§! the special action £ERO_icon1£§Y Convert to Exarchate§! for vassals in the §YInfluence§! diplomatic screen."
convert_subject_to_Exarchate_title: "£ERO_icon1£Convert to Exarchate"
convert_subject_to_Exarchate_tooltip: "Spends §R50§! Administrative power £adm£ and Military power £mil£, and reduces Land Force Limit by §R-10§! to transform the current vassal into an Exarchate authorized by the Empire, allowing it to assist the Empire in regional administration and provide more substantial local military forces."
convert_subject_to_Exarchate_desc: "The Exarchate serves as the civil and military authority of the Empire in core territories, governing on behalf of the Emperor. The military governors (dukes) and infantry commanders (magistri militum) within the Exarchate's jurisdiction must all submit to the authority of the Exarch. This establishes a relatively strict and complete political system, making it a vital local administrative institution of the imperial government.\n\nThis action will spend §R50§! Administrative power £adm£ and Military power £mil£, and reduce Land Force Limit by §R-10§!."

