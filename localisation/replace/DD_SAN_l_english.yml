monthly_ERO_bureaucratization:0 "Monthly §TImperial Bureaucratization§!"

ERO_bureaucratization:0 "§TImperial Bureaucratization§!"
ERO_bureaucratization_desc:0 "Imperial Bureaucratization is the core indicator measuring the efficiency of central government decree transmission and the depth of local administration. It reflects how the Empire, through its intricate network of branch offices, weaves scattered territories into a highly efficient state machine.\n\nGained monthly from provinces with §Testablished Local Administrative Offices§!: §G[Root.ero_bur_increase.GetValue]§!. This value is based on the §Ytotal development§! of such provinces (each point of development contributes §G+0.005§!, up to a maximum of §G+5.0§! monthly §TImperial Bureaucratization§! through this method).\n\n§YEach level of Administrative Advisor§! provides monthly §TImperial Bureaucratization§!: §G+0.1§!.\n "
DD_ERO_restoring_enthusiasm_power_desc:0 "§ORestoration Zeal§! burns brightly like an unquenchable sacred flame. It is not merely a political demand, but a faith and consensus already deeply integrated into the society of §Y[This.GetName]§!. It drives the exiles to gather strength in adversity, and transcends class and region to unite the remnants who refuse to accept the status quo.\n\nIt is both a mourning and remembrance of past disgrace, and a solemn covenant for the path ahead – not only to recover lost territories in a geographical sense, but to exact blood vengeance upon those who usurped our ancestral lands, to make the cross of the Orthodox Church stand once more above the dome of Hagia Sophia, and to restore the realm of the Romans to its former glory.\n\nThe following actions §Yaffect§! §ORestoration Zeal§!:\n- Every §Y1000§! casualties inflicted in §Ybattles§! (§G+[GetdoubleRestoring_Enthusiasm]§!), up to §G+[GetMaxRestoring_Enthusiasm]§!\n- Winning a major war (§G+10§!)\n- Winning a war (§G+5§!)\n- Recruiting a land general (§G+5§!)\n- Recruiting an admiral (§G+5§!)\n- Losing a war (§R-20§!)\n "
DD_ERO_restoring_enthusiasm_power_gain_modifier:1 "§ORestoration Zeal§! Gain Modifier"
ERO_Enthusiasm_double_tooltip:0 "The effect of gaining §ORestoration Zeal§! through §Ybattles§! is §Gdoubled§!."

monthly_DD_ERO_Flame_of_Divine:"Monthly §OFlame of Divine Punishment§!"
DD_ERO_Flame_of_Divine:0 "§OFlame of Divine Punishment§!"
DD_ERO_Flame_of_Divine_desc:0 "§OThe Flame of Divine Punishment§! is the ultimate sublimation of §ORestoration Zeal§! catalyzed by fanatical faith. After centuries of trials, the society of §Y[This.GetName]§! has transcended mere national hatred and vengeance, now viewing itself as the physical vessel of God's wrath on earth. This ideology is no longer confined to the restoration of territories, but decrees the Empire as the sword-bearer executing the eschatological judgment – every war is a sacred act of purification, a ritual to consume all heresy, betrayal, and decay with relentless fire, until the Kingdom of Heaven is established on earth.\n\nThe following actions §Yaffect§! §OFlame of Divine Punishment§!:\n- Every §Y1000§! casualties inflicted in §Ybattles§! (§G+[GetdoubleRestoring_Enthusiasm]§!), up to §G+[GetMaxRestoring_Enthusiasm]§!\n- Winning a major war (§G+10§!)\n- Winning a war (§G+5§!)\n- Recruiting a land general (§G+5§!)\n- Recruiting an admiral (§G+5§!)\n- §YPillaging§! a province that is §Tnon-state religion§! or §Jnon-primary culture group§! (§G+5§!)\n- Developing a province of §Yprimary culture group§! (§G+3§!)\n- Losing a war (§R-20§!)\n- Developing a province of §Ynon-primary culture group§! (§R-6§!) \n\n When §RTempering§! reaches §Y50§!, the forge will commence a new forging, and the §OFlame of Divine Punishment§! will be sublimated once (up to a maximum of §Y4§! times). After four forgings, the Empire will have completely transcended spiritually. The following actions accumulate §RTempering§!:\n- §YPillaging§! a province that is §Tnon-state religion§! or §Jnon-primary culture group§!\n- §YExploiting§! a province that is §Tnon-state religion§! or §Jnon-primary culture group§!\n- Converting a province to our nation's §Yprimary culture group§!\n- Converting a province to our nation's §Ystate religion§!\n\nCurrent §RTempering§!: §G[Root.ero_flame_counter.GetValue]§!§Y/50§! \nCurrent §VSublimation Stage§!: [Get_ERO_flame_stage]"
Get_ERO_flame_stage0:0 "§MPeople of the Furnace§! (§Y1/5§!):\n§Y[This.GetName]§! still remembers the shape of suffering. The Empire views exile and hardship as God's trial, not punishment. Pain is redefined as selection, and the survivors deem themselves chosen. Rome is still a nation of mortals, but its soul has been placed within the furnace."
Get_ERO_flame_stage1:0 "§MStripping of Suffering§! (§Y2/5§!):\n§Y[This.GetName]§! begins to redefine mercy. Forgiveness is seen as indulgence, destruction as purification. The Empire's wars are no longer vengeance, but precise surgery of order upon chaos. Emotions are tempered, morality begins to be restructured."
Get_ERO_flame_stage2:0 "§MSacred Cruelty§! (§Y3/5§!):\n§Y[This.GetName]§! is no longer merely a state, but the material embodiment of God's order on earth. Lands beyond its borders are viewed as chaos, lands within as existence itself. Imperial expansion is understood as the extension of light, not the plunder of territory."
Get_ERO_flame_stage3:0 "§MLiving Icon§! (§Y4/5§!):\n§Y[This.GetName]§! no longer acts on mortal emotions. Anger is sublimated into divine will, war becomes a ritual enacting providence. The Empire's actions are calm and resolute, as unstoppable as the movement of the stars. In the twilight of hesychasm, only sacred wrath remains."
Get_ERO_flame_stage4:0 "§MAscension of Being§! (§Y5/5§!):\n§Y[This.GetName]§! has attained a tranquility like marble. Imperial expansion is seen as the extension of being, war as the rebalancing of the cosmic order. Mortals cannot judge miracles, and the Empire, henceforth, needs no justification."

