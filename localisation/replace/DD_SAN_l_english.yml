DD_ERO_ideas_start:0 "Rhomaion Traditions"
DD_ERO_ideas_bonus:0 "Rhomaion Ambition"
SAN_basic_ideas_1:0 "The Final Bastion"
SAN_basic_ideas_1_desc:0 "When the heart of the world lay in ruins, when the golden walls came crashing down, the towering mountains of Epirus became Rome's final backbone. The iron hooves of barbarians might trample the tranquility of the plains, but they could not surmount these natural defenses. We held fast within the rugged Pindus range, using the mountains as our armor, the gorges as our moats, gathering strength until we could reclaim Thessalonica. We were the last bulwark of the old Empire, the absolute line of defense against the slaughter and plunder of the Latin miscreants. As long as this bastion stood, Rome was not yet dead."
SAN_basic_ideas_2:0 "Noah of the West"
SAN_basic_ideas_2_desc:0 "Like the Great Deluge that engulfed the world, the faithless Crusaders drowned civilization in a sea of blood. We were the sole ark amidst those towering, filthy waves. Scholars, nobles, artisans, and clergy fleeing Constantinople journeyed west, seeking refuge. We not only sheltered these displaced people, but preserved the very spark of Greco-Roman culture. In this chaotic age, we were the guardians of civilization, a beacon of hope for the desperate, the one safe haven in a collapsing world."
SAN_basic_ideas_3:0 "Will to Restore"
SAN_basic_ideas_3_desc:0 "To find comfort in a corner of the land is not our desire; our hearts are sworn to return to the Queen of Cities. Though we temporarily dwell in desolate Epirus, our gaze has never left that crown of cities on the shores of the Bosporus. Each time we look eastward, the pain in our hearts transforms into the drive to press forward. We are not exiles clinging to life, but conquerors who have temporarily withdrawn. The recovery of Thessalonica is but the first step; our ultimate goal shall forever be the Empress of Cities—Constantinople. This resolve shall not waver until death."
SAN_basic_ideas_4:0 "Strike from the Shadows"
SAN_basic_ideas_4_desc:0 "In an age surrounded by powerful foes, blind recklessness invites only destruction. We learned to lie coiled like a serpent, sharpening our blades in the shadow of the rocks; we learned to maneuver like a fox, seeking opportunity amidst complex diplomacy. We parleyed with the Bulgarians, we dissembled with the Latins, all to await the one, fatal strike. Patience is not cowardice, but the means to unleash a thunderous wrath when the moment is ripe."
SAN_basic_ideas_5:0 "Settling Blood Debts"
SAN_basic_ideas_5_desc:0 "'Revenge is a dish best served cold, and not to be rushed.' Our chronicles still record every blood debt: every church put to the torch, every kinsman enslaved, every humiliation suffered at the hands of the Latins, every burning hatred kindled by barbarian slaughter. Though the ledger is thick, the day of reckoning will come. We do not hasten for momentary satisfaction, but shall let the usurpers watch their doom approach in fear. When that cold dish is finally served, it will mark their death."
SAN_basic_ideas_6:0 "Legacy of the Orthodox Church"
SAN_basic_ideas_6_desc:0 "Usurpers and the false Catholic Church claim legitimacy, yet dare not look upon the pure faith in our hands. When the Hagia Sophia was defiled by the heresy of the Latin rite, when the Ecumenical Patriarch was cruelly imprisoned by the Crusaders, it was we who welcomed the exiled Orthodox clergy and preserved the purity of doctrine. In this land, the ancient hymns are still sung in Greek, the sacred rituals unchanged. We are the true agents of God on Earth, the defenders of the Orthodox Church, unlike those who grovel before the Pope."
SAN_basic_ideas_7:0 "Noble Bloodline"
SAN_basic_ideas_7_desc:0 "We, who carry the noble blood of the Komnenodoukai, coursing with the strategic genius of Alexios Komnenos—our lineage traces directly to the innermost sanctum of the Porphyra. The purple may be temporarily sullied, but noble lineage cannot be forged. If not us, who else holds legitimate claim to the Imperial throne?"
ERO_punish_Bulgaria_effect:0 "Lose §G-5§! years of separatism when §YRazing Provinces§!.\n"

DD_SAN_Personal_event.1.t:0 "The End of the House of [Root.Monarch.Dynasty.GetName]"
DD_SAN_Personal_event.1.d:0 "The stone slabs beneath his feet trembled—the battering ram of the army of [SAN.GetName] outside the city pounded against the gates, each strike like a death knell tolling for this city. The walls of Larissa were already riddled with breaches, the garrison was nearly annihilated, every brick and stone soaked with blood. The air was thick with the foul stench of rotting corpses mingled with scorched wood—the most primal odor of death.\n\n[Root.Monarch.GetName] stood alone atop the tower, examining by the dim, flickering candlelight this defense map, already torn and useless, for the last time. Even the most optimistic commander had to admit that dawn might bring the end. He turned, his gaze passing through the dust-covered window lattice, falling upon the simple bed in the inner chamber—where his wife and children slept. Even in their dreams, their brows were furrowed, as if unable to escape the shouts and crashes from beyond the walls.\n\nAs the last Duke of the Kingdom of Salonica, he knew well the value [SAN.Monarch.GetName] placed on his head. Before him lay only two paths: either, like his proud Crusader forebears, lead the remaining soldiers out to meet the enemy, trading a futile bloody battle for a measure of irrelevant glory; or... use what the enemy desired most—his own life—as a bargaining chip to buy the last remnants of his bloodline a slim chance of survival in this chaotic world.\n\nThe candle was about to burn out, just like the fortunes of Thessaly. Whatever his choice, [Root.Monarch.GetName] would flee no longer; death was the predetermined end. If this body was fated to be unable to save the duchy, then at least he could still leave something behind for his family."
DD_SAN_Personal_event.1.a:0 "Draft the letter of surrender... Let my blood pay the debt for all of this."
DD_SAN_Personal_event.1.b:0 "My brothers in arms, follow me! Fight to the last, then fall upon our swords!"
DD_SAN_Personal_event.2.t:0 "Sunset Over Larissa"
DD_SAN_Personal_event.2.d:0 "The siege had been long; the battered ramparts of Larissa could no longer withstand the relentless assaults of our army. The banners of [Root.GetName] filled the camps, stretching to the horizon like an iron forest; the sparse lights atop the city walls flickered in the night breeze, as precarious as this crumbling rule. The night deepened, and the sounds of battle nearly subsided. The recovery of Thessaly was imminent; there was no need to let our soldiers sacrifice themselves in vain. Yet, in the midst of this grim silence, an envoy entered the camp. Unarmored and unarmed, he passed through the solemn ranks, knelt before the tent of [Root.Monarch.GetTitle] [Root.Monarch.GetName], and presented a final, desperate letter of surrender.\n\nIn the letter, [SSL.Monarch.GetTitle] [SSL.Monarch.GetName] acknowledged that the situation was lost. He sought no forgiveness, nor would he remain besieged in a lonely city, bringing calamity upon its people. His only request, humble yet resolute:—if the Empire would accept his surrender, might his wife and children be spared, and be permitted, by [Root.Monarch.GetTitle]'s grace, to follow a Latin fleet back to their ancestral homeland in Italy.\n\nIn exchange, he offered his head and his dignity, using his blood as a lesson to warn all future comers—this, then, is the fate of those who dare defy [Root.GetName]. As the envoy finished speaking, a deathly silence fell over the tent. Only the crackling of the charcoal fire could be heard, as if providing a final footnote to the end of an era."
DD_SAN_Personal_event.2.a:0 "Grant his request."
DD_SAN_Personal_event.2.b:0 "A traitor, and he dares to beg for surrender?"

DD_SAN_Personal_event.3.t:0 "The Grief of Salonica"
DD_SAN_Personal_event.3.d:0 "[Root.Monarch.GetName] nodded slightly—[Root.GetName] had accepted the pact. The envoy withdrew with a kowtow, as if this brief negotiation had never occurred.\n\nAt daybreak the following morning, in the sparse light of dawn, the smell of scorched earth still lingered in the cold wind. [Root.Monarch.GetName] personally led the main army before the city; the two forces faced each other across the field in utter silence. At that moment, [SSL.Monarch.GetTitle] [SSL.Monarch.GetName], clad in full armor, ascended the tower directly facing [Root.Monarch.GetName]. His battle dress seemed far more solemn than the simple robe of yesterday—composed and restrained. He looked less like a rebellious subject about to meet his doom, and more like a martyr approaching the altar.\n\nFrom afar, he saluted [Root.Monarch.GetName]—a gesture of surrender, a farewell, and a silent confirmation of the previous night's pact. Then, turning, he leaped, plunging from the city wall. His figure cut through the thin mist, tracing a brief and resolute arc, before finally crashing heavily onto the scorched earth beside the city, raising a cloud of dust.\n\nAfter a moment of deathly silence, the city gates slowly opened to the low groan of the winches. There was no ambush, no treachery; we occupied the city almost without drawing a sword. Soldiers found the widow and her young son in the inner chambers of the ducal palace. The Duchess stood silently beside the cradle, her hand, trembling slightly from prolonged exhaustion and gnawing fear, guarding the child.\n\nThough the dust had settled, a silent sigh still lingered in the air—the Duke would never again return to the halls he had once guarded, never again gaze upon his child's sleeping face in the morning light, nor clasp his wife's cold hand through the long nights. With one resolute fall, he had written the final chapter for his duchy.\n\nYet, was a pact made with such a faithless one still worthy of being honored by the Empire? The iron laws of reality are ever cruel—with victory decided, the weight of an oath often depends solely on the victor's whim."
DD_SAN_Personal_event.3.a:0 "The blood debt is paid. Let them go."
DD_SAN_Personal_event.3.b:0 "Why should we keep faith with the faithless?"
DD_SAN_Personal_event.4.t:0 "The Knight of Salonica"
DD_SAN_Personal_event.4.d:0 "The unfinished piece of parchment was cast into the dying hearth, instantly turning to ash, vanishing along with the last trace of any thought of compromise.\n\n[Root.Monarch.GetName] donned his traditional heavy armor, polishing the emblem of the Kingdom of Salonica on his shield for the last time until it shone. As he pushed open the gates of the fortress, the remaining knights and men-at-arms in the courtyard were already drawn up in silence, waiting. Their armor was broken, their bodies covered in blood and grime; in the flickering, dying light of the fires, what burned in their eyes was not the fear of death, but the frenzy of cornered beasts.\n\nEven if God no longer favored Thessaly, true knights still refused to bow to reality. Better to make this doomed defeat the final chapter of a great epic, than to survive as a man whose kingdom was lost, living on the charity of [SAN.Monarch.GetName].\n\nWith a shrieking howl from the winches, the city gates crashed open, and the biting wind of morning swept within. Facing the army of [SAN.GetName], surging towards the city like a tidal wave, [Root.Monarch.GetName] raised his lance high and charged towards the camp of the Greeks. This would be their final mass, their one and only funeral."
DD_SAN_Personal_event.4.a:0 "The knights of Salonica know not how to kneel. Whatever comes, he will give his life for his country!"
DD_SAN_Personal_event_4_tooltip:0 "The knights of Salonica know not how to kneel. Whatever comes, he will give his life for his country!"

DD_SAN_Personal_event.5.t:0 "The Drowned Duke"
DD_SAN_Personal_event.5.d:0 "It was a perfect charge—at least, it started that way.\n\n[Root.Monarch.GetName] roared as he was the first out of the gate, slamming like a steel wedge into the enemy ranks. In that heroic moment, he truly seemed to channel the legendary martial prowess of his ancestor Boniface, cutting down several stunned infantrymen. Yet God, it seemed, had decided to play a cruel joke on this bloody morning.\n\nWhether it was a stray arrow from a trembling, inexperienced conscript, or simply panic brought on by the cacophony of clashing metal, the Duke's caparisoned warhorse suddenly went berserk. It wheeled madly, unseating its struggling master, and plunged headlong, man and beast together, into the swollen Peneios River.\n\nA profound, philosophical silence fell over the battlefield. Soldiers on both sides stared, dumbfounded, at the scene. That expertly crafted suit of knightly plate armor, designed to turn the sharpest blade, now faithfully performed its duty as the world's most expensive diving weight. He floundered in the murky water like an iron turtle flipped onto its back, then sank like a stone.\n\nThis was not the glorious end he had dreamed of in his youth. He had imagined falling in battle like Leonidas, bathed in blood. Instead, he was forced to pay 'homage' to Barbarossa—watched in solemn silence by the armies of both sides, his final testament was a stream of gurgling bubbles rising to the surface. With a suffocating sense of irony, he made his elegant exit just as the war was truly beginning, without a single drop of blood spilled or a single cry of pain."
DD_SAN_Personal_event.5.a:0 "We won't even need to retrieve his body."
DD_SAN_Personal_event.6.t:0 "The Fall of a Lion"
DD_SAN_Personal_event.6.d:0 "As the charge led by [Root.Monarch.GetName] crashed into the lines of [SAN.GetName], the world seemed to pause for an instant amidst the deafening clash of metal. This was no equal contest, but the final, desperate fight of a cornered lion against a pack of wolves. His lance shattered in the first impact; drawing his sword, the Duke wielded it like the scepter of judgment, cutting down every enemy who dared approach. In that brief half-hour, driven by his fervent faith in God and honor, he truly carved a bloody gash into the enemy's dense phalanx.\n\nYet mortal valor could not turn the tide of fate. As his warhorse fell with a mournful whinny, the Duke found himself in a thicket of bristling spears. But he refused to fall. Even as his armor was soaked through with blood, even as his vision blurred from loss of blood, he still swung his shattered blade, fighting to the very last.\n\nWhen the battle finally ended and the soldiers of [SAN.GetName] gathered around, an eerie silence fell over the field. [Root.Monarch.GetName], propped up by countless spears, had died in a half-kneeling posture, still facing the enemy, his eyes wide with defiance. Before this broken shell of a man, even the enemy commander slowly removed his helmet—the final, highest honor that could be paid to a true knight."
DD_SAN_Personal_event.6.a:0 "To die thus is far better than to live on in disgrace."

DD_SAN_Personal_event.11.t:0 "Shadows of the Past"
DD_SAN_Personal_event.11.d:0 "That smell, a mixture of horse sweat and earth, still lingers like a specter in the corridors of the court, impossible to dispel.\n\nFather is dead.\n\nThe man hailed as a hero by all, the man who held me in his arms and told me ancient fables, the man I thought would never fall—dead, not from a Latin heavy crossbow bolt, but from a grotesque hunting accident. Fate can be so cruel it borders on mockery.\n\nI sit on this throne, still slightly too large for him, my feet dangling just above the floor. The wind howls outside the tent, the chill seeps up from the ground, and I cannot stop shivering. Ioannes Sgouros stands to one side of the throne, his shadow cast long by the firelight, stretching across the floor, nearly enveloping me completely.\n\nAt the funeral, when he took my hand, I already felt that chill clearly—the calluses on his palm, the roughness honed by long years of sword and power, instinctively caused me pain. He placed a cold medal in my hand, then leaned close, his voice barely a whisper: 'My Lord, tears are for the unimportant. From this day forward, any hesitation will be seen as a weakness, any softness will draw predators.'\n\nI hate him. I hate the solemn silence in his eyes. I hate that he did not shed a single tear for Father. As Father's dearest friend, the way he looks at me is not like looking at a sovereign, but more like scrutinizing a piece of unformed raw iron. Is he guiding me, or is he ruling this remnant of a land in my name?\n\nI am afraid. But what disturbs me more than the fear is this: I know clearly that if he were to let go of my hand at this moment, I would plummet into the abyss, without even time to struggle."
DD_SAN_Personal_event.11.a:0 "His palm is so cold... but for now, I must hold it tight."

DD_SAN_Personal_event.12.t:0 "The Eve of Restoration"
DD_SAN_Personal_event.12.d:0 "Thessalonica lies ahead. The banners of the Latins tremble in the damp evening breeze, as if foreseeing their own destruction. The strategies brought by Ioannes are as precise as his archery; like plucking the strings of a lyre, he played upon the greed of the Melissenos family, making them begin their ugly, desperate infighting under the pressure of the siege. We won that game without moving a single soldier. But the poisonous weed in my heart grew wildly in the salty sea wind.\n\nThe whispers in the court never cease. They say Ioannes is the true 'Shadow King,' that the House of Sgouros will eventually replace the Komnenodoukai, completing that unspoken succession.\n\nI began to deliberately contradict him in council meetings, to veto his proposals—proposals so flawless they only served to make me seem more superfluous. In the dead of night, I would even repeatedly touch the dagger hidden beneath my pillow—that cold, certain blade was the only authority I could be sure was not his.\n\nAt dinner, the air was thick enough to choke on. I swirled the wine in my cup, red as blood, my gaze passing over the liquid to rest upon the man across from me, the man who had taught me everything and also overshadowed me in everything.\n\n'Ioannes.' I broke the silence suddenly, my voice echoing coldly through the vast hall. 'If I die in battle tomorrow, would you place this heavy golden crown upon your own head?'\n\nThe true master of the Empire fell silent.\n\nHe refilled my cup. I noticed the hand that had crushed the throats of countless enemies trembled slightly—not from hesitation, not from fear, but from old wounds protesting silently in the cold night air. He looked me straight in the eye, his voice calm and measured, almost carrying a ritualistic devotion: 'My Lord, if you die in battle, I would lead your horse and continue to clear the path before you.'\n\nI gave a cold laugh and turned my head away, avoiding his gaze. I did not believe him.\n\nIn this shattered Empire, there has never been such a thing as loyalty without expectation of reward. Ioannes, you are merely playing a more patient, longer game—waiting for me to become strong enough to be used by you... or weak enough to merely survive, gasping, beneath your wing.\n\nAnd in that moment, the ledger in my heart had already written the answer: As long as you still stand, I will never be able to stand in the sunlight."
DD_SAN_Personal_event.12.a:0 "Do you think this cup of wine can hide the ambition in your eyes?"

DD_SAN_Personal_event.13.t:0 "The Grief of Epirus"
DD_SAN_Personal_event.13.d:0 "I still clutch tightly in my hand that letter which arrived some days ago; my fingertips can still feel a trace of warmth lingering on the parchment. It was penned by Ioannes Sgouros himself, his handwriting bold and vigorous, carrying a triumphant force that seemed almost ready to burst from the page. In the letter, he discussed the next steps in our plan, spoke of a victory feast where we would raise our cups together. Countless times I had feared his monopoly on power, resented that ever-present shadow of protection, and even upon opening that letter that night, I had secretly fretted over his impending arrival.\n\nYet reality's reckoning was far colder than I.\n\nWhen that messenger, still spattered with the drying mud of the Pindus Mountains, burst into the hall, time and space seemed to shatter absurdly before my eyes. He could not even complete a full prostration before collapsing, exhausted, onto the cold stone floor, his hand desperately clutching a letter soaked through with dark, dried blood.\n\nIoannes is dead.\n\nHe did not die shielding me in battle, but on the road, while gathering funds for my campaign. In his official residence at Arta, as he was finalizing the last shipment of military funds bound for Thessalonica, an assassin disguised as a porter slit his throat with a poisoned blade.\n\nFollowing the dire news came tidings of the fall of all Epirus. That shameless man, Nicholas Orsini, usurped the western provinces amidst the chaos. Those lords who had once sworn fealty, whom Ioannes in his letters had described as 'having bowed their heads,' turned one by one to the usurper while his body was still warm. I gazed out from the window into the cold wind, and found I could no longer weep."
DD_SAN_Personal_event.13.a:0 "You took the last of my weakness with you, Ioannes. Now, I stand alone."
DD_SAN_Personal_event.14.t:0 "Absolute Rule"
DD_SAN_Personal_event.14.d:0 "I ordered the execution of three officers involved in the embezzlement of military supplies. One of them had once been among my most trusted attendants.\n\nHe knelt on the ground, pleading, invoking his family name, recalling the years we had shared together, as if those memories still held some weight. I merely watched him silently, watching the hope in his eyes crumble, bit by bit, until only naked fear remained. My heart did not stir; my hand did not tremble.\n\nI realized that my earlier leniency had forged all of this. I had granted him privileges far exceeding his capabilities, leading him to mistakenly believe that loyalty could substitute for duty, that closeness could conceal transgression. The error he committed was no longer mere greed, but a challenge to the very principle of order. In that moment, I finally understood the look Ioannes had once directed at me, all those years ago. In the face of ledgers, memorials, and maps, blood ties, sentiment, friendship—once that line is crossed—are merely numbers to be crossed out.\n\nI have seen my past self in dreams. That youth, shivering from cold and fear, standing behind Ioannes, still hoping someone else would make decisions for him.\n\nI killed him.\n\nIn one sleepless night after another, I strangled with my own hands that Michael who yearned for warmth, for protection, for escape from responsibility.\n\nI no longer need a guiding hand. I have forged myself into Ioannes Sgouros.\nNo.\nI am colder than him.\nHe still retained his loyalty to my father, but I—\nI answer only to order, and I reckon only with those who defy it."
DD_SAN_Personal_event.14.a:0 "This is not cruelty, but the price of order."

DD_SAN_Personal_event.15.t:0 "Night of Mourning I"
DD_SAN_Personal_event.15.d:0 "The cold wind of the Pindus Mountains howled sharply against the stone walls of the Panagia Paregoretissa Monastery, a piercing wail like a lament that had not faded for over a century. The air within the courtyard was thick and cold, a mixture of the greasy smell of aged candle wax and the characteristic dampness of the mountains. I walked slowly, the austere echo of my boots striking the slick stone slabs stretching infinitely beneath the empty dome.\n\nMy father's sarcophagus was carved from fine marble. My fingers traced slowly across the cold incisions of the epitaph. Epirus was restored, yet he, this hero revered by tens of thousands, had met his absurd end in a hunting accident, dying just before the Empire's most glorious dawn.\n\nI had once envied his fortune. In that time, he could still live in the love of the world as a mortal possessing the 'weakness of power'; while I could only let that love wither into fear, let my own gaze become more terrifying to all living things than the iron hooves of the Latins. What he left me was never merely a shattered and reborn Empire, but a labor of Sisyphus from which I could never awaken.\n\nFrom within my robe, I took out a medal stained with traces of dark, dried blood—the object found on Ioannes' chest at the moment of his death. I placed it gently upon the lid of the sarcophagus. The sound of metal striking stone was faint, almost humble.\n\nI turned and left, never looking back."
DD_SAN_Personal_event.15.a:0 "Your era has finally passed."
DD_SAN_Personal_event.16.t:0 "Night of Mourning II"
DD_SAN_Personal_event.16.d:0 "In the darkest corner of the tomb stood a relatively simple stele. No lengthy titles or honors, only a single, restrainedly inscribed name: Ioannes Sgouros.\n\nI gazed at the carving upon the stone surface for so long that the incense in the burner had burned out completely, leaving only a wisp of cold, lingering smoke. 'You win, old man,' I whispered to myself, my voice sounding strange in the narrow tomb. 'I have become just like you. No, I am more thorough than you ever imagined.'\n\nFrom beneath my cloak, I produced a yellowed ledger—the list of nobles I had personally settled accounts with over the years for colluding with the Latins. I cast it into the ever-burning oil lamp nearby; the flames greedily consumed it, reducing the names that had once haunted my sleepless nights one by one to ash.\n\n'I doubted you countless times. I doubted whether your loyalty was greed in disguise, whether your teachings were a prelude to usurpation. Yet you simply died like that in Arta, on an ordinary winter's day, leaving all those suspicions as an unresolved case with no one left to confront.'\n\nThe ashes danced in the faint breeze, blurring the inscription on the stele, and blurring my vision as well. 'But I understand now. Regardless of the truth, you were a qualified mentor. You taught me that I should not believe in true loyalty in this world; with your own blood, you washed away the last vestiges of mortal naivety clinging to me. You forged me into a monster, Ioannes—a sovereign capable of calmly facing anything, yet incapable of ever depending on anyone again.'\n\nWithout lengthy mourning, I bent down and placed a single white flower before the simple stele. The petals seemed somewhat glaring in the shadows, much like my own clarity at this moment."
DD_SAN_Personal_event.16.a:0 "You win, old man. You forged me into a monster."

DD_SAN_Personal_event.17.t:0 "Passing into Eternal Night"
DD_SAN_Personal_event.17.d:0 "The crown is heavy, so heavy it nearly crushes my spine.\n\nThe entire city is in celebration; the ten thousand flickering candles of the Hagia Sophia sway like a sea of stars, dazzlingly bright. Yet standing alone at the heart of this splendor, I feel only an bone-deep chill, as if this radiant age of glory has nothing to do with me.\n\nI won. I reclaimed everything our ancestors lost in shame, settling with my own hand the blood debts the Latins had accumulated over generations. Yet the moment I stepped down from the coronation altar, I still instinctively turned aside, trying to avoid that tall, slender shadow that had once stood countless times in the darkness, nearly eclipsing me.\n\nBut no one was there.\n\nI look at myself in the mirror—a face completely bleached by power, resculpted by ruthlessness. Within this shell, there is no longer any 'Michael'; only something bearing the Empire's will, draped in my flesh, remains. I abandoned laughter, suppressed sincerity, severed with my own hand all the simplicity and weakness that define a human being—all to buy this precarious newborn Empire even a single moment's respite.\n\nIf God wishes to judge me, let Him judge.\nThe storm is subsiding.\nAnd I—\nHave become the eternal night."
DD_SAN_Personal_event.17.a:0 "The crown is so heavy. Ioannes, are you already waiting for me in hell, ready to lead my horse?"
DD_SAN_Personal_event.18.t:0 "Fragments of a Diary"
DD_SAN_Personal_event.18.d:0 "While hunting near Arta and residing in the old Sgouros residence to peruse Ioannes' mountainous ledgers, Michael discovered several loose pages at the bottom of an iron chest wrapped in old sheepskin.\n\nAs he opened the pages, a gust of air mixed with aged pine resin and earth rushed towards him. Michael's fingertips paused slightly. That bold, slightly slanting Greek script was the handwriting he knew by heart from every single annotation on state documents. The Pindus mountains were too damp; the unending mist seemed to have permeated this heavy iron chest, and the pages felt chillingly moist to the touch. Encased in humidity, the ink had not even faded with time, the edges slightly blurred as if the ink had been laid down only yesterday.\n\n'To Isaakios:\n\nIt is the rainy season in the Pindus again. This damp cold reminds me of the hunt we shared as youths by Lake Pamvotida. We were not yet bound by these weighty responsibilities then, merely two boys riding fast horses, full of vain dreams. I remember your laughter, your face streaked with blood as you pursued that old stag. Michael nowadays resembles you from back then more and more.\n\nOnly he is calmer than you, and more skilled at calculating gains and losses. Today at the council, he rejected my proposed defensive arrangements. That sharp, restrained scrutiny, though still somewhat immature, is growing ever more adept. Isaakios, I am truly gratified. He is becoming exactly what the Empire needs most—cold, hard, unassailable.\n\nYou and I once spoke through the night about the cruelty of this land. The malice of the Latins has not diminished, internal usurpers still stir restlessly, barbarians on all sides watch our decaying flesh like vultures. If he is not sharp enough, he will be devoured alive by these schemers; if a shred of weakness remains in his heart, this foundation we have built will shatter completely in his hands. I must forge him into the coldest iron, capable of swallowing all this poison and treachery.\n\nEvery dawn, as I watch him inspect the army formations beneath the White Tower, a feeling arises in my heart, an almost extravagant hope. I seem to already glimpse that age after the restoration: the banners of the Latins fallen, our cavalry trampling the foam of the Aegean. This child will do better than us; he will reclaim, every last measure, everything we have lost.\n\nWhen all this is settled, when he can stand alone and support this newborn state, I think I will lay down these documents and this authority with ease. I wish to return to Arta, to the place where we first met, and spend my remaining years in the old house at Ioannina. In the valleys stained red by the sunset, I will raise a few fast horses myself, watch them run aimlessly across the wilds, gaze upon the young men riding hard, and seek the shadows of our younger selves.\n\nMichael still treasures the medal I pressed into his hand, often touching it in secret. He is still a tender shoot just breaking through the soil—young, vigorous, and rapid. Among the restless nobles, some can already barely hide their ambitions—but as long as I still stand, they dare not yet run wild.'"
DD_SAN_Personal_event.18.a:0 "Choose the finest horses for him, here and now."
DD_SAN_Personal_event_18_tooltip:0 "\n§TThough that man can no longer see it. Michael orders the establishment of an Imperial Stud at the old house mentioned in Ioannes' letter. Whenever he tours Epirus, he comes here, and in the sunset over the Pindus mountains, it is as if he can see two young men riding fast through the red valleys.§!\n"
SAN_consort_case_1_flag:0 "Consort: Anna Notaras"
SAN_consort_case_2_flag:0 "Consort: Helena Palaiologina"
SAN_consort_case_3_flag:0 "Consort: Eirene Strategopoulina"
SAN_consort_case_4_flag:0 "Consort: Theodora Gabrielopoulina"

DD_SAN_Personal_event.21.t:0 "The Commercial Pact of Thessalonica"
DD_SAN_Personal_event.21.d:0 "The docks of Thessalonica were immersed in the salty sea breeze and the cacophony of hawkers' cries rising and falling. A merchant fleet from Monemvasia had just come ashore; the silk and wine they brought were indeed sought-after commodities for the still-recovering city.\n\n[Root.Monarch.GetName], inspecting the market incognito, spotted a woman of mercantile background behind a noisy spice stall. Unlike traditional noble ladies who remained secluded, she stood openly in the sunlight, her slender fingers idly toying with a bag of expensive pepper. Even amidst the bustling crowd, her shrewd eyes scanned the area and, in a few glances, had already identified the disguised sovereign.\n\n'Greetings, my Lord!' She smiled and approached through the crowd, her voice not loud but precise enough to cut through the surrounding din, causing Michael to start slightly. She performed no elaborate courtly genuflection, instead presenting a parchment scroll bearing the Notaras family seal. It contained not only details of a substantial investment by the Notaras family in Thessalonica, but also a startling secret pact: the Notaras family would fully support His Majesty's rule in Macedonia, but in return, [Root.Monarch.GetTitle] was to use diplomacy, or even force, to assist the Notaras family in supplanting the current Latin rulers of the Principality of Achaia amidst the coming chaos.\n\n'We are investing,' she said, her gaze appraising, even carrying a hint of coercion. 'This land needs a player who understands both how to balance and how to sacrifice. What we want, in turn, is to use your hand to obtain... a ducal crown that shall ultimately bow to the Empire. What say you, Your Majesty, to this transaction?'"
DD_SAN_Personal_event.21.a:0 "A transaction where each takes what they need."
DD_SAN_Personal_event.21.b:0 "We cannot trust these mercenary types."
DD_SAN_Personal_event.22.t:0 "The Counterstroke of Monemvasia"
DD_SAN_Personal_event.22.d:0 "When the Venetian blockade was strangling the entire state nearly to the point of suffocation, Anna Notaras lit candles that burned through the night without cease in a side hall of the Blachernae Palace. Spread across the table before her were not defense maps, but densely written account books and letters bearing the private seals of various families. Through the underground network the Notaras family had cultivated for decades in Monemvasia and the Aegean, Anna precisely identified the Venetian fleet's Achilles' heel—the supplies for that vast armada did not originate from the lagoon metropolis itself, but depended on several Latin lords deeply indebted to the Notaras family.\n\n'Your Majesty, a blockade is an expensive game of patience,' Anna said, handing a signed secret agreement to [Root.Monarch.GetName], a cold gleam in her eyes. 'Last night, we began the process of freezing all credit for supplying fresh water and grain to the Venetian fleet. Those Venetian captains will find that their gold cannot buy so much as a loaf of bread in ports east of the Adriatic. Meanwhile, our 'friends' remaining in the Venetian Senate have begun spreading rumors about the excessive cost of this war.' With the immense financial power and web of connections of the Notaras family set in motion, the once-unified blockade line began to show cracks."
DD_SAN_Personal_event.22.a:0 "Let the Venetians pay the price as well!"

DD_SAN_Personal_event.23.t:0 "The Wind from Monemvasia"
DD_SAN_Personal_event.23.d:0 "In the Blachernae Palace now, under the meticulous management of Anna Notaras, even the air seemed saturated with a new atmosphere distinctly of Monemvasia: the rustle of expensive silk trailing over polished marble, urgent commercial dispatches delivered by fast courier from Venice and Genoa, and above all, the civil servants personally elevated by Anna—whose gaze upon the world showed keener interest in the purity of gold coins than in the truth of oaths sworn to God. Before this wind from Monemvasia, the old pious tenets were peeling away, layer by layer.\n\n[Root.Monarch.GetName] sat upright upon the cold throne, silently watching Anna. She was deftly reviewing a dossier concerning the Latin trade embargo—over this decade, she had become not only his Basilissa, but also his sharpest accountant and most perceptive eyes and ears. Anna suddenly turned her head; those shrewd eyes were as keen as they had been ten years prior, now tempered by time with an added composure born of grasping the full scope of affairs.\n\nShe rose and approached, placing a newly minted gold coin, still faintly warm, engraved with both their emblems, into the Sovereign's palm. He genuinely admired this woman. The cold and calculating are masters of temptation and ambush; and the greed of the Latins was the most reliable bait in the trap they had laid together. Michael slowly closed his fingers, gripping the warm coin. He realized he had grown accustomed to this feeling: ruling like a sovereign within the intricate labyrinth of numbers and strategy that Anna had constructed."
DD_SAN_Personal_event.23.a:0 "Perhaps this is not such a bad thing, either."
DD_SAN_Personal_event.24.t:0 "The Afterglow of the Morea"
DD_SAN_Personal_event.24.d:0 "Decades had passed, carried swiftly on the current of gold.\n\nMichael was now a sovereign who had spent half a lifetime tossed within the meat grinder of power. Gazing back at the majestic yet cold outline of Constantinople, he felt a weariness he had never known before. He passed the heavy seal, inscribed with blood debts and order, to his heir, offering no parting counsel—for he knew the child carried Anna's blood and possessed his own heart.\n\nNow, he sat on the stone steps by the sea at the Morea Palace. The sea breeze here no longer bore the smell of gunpowder from the Venetian blockade, but mingled the sweet and sour scent of grapevines with the clean fragrance of olive wood. Anna sat beside him, no longer young herself; the wrinkles at the corners of her eyes held all the secrets of the past twenty years that had churned the politics of the Mediterranean, yet when her shrewd eyes looked upon him, they rarely shed their merchant's appraisal.\n\nMichael took her hand—the hand that had once gripped a short sword and signed countless death warrants—and gently covered Anna's hand, the one that had once toyed with peppercorns and manipulated the fate of nations. He remembered the youth of fourteen, trembling with fear; he remembered the harsh teachings of Ioannes; he remembered that journey long as eternal night... and he remembered, in the marketplace of Thessalonica, that bag of peppercorns touched by slender fingers. So, the beginning of everything had been there.\n\n'Anna,' he whispered to himself, his voice swallowed by the tide, 'I had to win the whole world, only to finally earn this moment of quiet.'\n\nIn the afterglow of the Morea, he was simply an aged husband, accompanying his one and only ally through this life, watching over the state they had forged together through struggle."
DD_SAN_Personal_event.24.a:0 "This is the destination we built together."

DD_SAN_Personal_event.25.t:0 "The Rose of Monemvasia"
DD_SAN_Personal_event.25.d:0 "Ever since the agreement was struck in the marketplace of Thessalonica that day, the name Anna Notaras had appeared frequently in the council's secret dispatches. She had indeed fulfilled her promise; the funding from the Notaras family alleviated the pressure on Thessalonica's defenses. Yet Anna Notaras was clearly not content to remain merely a financier hidden behind ledgers. Today, under the pretext of 'overseeing the implementation of the commercial pact,' she formally visited the court with a substantial retinue.\n\nIn the hall, Anna ignored the disdainful glances of the old-guard nobles. She ordered several heavy rosewood chests to be brought in, filled with Venetian gold and Eastern spices—this was no longer mere investment, but a stark display of power. She approached [Root.Monarch.GetName], lowered her voice, her sharp eyes gleaming with an almost rapacious intelligence: 'Your Majesty, gold can indeed build walls, but only covenants woven by blood are more reliable. The Notaras family's ambitions in the south require legitimate proof of Porphyra favor, and you, to secure Macedonia, and even aspire to the Porphyra itself, need an unending flow of true gold and silver. This is the greatest sincerity the Notaras family can demonstrate.'"
DD_SAN_Personal_event.25.a:0 "Pleasure doing business."
DD_SAN_Personal_event.31.t:0 "The Predator of the Aegean"
DD_SAN_Personal_event.31.d:0 "Our relationship with Lesvos grows ever closer, but with it has come a formidable privateer fleet based in the harbor of Mytilini. This fleet, nominally loyal to a cadet branch of the Palaiologos family, is in truth a pack of wolves composed of outlaws, impoverished nobles, and Greek sailors thirsting for revenge—they recognize no flags, only plunder.\n\nToday, the commander of this fleet, Helena Palaiologina, sailed her flagship into our harbor in person.\n\nUnlike the noble ladies confined to their aging palaces, Helena, as she stepped onto the dock, still carried the acrid smell of gunpowder from naval engagements; her dark cloak billowed loudly in the sea wind. She deftly unfastened the cloak, revealing the light armor she wore beneath, practical for action. At her hip hung a Saracen scimitar, its ornamentation worn away—a prize seized from some Sicilian pirate captain. She walked straight up to [Root.Monarch.GetName], dispensed with pleasantries, and simply threw a stack of bloodstained Venetian banners onto the ground. The blood was not yet dry.\n\n'Your Majesty, my kin do not lack gold coins,' Helena said, fixing her gaze on [Root.Monarch.GetName], her eyes blazing with a wildfire of restlessness and arrogance. 'But we lack a document to make that gold respectable, to sanctify our killings. Grant us letters of marque bearing the Imperial seal, permitting us to plunder every Latin merchant ship from the Aegean to the Adriatic in the Empire's name. In return, my fleet shall become your blade, erasing the Venetians from your maritime borders entirely.' She stepped forward, closer than propriety allowed. 'What we seek is not merely treasure, but the right to walk upright back into Constantinople. Your Majesty, do you dare to place chains upon this pack of "sea wolves"?'"
DD_SAN_Personal_event.31.a:0 "Go forth, and stain the Aegean red in the Empire's name."
DD_SAN_Personal_event.31.b:0 "We have no need for such dishonorable 'aid'."

DD_SAN_Personal_event.32.t:0 "The Bloody Breakthrough"
DD_SAN_Personal_event.32.d:0 "When the Venetian blockade had plunged the harbors of Constantinople into a dead silence, Helena did not, as many imagined, remain trapped behind mountains of ledgers. On those starless, moonless nights, she personally led her fleet, cutting through the waves of the Aegean like a blade, seeking prey.\n\nSeveral Venetian navigators who fell into her hands revealed, under interrogation, the secrets of the Latins in the Eastern Mediterranean: those scattered anchorages and supply depots, where grain, gunpowder, and ship timber sufficient to sustain a blockade for years were stockpiled.\n\nWhen she next appeared before [Root.Monarch.GetName], one side of her face bore the shocking red scars of burns from Greek fire, and dried sea salt filled the crevices of her cold armor. Yet in her eyes, there was no fear, only an almost maniacal light of triumph—the smile of one who has set the world ablaze and stands at its very center.\n\nIn the dozens of days and nights past, her fleet had pierced the fog like phantoms, striking those seemingly impregnable strongholds, consigning mountains of supplies, along with Latin arrogance, to the flames. This was more than a crippled supply line—the fire spread along the trade routes, and the commercial network the Venetians had cultivated for generations along the Aegean coast burst into towering flames as well."
DD_SAN_Personal_event.32.a:0 "Let the flames teach them respect!"
DD_SAN_Personal_event.33.t:0 "The Raging Tide of the Aegean"
DD_SAN_Personal_event.33.d:0 "More than a decade has swiftly passed since Helena sailed her ragged privateer fleet into Thessalonica.\n\nNow, the Imperial Fleet, reorganized from the Palaiologos privateers, patrols every strait from the Aegean to the Hellespont—a pack of sea wolves composed of outlaws, avengers, and battle-hardened elites. They recognize no papal decree, fear no Venetian gold; they are loyal only to the woman in the dark cloak who stands at the prow.\n\nHelena is more than just the Basilissa of [Root.Monarch.GetName]. She is the Empire's most fearsome claw, buried deep in the throat of the Latins; she is the phantom haunting the midnight dreams of every Venetian merchant upon these seas; she is the first curse written in the wills of every enemy who dares to cast their eyes upon the Aegean.\n\nTonight, the howling wind sweeps across the terrace of the Blachernae Palace. Helena stands beside [Root.Monarch.GetName], still habitually wearing her sea-soaked dark naval cloak; the curved blade at her hip catches the moonlight in cold arcs. She turns to look at him; the wildfire in her eyes, once ready to consume everything in its path, has banked. In its place is a composed stillness, like a blade returned to its sheath—the composure of a ruler who no longer needs to prove anything to anyone.\n\nThe Latins once thought this sea was their cradle. 'But now,' she says, her voice low yet steadily cutting through the gale, 'it is their grave.'\n\nMichael takes her hand. The hand once accustomed to holding a quill now covers one covered in calluses, rough and cracked from years of hauling ropes. He suddenly realizes he has grown accustomed to this feeling: standing beside the woman who tamed the waves for him, surveying the vast, rolling sea that is his alone."
DD_SAN_Personal_event.33.a:0 "Perhaps this is not such a bad thing, either."

DD_SAN_Personal_event.34.t:0 "The Storm Slowly Subsides"
DD_SAN_Personal_event.34.d:0 "The tumultuous waves of decades have long since receded.\n\nMichael now was no longer the decisive young sovereign, swift with sword and order, but an old man whose edge had been worn away in the meat grinder of power. Gazing back at the formidable sea walls of Constantinople, he felt an emptiness, like the sea after the tide has withdrawn. He passed the commander's seal, stained with countless grains of sea salt and drops of blood, to his heir, offering no lengthy counsel—that child had inherited Helena's fervor and learned his patience. All that needed teaching had long been taught amidst the storms.\n\nNow, he sat on the terrace of the palace on the island of Lesvos. The air here still carried the salt tang of the sea, but it no longer stung with the acrid smell of gunpowder and smoke—only the sweet and sour scent of grapevines, and the clean fragrance of olive groves in the distance.\n\nHelena sat beside him. The once-flamboyant, fiery brown hair was now touched with frost; every line at the corners of her eyes spoke of a lifetime spent facing wind and weather on the flagship's command platform. Those eyes, once burning with the heat of battle, when they looked upon Michael, now unexpectedly revealed a gentle stillness, as deep and calm as the ocean—a look she had given to only one person in her entire life.\n\nHelena unbuckled the curved blade she never parted from and casually placed it on the moss-covered stone table. The ornaments on its hilt had long been worn smooth, like the years they had journeyed through together. She pointed towards a fishing boat slowly tracing the distant horizon, and said nothing.\n\nMichael took her hand. The hand that had signed countless secret execution orders now gently covered Helena's hand, rough with calluses, the hand that had snapped countless hawsers. He remembered her arrogance on the docks of Thessalonica, throwing bloodied Venetian banners at his feet; he remembered their shared, wild laughter amidst seas of fire; he remembered her gaze, waiting for him on the deck night after night; and he remembered that journey, long as eternal night.\n\n'Helena,' he whispered softly, his voice carried away by the gentle sound of the waves, 'I had to ignite fires for half a lifetime, only to finally earn this faint glimmer of a moment.'\n\nShe did not reply, but simply leaned her head gently against his shoulder. In the afterglow of Lesvos, he was merely an aged husband, accompanying the comrade-in-arms who had suited him best through this life, watching over the sea they had together brought to peace."
DD_SAN_Personal_event.34.a:0 "Look—what a beautiful sea this is."
DD_SAN_Personal_event.35.t:0 "The Wild Flower of the Palaiologoi"
DD_SAN_Personal_event.35.d:0 "In the dozens of days and nights they fought side-by-side in Thessalonica, Helena Palaiologina never once saw in [Root.Monarch.GetName]'s eyes the weakness she had anticipated. On the contrary, when Michael signed death warrants for turncoats without a flicker of emotion, or coldly directed fire attacks from the deck of a warship, Helena realized that this young sovereign possessed a will harsher than the storms that battered Lesvos. This resoluteness, which could even be called 'cruelty,' did not make her shrink back; instead, it stirred a strange resonance deep within her—for the first time in her more than twenty years of life, she had met someone who could meet her gaze without flinching.\n\nToday, [LSW.Monarch.GetName], the head of the Palaiologos family of Lesvos, set foot upon our land in person. He brought not only skilled naval commanders, but also a proposal far weightier than mere military aid.\n\nHe looked at Michael, then at Helena, who stood nearby, wiping blood from her blade with a piece of linen: 'Your Majesty, your wisdom and decisiveness have already proven you the most worthy heir to the Imperial crown, and Helena has proven herself the sharpest blade upon the Aegean. In this age, overrun with Latin wolves, fighting alone will not long endure. My family needs a chance to return to legitimacy, and your Imperial authority—needs claws capable of tearing apart every obstacle in your path.'\n\nHelena raised her head. The usual insolence and arrogance were gone from her spirited face. She studied Michael with an unprecedented seriousness; her gaze was not that of a woman appraising a potential spouse, but that of a warrior confirming whether she was willing to fight back-to-back with this man.\n\nMichael met her gaze, those eyes blazing with the fire of battle. He had no need for a docile dependent; he needed an ally who could stand beside him in a pool of blood—someone who would not tremble when he ordered a village burned, who would laugh with him when they sacked an enemy harbor. When their hands clasped, it was more than a union of power; it was the mutual recognition of two ruthless souls."
DD_SAN_Personal_event.35.a:0 "This will be the only mercy we have left."

DD_SAN_Personal_event.41.t:0 "Echoes of Thrace"
DD_SAN_Personal_event.41.d:0 "The scorched earth of Thrace had lain silent under the iron hooves of the Latins for two centuries. In those two hundred years, any trace of its former belonging to the Empire seemed long ground away. Yet not every spine had been broken. Ten years ago, the family Strategopoulos—a name of some modest repute in the old Empire—chose to rise from the ashes in defiance. On a smoke-blackened evening, [Root.Monarch.GetName] met the daughter of the 'Bandit Lord'.\n\nEirene Strategopoulina possessed none of the coarseness of a mountain dweller; instead, she had a calmness forged in the crucible of flight and survival. She stood before a crowd of militia, clutching broken farm tools but with resolve burning in their eyes. Her own gaze held no fear, but rather an ember kindled by fire.\n\nWhen Michael dismounted, casually tossing his purple symbol of authority onto a mud-spattered chariot to personally inspect the crumbling defenses, Eirene's expression shifted from suspicion to utter astonishment. That night, the two sat together in a dilapidated mill, sharing a coarse loaf of dry bread mixed with chaff and grit. No silver platters, no ceremony. Eirene watched his hands, covered in dust, the blood blisters on his knuckles still unhealed. Then, she laughed softly. There was no mockery in that laugh, only a strange, almost gentle sense of release.\n\n'We thought our lot would be to die like wild dogs, trampled beneath Latin hooves,' she said, raising her eyes to meet Michael's. 'My Lord, let us join you. We need not your gold, nor your promises, only that it still stands.' She paused, gesturing towards the smoke-blackened banner planted atop the mill. 'Then there is still a path for us.'"
DD_SAN_Personal_event.41.a:0 "As long as I stand, it will never fall."
DD_SAN_Personal_event.41.b:0 "This life... might be too heavy a burden."
DD_SAN_Personal_event.42.t:0 "The Crown of the Iron Plough"
DD_SAN_Personal_event.42.d:0 "Ten swift years have passed since they exchanged vows in the ruined square. In that decade, the purple robes of [Root.Monarch.GetName] have been stained not only with the blood of enemies, but also with the mud from the furrows of Thrace. At Eirene's insistence, the Empire's focus shifted from lavish courtly ceremony to the silent earth. She became not only Michael's Basilissa, but also the 'Guardian Madonna' in the eyes of thousands of Thracian farmers.\n\nShe oversaw the restoration of irrigation canals, abandoned for two centuries, bringing clear springs back to the parched land. She settled the families of fallen soldiers upon fertile military lands, ensuring every drop of spilled blood contributed to the following year's harvest. She transformed the name 'Strategopoulos' from the legend of a 'Bandit Lord' into a byword for prosperity and security.\n\nToday, as the harvest bells tolled across the northern lands, Eirene led Michael to a newly cultivated highland. Thousands of veterans, who had once wielded sickles against the Latins, now drove sturdy oxen at work in the fields. Taking a circlet woven from fresh wheat stalks and fragments of an old iron plough from an elderly farmer, Eirene gently placed it upon Michael's brow in the light of the setting sun.\n\nShe gazed at this man, long since shed of all rashness, now as steadfast as the mountains themselves, her eyes filled with the solace of a decade spent by his side. Now, every mill was filled with grain, every village held able-bodied men ready to don armor at a moment's notice. This land—was no longer the Empire's frontier, but its very heart."
DD_SAN_Personal_event.42.a:0 "This crown weighs heavier than any jewel!"

DD_SAN_Personal_event.43.t:0 "The Final Chapter of the Land"
DD_SAN_Personal_event.43.d:0 "Decades had slipped away like sand through fingers, quietly passing. Michael now was no longer the cold sovereign draped in purple, navigating the mists of intrigue. Time had stolen his vigor, but granted him a stillness like the deep earth in late autumn—a stillness holding no regrets, only the serenity of ripe fruit awaiting its fall.\n\nHe had already passed the imperial seal to his heir. That child, through Eirene's teachings by word and example, had learned not only how to wield a sword, but how to sow; not only how to besiege cities, but how to make a land bloom anew after war.\n\nNow, he sat on the stone steps of the palace at Adrianople. Here there were none of the suffocating marble walls of Constantinople, only a courtyard built with Thracian mountain stone, its walls covered in purple grapevines heavy with fruit. Eirene sat beside him; her once jet-black hair was now touched with silver frost, but her eyes, gazing upon the land, still held that same resolute and clear light as when they first met—the gaze belonging only to one who had dedicated a lifetime to the soil.\n\nEirene skillfully peeled a ripe pomegranate, offering the glistening seeds to Michael's lips. She pointed towards the farmers in the distant fields, guiding their ox-carts home. They no longer needed to hide in the mountains from the Latins. Their only concern now was whether this year's harvest would yield enough for next year's wine.\n\nMichael took her hand. This hand, which had once grasped countless blood-stained dispatches, was now firmly enclosed in Eirene's calloused hand, fragrant with the scent of fruit. He remembered that smoke-blackened evening, that crumbling mill, that dry loaf of bread mixed with chaff and grit... that was the origin of all his power, and the end of all his ruthlessness.\n\n'Eirene,' he whispered softly, his voice holding an unprecedented sense of release. 'I once thought I needed to conquer territories. Only later did I realize I only needed to win one season's harvest from this land.'\n\nShe did not reply, only leaned her head gently against his shoulder, continuing to peel the pomegranate in her hands. In the afterglow of Adrianople, he was merely an aged husband, accompanying the warmest partner of his life, watching over the wheat fields they had together soothed. The wind blew, the wheat rippled, like a golden sea."
DD_SAN_Personal_event.43.a:0 "This rippling wheat field is far more noble than any purple robe."
DD_SAN_Personal_event.44.t:0 "The Vow of the Land"
DD_SAN_Personal_event.44.d:0 "Eirene and her militia had become the most resilient backbone of [Root.GetName]'s marching columns.\n\nFor months, Michael had lived, eaten, and slept alongside these dispossessed people, driven by the Latins for two centuries. His hands, once used to comfort, were now thick with calluses. The people of Thrace had begun to call him, in private, 'Our Basileus'—not the flattery of courtiers, but the acknowledgment passed from farmer to farmer, a weight heavier than any coronation.\n\nToday, in the ruined square of a recently recovered town, representatives of several Thracian nobles saluted [Root.Monarch.GetName] before the remaining stone columns. Behind them stood a silent crowd of farmers, holding in their hands earth, wheat stalks, and old imperial coins freshly dug from the ruins—their only remaining tokens proving they had once belonged to something great.\n\nOn behalf of the weather-beaten Thracian magnates, they presented a weighty request: that the House of Strategopoulos lead the way, entwining the roots of Thrace with the throne of [Root.GetName]. Not as vassals, but in symbiosis—to make this land, forgotten for two centuries, once again the heart of the Empire.\n\nEirene stood behind her father. She had exchanged her mud-spattered armor for a simple white robe, her hair tied back loosely. She watched Michael, and in her eyes was no longer the scrutiny and probing of their first meeting, but a feeling born of shared life and death, as deep and gentle as the earth itself—a sentiment of profound, grounded affection."
DD_SAN_Personal_event.44.a:0 "The roots of the Empire are deeply planted in Thrace."

DD_SAN_Personal_event.51.t:0 "The Faint Light of Panagia"
DD_SAN_Personal_event.51.d:0 "When Michael pushed open the heavy oak door of the Panagia Paregoretissa Monastery, he still carried upon him the lingering smell of gunpowder and rust—the scent brought back from the frontier battlefields, the cloying sweetness of dried blood that could never be fully washed away.\n\nHis heavy boot soles trod upon the slick stone slabs, each step provoking a cold echo beneath the empty dome, disturbing the century-old stillness accumulated here. He had expected to be greeted only by withered monks and cold stone inscriptions—as he had grown accustomed to over the years.\n\nBut amidst the flickering candlelight and cold, clear moonlight, he saw Theodora. She was a child from a distant branch of his mother's family. In his memory, she was just a little girl, shyly peeking at him from behind the crowd at festive banquets. Now she stood before the lectern, carefully arranging freshly picked white lilies in a vase.\n\nShe was so delicate. It seemed a slightly strong mountain wind could scatter her; it seemed the world had never left any mark upon her. Her skin was pale, almost translucent, shimmering in the mingling of warm candlelight and ethereal blue moonlight like an intricately carved piece of Persian porcelain that had never seen the sun—utterly out of place in this tomb filled with the souls of the departed, utterly incongruous with the smell of blood that clung to him.\n\nMichael stood in the shadows, unconsciously fingering the hilt of his sword. He appraised her with a gaze as cold as if inspecting goods: these hands had never gripped a bloodied knife; these eyes had never seen a village put to the torch; this body had never known hunger on a flight for survival.\n\nNaive. He drew a cold, final period under that word in his mind.\n\nYet Theodora was not startled by the fierce aura radiating from this [Root.Monarch.GetTitle]. She calmly replenished the oil in the lamp, and when she turned and saw him, she simply let out a gentle, relieved breath—an expression as if she were merely waiting for a long-delayed family member, as if he had never left, as if he were still the youth who would let down his guard before her, many years ago.\n\n'You are still here?' Michael's voice carried an inhuman harshness, like one who had not spoken normally with anyone for a long time. 'Thessalonica is secure now. I have reserved a mansion in the city for my mother and the Gabrielopoulos clan. Life there will be a hundred times better than in this harsh mountain retreat.'\n\nTheodora shook her head gently. She walked over to Michael and, with a natural gesture, reached out to straighten his collar, rumpled by the mountain wind. The motion was slow and steady, filled with an extremely simple yet pure thoughtfulness—without any political calculation, without any temptation of power. 'The splendor of the city is for the masses to see, Michael,' she said softly, her voice as gentle as the evening breeze in the mountains. 'But these hills, these resting places of our ancestors, someone must always watch over them.'\n\nShe raised her eyes and gazed at him with concern—at his eyes, etched with exhaustion and the marks of killing, at the fine lines on his face traced by smoke and gunpowder, at everything he had borne alone over the years. Then, she gently took his hand—the hand that had gripped a sword all year round, with its rough knuckles, now held rigid.\n\nMichael did not pull away. He greedily gazed upon her 'purity'—something he had long lost, something he had strangled with his own hands. Like a man who had walked in darkness too long, seeing a distant glimmer of light from the depths of the abyss. That light might sear his eyes, might make him realize how filthy he was, but he could not help wanting to draw near.\n\n'They say you are becoming more and more like those marble statues,' Theodora's voice held no reproach, only a profound compassion. 'They say you no longer eat, no longer sleep. But what iron in this world never wears down?' She squeezed his hand, and that warmth seeped through his cold skin, bit by bit, into his long-numbed flesh and blood. 'Stay here and rest for the night,' she said, lifting her head, her eyes as clear as ever. 'I have made your favorite lamb stew.'"
DD_SAN_Personal_event.51.a:0 "If only for one night, I want to shed this iron shell."
DD_SAN_Personal_event.51.b:0 "This kind of tenderness... would only dull my will."
DD_SAN_Personal_event.52.t:0 "The Piety of Panagia"
DD_SAN_Personal_event.52.d:0 "More than a decade had passed since that chance encounter in the night.\n\nIn all those years, Theodora had never returned to the ancestral lands of the Gabrielopoulos family. The name she had betrayed with her own hands on that stormy night, along with the innocence torn to shreds that evening, remained forever in the mountains of Epirus. She had utterly consecrated herself to the grand design of [Root.Monarch.GetName]—not as an accomplice to power, but as a guardian of conscience.\n\nShe knew well how many bones lay buried beneath Michael's authority, knew that every ray of light from that purple and gold crown was stained with blood that could never be washed clean. So she chose to spend her remaining years doing what he could not: stitching together the souls torn apart by war.\n\nInspired by Theodora, lords who had once feared [Root.Monarch.GetTitle] laid down their arms. They did not trust that decisive, merciless sovereign, but they could not refuse this Empress, who held only compassion in her eyes as she told her prayer beads. They turned to the holy rites she conducted, and in her prayers, they learned anew how to bow to Constantinople—not out of fear, but out of reverence.\n\nShe restored the dilapidated monasteries, transforming imperial wealth into alms for the poor. Even in the most stubborn regions, when the people saw this Empress enter a village alone, without a single guard, to distribute charity, much of their hatred for the crown melted away. They began to believe that the lofty Empire might indeed still have a beating heart.\n\nToday, Theodora placed in Michael's hand the string of prayer beads, ground from the very stones of the Pindus mountains. She had polished each bead herself, every one infused with her warmth and her prayers.\n\nShe gazed at him—this man, so steeped in intrigue and blood—and her eyes were still as clear as on that night they first met in the tomb. Only now, that clarity held a depth, a weight born of years of devotion."
DD_SAN_Personal_event.52.a:0 "Are you the mercy of the Theotokos?"

DD_SAN_Personal_event.53.t:0 "The Evening Bell of Arta"
DD_SAN_Personal_event.53.d:0 "Decades of intrigue and conquest had finally receded like the tide.\n\nHe had passed the seal, stained with countless traces of blood and ink, to his heir—that child carried his decisiveness, and also Theodora's compassion. All that needed teaching had long been taught; the rest, he would have to learn on his own.\n\nNow, he and Theodora had returned to the mountains of Epirus. In the small stone fortress of Arta, white lilies planted by Theodora's own hands climbed over the windowsills. Every evening, Michael would sit on the terrace, watching the caravans and herds moving along the mountain roads in the distance. Thanks to Theodora's years of devoted effort, this land now enjoyed the Empire's most stable autonomy, and possessed its most loyal militia—those farmers who laid down their sickles to become soldiers, and their weapons to become the faithful, just as she had always hoped.\n\nMichael simply patted Theodora's hand gently, his gaze passing over her to rest on the half-open window. Beyond the window stretched the endless Pindus mountains. That was his original starting point—the youth trembling in the tomb, the sovereign struggling amidst intrigue, the emperor learning cruelty in pools of blood. And now, he had finally returned here.\n\nIn his life, he had calculated countless accounts, settled countless blood debts, slain countless enemies. But the one account he could never settle was the price this woman beside him had paid for him—from that bouquet of white lilies in the tomb, to that hoarse cry in the storm; from the maiden as fragile as porcelain, to this old woman who had spent her remaining years stitching together all his wounds.\n\nIn the afterglow of the Pindus mountains, he was merely an aged husband, accompanying the purest soul of his life, watching over the mountains they had together guarded.\n\nThe wind blew in through the window, carrying the fresh scent of the wild hills.\nHe had finally come home."
DD_SAN_Personal_event.53.a:0 "Perhaps there could be no better ending than this."
DD_SAN_Personal_event.54.t:0 "Homecoming"
DD_SAN_Personal_event.54.d:0 "In the two months since residing in his ancestral homeland, [Root.Monarch.GetName] felt a long-missed sense of weight slowly rising from the mountains beneath his feet, seeping into his long-numbed flesh and blood.\n\nThis was the land of the Komnenodoukai. The laws of these hills flowed in his veins; his surname had once been a prayer whispered by every farmer here at sowing and harvest. And his mother—that woman from the Gabrielopoulos family—had, many years ago, already paved the path for him into the hearts of his subjects. Though Venetian machinations had once turned this land away, though a decade of separation was as hard to melt as winter snow in the mountains, from the moment Michael pushed open the gates of the Panagia Monastery, the old shackles began to crumble.\n\nAt first, it was only a few aged farmers who approached tentatively; later, entire villages, men, women, and children, stood by the roadside, gazing at him with a look he had almost forgotten—not fear, not calculation, but an almost stubborn hope. As if to say: You have finally returned.\n\nThese past days, one courtier after another had advised him, proposing that the two strongest legitimate bloodlines of Macedonia and Epirus be intertwined once more.\n\nTheodora—this name was repeatedly mentioned in these proposals. She was not only Michael's distant cousin, but also a totem of loyalty and purity on this land. Those who had seen her guarding the ancestors in the tomb, those who had tasted the soups she brewed with mountain herbs, those who had watched her offer flowers for the departed and prayers for the living—all spoke of her with an almost reverent tone.\n\nThe Gabrielopoulos family showed almost fanatical support for this. They not only presented the request for marriage, but solemnly pledged: once the union was sealed, they would devote all their resources to assist [Root.GetName] in expanding his military forces.\n\nToday, Theodora stood beneath the old olive tree in the courtyard. Sunlight filtered through the gaps in the leaves, dappling her plain robe with shifting light and shadow. She was still as serene as when they first met—those eyes still clear, untouched by dust; those hands, still unstained by blood, gently caressed the rough stone wall beside her. But in this moment, something unprecedented had entered her gaze: the calm and resolve that comes only when a woman finally understands the weight upon her shoulders."
DD_SAN_Personal_event.54.a:0 "If this is our destiny."

DD_SAN_Personal_event.60.t:0 "Confession of the Solitary Sovereign"
DD_SAN_Personal_event.60.d:0 "The corridors of the Blachernae Palace had never been as quiet as on this night. Anna's cunning, Helena's brutality, Eirene's roughness, and Theodora's naivety were all shut out from power by the heavy closing of the palace doors. [Root.Monarch.GetName] stood alone before the empty throne, his shadow stretched impossibly long by the flickering firelight. No interference from in-laws, no whispers at his ear, not even the stir of emotion. He sensed freedom in the air—a cold fragrance blended from old parchment, cold iron, and absolute solitude. He needed no one to define his crown, no family's bloodline to fortify his throne. As the ancient philosopher said, he had become a 'lone wolf': a self-sufficient solitary one, mastering the thunder in silence. While the world busied itself sinking into procreation and alliance, he alone charted the Empire's course through the eternal night."
DD_SAN_Personal_event.60.a:0 "What they call solitude is the only crown of the strong."

DD_ERO_recover_events.0.t:0 "The Baptism of Epirus"
DD_ERO_recover_events.0.d:0 "As [Root.Monarch.GetName] stepped through the gates of Arta, the entire city was still shrouded in a hazy mist and silence. He had walked this path to the Paregoretissa Church countless times in his childhood; now, the bloodstains and scorch marks remaining on the stone slabs silently told of the violence wrought by the recent turmoil.\n\nEpirus was a resilient land embraced by towering mountains. Our ancestor, Michael I Komnenos Doukas, had wandered here in hardship, and thereafter made it the ultimate refuge for the Empire in its time of tribulation. Here, there were not only the rugged Pindus mountains as a bulwark, but also the solid fortresses hewn from the rock by generations of past rulers. As the banner of the Double-Headed Eagle was raised once more on the banks of the Vjosa River, what greeted us was not only the long-missed fragrance of the countryside, but also the veterans forced into silence for decades under the rule of usurpers. They trembled as they donned their old armor to welcome us, the rust upon their cuirasses gleaming in the setting sun over Arta.\n\nThe last stronghold holding out had finally surrendered. [Root.Monarch.GetTitle] slowly ascended the stone bridge overlooking the entire city. Once, this place was the terminus of exile; now, it was the starting point of restoration. The recovery of Epirus was not merely the restoration of ancestral foundations, but the reconnection of bloodline and covenant. The howling wind among the mountains seemed to celebrate his return. From this moment onward, [Root.Monarch.GetName] was no longer a man without support, but truly the Master of Epirus, inheriting the ancestral title of 'Noah of the West'."
DD_ERO_recover_events.0.a:0 "It has been too long, Epirus."

DD_ERO_recover_events.1.t:0 "The Call of Thrace"
DD_ERO_recover_events.1.d:0 "If Constantinople is the head of the Empire, then Thrace is the neck that sustains its pulse. Since the chaos wrought by the Latin usurpers, this fertile land, which once safeguarded the Imperial capital, had long been reduced to the fiefs of Latin lords and the pastures of barbarian horsemen.\n\n[Root.Monarch.GetTitle] set foot upon this scarred ancestral soil. The earth was still mixed with the scorch of ancient warfare; beneath the broken walls of the countryside, the bones of countless victims lay in silence. This land is not only the gateway to Constantinople, but also a vital source of manpower for the Empire. Only by reasserting control over the hills and plains north of the Hellespont could Constantinople truly be united with Thessalonica.\n\nNow, the Latin castles erected amidst plunder have all crumbled, and the tents of foreign tribes have been trampled flat. The wings of the Double-Headed Eagle once again sweep across the vast sky of Thrace, sowing anew the seeds of order and strength upon this long-abandoned land. Constantinople can at last feel again that deep and powerful pulse from its broad hinterland."
DD_ERO_recover_events.1.a:0 "The spine of the Empire shall stand erect once more."
DD_ERO_recover_events.2.t:0 "The Fertile Land of Thessaly"
DD_ERO_recover_events.2.d:0 "As [Root.Monarch.GetName] led the army through the Vale of Tempe, what met his eyes were the golden wheat fields of Thessaly, rolling like waves upon the sea. Continuous, naturally excellent pastures stretched down from the mountain foothills, while the plains below provided vast and ideal grounds for training and assembling cavalry.\n\nThese pastures and fields once nurtured fine warhorses for the Empire; its advanced agriculture and animal husbandry once sent abundant grain and livestock to every province of the Empire. Yet, under the long rule of the Crusader kingdoms, Thessaly was dismembered into several fragmented duchies. Its produce was endlessly loaded onto Latin ships, while the subjects of the motherland struggled in hunger and oppressive taxation.\n\nThe recovery of Thessaly meant we had finally, at a fundamental level, shed our deadly and humiliating dependence on external supplies. The monks dwelling in the cliff-top monasteries of Meteora, who had prayed day and night amidst the rocks and mists for the Empire's return—now, their prayers were answered.\n\n[Root.Monarch.GetTitle] stood upon the walls of Larissa. This place is the strategic throat connecting Macedonia and the Peloponnese; to control Thessaly is to grasp the spine of the entire Greek peninsula. The dreams of those Latin lords would not last much longer."
DD_ERO_recover_events.2.a:0 "Prosper once more!"
DD_ERO_recover_events.3.t:0 "A New Chapter Under the Olive Branch"
DD_ERO_recover_events.3.d:0 "The cold, rusty smell left by the Latins was fading, replaced by the breeze unique to the Attic peninsula, mingling sea salt with the scent of thyme. Since 1204, Athens—this city, once a beacon of civilization—had gradually decayed under the rule of Latin lords. The Parthenon had been profaned by coarse Crusader soldiers, and countless ancient manuscripts were turned to ashes in the fires of ignorant brutality. Yet the high walls erected by the conquerors could not erase the mark of the Empire's existence, and the ancient soul slumbering within the olive groves had never truly departed.\n\n[Root.Monarch.GetName] stood on the Pnyx hill, overlooking the entire city. In the distance, the port of Piraeus was once again crowded with masts. Beside the ruins of abandoned academies, village elders, with trembling hands, brought forth secretly hidden Greek manuscripts. This was a return to the source of culture and spirit. The last rays of the setting sun fell upon the columns of the Acropolis, dyeing the broken ruins in gold."
DD_ERO_recover_events.3.a:0 "Let sanctity and glory return to Athens."

DD_ERO_recover_events.4.t:0 "The Spark of the Morea"
DD_ERO_recover_events.4.d:0 "In the darkest days of the Empire, the Morea was that final, unextinguished glimmer of light. Amidst the rugged rocks of Mystras, scholars and lords defended the surviving texts of Greek and Roman civilization amongst the ruins, forcing the arrogant Latin lords to parley with these last guardians. Now, our forces have marched south across the Isthmus of Corinth, and [Root.Monarch.GetTitle] overlooks the shattered coastline of the Peloponnesian peninsula.\n\nThis is an ancient, sacred, and bountiful land. Here flows the golden wine of Monemvasia, here flourish the abundant silks and olives of Clarence, and here dwell the resilient people who multiply among the mountains, passing down the sparks of culture. With the fall of the last banner on the plain of Laconia, the centuries-old foundations of the Latins in the Peloponnese are utterly uprooted. The Crusader stone fortresses, once symbols of foreign conquest and humiliation, now crumble from the jagged peaks, shattering amongst the strange rocks of time.\n\nThe recovery of the Morea means that the Aegean is once again becoming an Imperial lake, and the Empire's southern territories are finally complete. Let the bells of Mystras ring out to every corner of the Peloponnese—the ancient icons have returned to the altar, and this long-trampled land shall once more become a sacred realm where the Hellenic spirit and Imperial order intertwine."
DD_ERO_recover_events.4.a:0 "The land of Pelops, our land."
DD_ERO_recover_events.5.t:0 "The Radiance of Nicaea"
DD_ERO_recover_events.5.d:0 "Since ancient times, Nicaea has been a vital stronghold of the Empire in northwestern Asia Minor. From the ninth century, it became the capital of the Opsician Theme, guarding the Bosporus and the Bithynian plain, and was the key to the Empire's eastern defenses. In 1077, its governor, seeking the aid of the Seljuks, handed the city over to Suleiman Shah, thereby shaking the Anatolian defenses. In 1097, Alexios I Komnenos, seizing the opportunity of the First Crusade, recovered Nicaea and restored it to Imperial order. Yet after the fall of Constantinople in 1204, this crucial Imperial city was once again severed from the dominion of Rome.\n\nNow, after repeatedly crushing the Turkish forces entrenched here, Nicaea has finally returned to the Empire's embrace. [Root.Monarch.GetTitle] runs his hand over the city's firm walls. Unlike the desolate ruins of Thrace, here the farms are still productive, and the workshops still hum with activity. Recovering and securing this place is not merely expelling the nomads who rose amidst the chaos, but reclaiming the Empire's military backbone in the East.\n\nNicaea is not only a military town and fortress, but also a cornerstone of the faith. In 325, the First Council of Nicaea was convened here, establishing the orthodox doctrine of the Trinity; in 787, the Second Council of Nicaea ended the iconoclasm, restoring order to the Church.\n\nPerhaps, on some future day, when the Empire has again secured its frontiers on all sides, Nicaea will witness another great council capable of healing the schism within Christendom."
DD_ERO_recover_events.5.a:0 "Nicaea shall return to the seat of Orthodoxy!"
DD_ERO_recover_events.6.t:0 "The Broken String of Pearls"
DD_ERO_recover_events.6.d:0 "The islands scattered like pearls across the Aegean were long treated as cheap bargaining chips on the scales of Latin merchants. The square sails of the Venetians once roamed here unopposed, seizing our silks and extorting our merchant vessels.\n\nNow, with the rebuilding of the Imperial fleet, these islands are returning, one by one, to the embrace of their master. The recovery of Naxos, Rhodes, and the Cyclades means we have personally severed the commercial shackles locked around the Empire's neck. Every islet shall become an unsinkable fortress, every bay a graveyard for the Latins. The Aegean is once again becoming an Imperial lake; beneath its blue waves lies buried their centuries of greed."
DD_ERO_recover_events.6.a:0 "The Aegean shall once more be the harbor of our fleet."

DD_ERO_recover_events.7.t:0 "Glorious Return to Smyrna"
DD_ERO_recover_events.7.d:0 "Smyrna, since the ancient Greek era, has been one of the most important Greek colonial cities on the coast of Asia Minor. From its very founding, this natural deep-water harbor was renowned throughout the Aegean states for its flourishing commerce.\n\nAfter the Battle of Manzikert, the Empire's administrative system in Asia Minor rapidly disintegrated. Local themata fell into disorder, frontier defenses crumbled, and Smyrna did not escape this fate, falling at one point into the hands of pirates, becoming a victim of those turbulent times. It was not until Alexios I Komnenos ascended the throne and set about reforming the military and administration, rebuilding the navy and the Cibyrrhaeot Theme, that the pirate forces entrenched here were cleared, and this port was reintegrated into the Imperial order.\n\nYet in the thirteenth century, the old Empire, beset by internal and external troubles, completely collapsed, no longer able to maintain the defenses of western Asia Minor. Smyrna and the surrounding coastal regions were successively lost, and the Empire was forced to withdraw to Greece, unable to look eastward. Now, with the Empire's steady advances in both Asia Minor and Greece, the barbarians have finally abandoned this port. Smyrna has once again returned to the Empire's embrace. The long-silent harbor once more hears sacred prayers; the cross and the double-headed eagle are again reflected upon the sea. The holy light of the Lord shall once again shelter this land which has endured so many vicissitudes."
DD_ERO_recover_events.7.a:0 "Radiance shines once more upon Smyrna."
DD_ERO_recover_events.8.t:0 "The Mountaineers of Dyrrachium"
DD_ERO_recover_events.8.d:0 "Dyrrachium has been, since antiquity, the Empire's crucial maritime hub connecting Italy and Epirus. Its uniquely advantageous geographic position made this port city both an outpost for advancing into the Apennine peninsula and the first line of defense against Western European aggression. As early as 1081, Alexios I of the Komnenian dynasty nearly perished here beneath the Norman lances of Bohemond. Had it not been for the desperate, near-annihilating sacrifice of the Varangian Guard to save him, the Roman Empire might have met its end centuries ago.\n\nAnd in the towering mountains beyond this land, the scattered Albanian tribes, throughout the Empire's darkest hours, never betrayed their ancient oaths. When Constantinople fell to the enemy and the legitimate Imperial authority was imperiled, it was these tribes who stood firmly beside the rulers of Epirus. They were the sharpest javelins of Epirus, proclaiming amidst the dense forests and cliffs of the Pindus mountains, through the lives of countless Latin knights, that the Empire's will remained unbroken.\n\nNow, the tidings of [Root.Monarch.GetTitle]'s return are spreading quietly along the valleys and coasts. The Albanian tribes, which once maintained close ties with Epirus, have renewed their bonds with us. Recovering Dyrrachium means not only reclaiming the starting point of the Via Egnatia, but also reincorporating this formidable force, which once swore to die for Epirus, under the central rule of the Empire.\n\nBy reaffirming their ancient privileges and obligations, these Albanian warriors will no longer be mere mercenaries on the frontier, but will truly become the pillars assisting the Empire in reshaping its western domains. Their familiarity with the mountains and terrain, their ingrained hatred for the Latin invaders, shall, through our unity and renewal, converge into a mighty torrent rushing towards the Adriatic Sea."
DD_ERO_recover_events.8.a:0 "The gateway to the Adriatic stands open before us!"

DD_ERO_recover_events.9.t:0 "The Submission of Albania"
DD_ERO_recover_events.9.d:0 "Since the beginning of the 13th century, Albanians, invited or hired by Latin or native lords, had migrated to Thessaly, Attica, and even the Peloponnese. The rulers of Epirus had recruited armies composed of Albanians to participate in their eastern campaigns. After a period of integration, both the descendants of those Albanians who had moved south and those who still lived in the Dyrrachium region under Imperial rule were drawn to the Empire's stability and security. They converted to the true faith and, through cohabitation with the Greek populace, constructed a national identity as subjects of [This.GetName]. These industrious and simple Arvanites, as the Empire gradually recovered, would continue the traditions of their forebears, rebuilding the war-ravaged villages and farmsteads."
DD_ERO_recover_events.9.a:0 "War ravaged our homes, but also united our people."

DD_ERO_recover_events.10.t:0 "The Bulwark of Thrace"
DD_ERO_recover_events.10.d:0 "The remnants of the enemy host scattered into the distance beyond the Maritsa River. Adrianople—this fortress city commanding the throat of Thrace—had at last returned to our protection.\n\n[Root.Monarch.GetName] looked around; what met his eyes was not the peace of victory, but a wasteland repeatedly ravaged by war. The collapsed rubble of the old city mingled with the hastily assembled wooden fortifications of the Latins, revealing both its former poverty and its fragile, vulnerable past. To make this place once again a bulwark guarding Thrace, victory alone was far from sufficient.\n\nThus, [Root.Monarch.GetTitle] ordered the commencement of the most extensive construction project since the Komnenian dynasty. Heavy granite blocks were continuously transported to the walls; artisans repaired and reinforced the famous pentagonal fortress, digging a deeper and wider moat around its perimeter, enough to make any enemy army think twice. Within the city, the long-abandoned barracks were expanded and rebuilt, sufficient to accommodate the elite garrison forces from Macedonia and Epirus. Wagons came and went in an endless stream; the forge fires in the blacksmiths' quarters burned day and night, the hiss of quenching echoing through the streets.\n\nAdrianople was being reborn from a weather-beaten, dismal town that had once reluctantly served as the temporary capital of the Latin Empire, into a sturdy and prosperous new city.\n\n[Root.Monarch.GetName] stood atop the newly constructed tower, gazing southeast, as if he could already discern the faint outline of Constantinople amidst the clouds and mist. Adrianople was no longer a base for foreign powers to divide spoils, but the starting point for the Empire's northward gaze—once again becoming the anvil of the Imperial City.\n\nFrom this point forward, with this as our foundation, we shall meet and strike any foe daring to attack."
DD_ERO_recover_events.10.a:0 "Even the proudest wave shall break upon this shore."

DD_ERO_recover_events.11.t:0 "The Jewel of the Aegean"
DD_ERO_recover_events.11.d:0 "The morning bells echoed from the towers of the Hagios Demetrios, carrying across the bustling Via Egnatia to mingle with the shouts of sailors in the harbor. Thessalonica, the 'Co-Emperor's City' silenced for nearly a century under the Latin heel, was awakening from ruin and desolation.\n\nThanks to the prudent fiscal policies and protection of commerce implemented by [Root.Monarch.GetName], the once-abandoned docks were now crowded once more with merchant vessels from Crete, Cyprus, and even Genoa. Warehouses once stacked with military supplies now overflowed with grain from Thessaly, leather from Macedonia, and finely woven silks. To encourage production, [Root.Monarch.GetTitle] granted tax exemptions to artisans who had fled from the occupied territories, ensuring the city's workshops hummed with activity, the clang of hammers ringing out day and night.\n\nBeneath the formidable sea walls, the once-crumbling humble quarters had been transformed into orderly marketplaces. Greek scholars debated law and philosophy in the reopened academies, while fully armed soldiers paraded beneath the Arch of Galerius. As the first warm rays of sunlight struck the stonework of the White Tower, all knew in their hearts: the prosperity of Thessalonica was but a beginning, and the dawn of the entire Empire was near at hand."
DD_ERO_recover_events.11.a:0 "Let commerce and the arts flourish once more."

DD_ERO_recover_events.12.t:0 "The Foundation of Bithynia"
DD_ERO_recover_events.12.d:0 "Emerging from the layered mists of the Sea of Marmara, the war-scarred walls of Nicomedia once again entered the view of the Imperial army. This place was once the residence of the Emperor Diocletian, yet now it stands as the final dike preventing the flood of eastern nomads from approaching the Imperial City.\n\n[Root.Monarch.GetTitle] stood upon the broken battlements, gazing down upon this long-trampled land. Here, every stone is soaked with the blood of generations of defenders. On the distant ridges, the barbarians still lurk, watching covetously for the open road leading to Constantinople.\n\nThe recovery of Nicomedia means the Empire has regained the commanding heights of Bithynia. As long as this fortress remains in the grip of the Double-Headed Eagle, the Bosporus remains a natural, impassable moat; should this city fall again, the Imperial City would lie exposed upon a defenseless plain.\n\nTherefore, we shall reorganize the frontier forces here, gathering the most experienced garrison troops, forging Nicomedia into a true Shield of the East. Let every ambition that seeks to approach the Imperial City have its point broken against these unyielding stone walls."
DD_ERO_recover_events.12.a:0 "All who cross this boundary shall be broken."

DD_ERO_recover_events.13.t:0 "The Gateway to the Black Sea"
DD_ERO_recover_events.13.d:0 "In the fourth century, Constantine the Great resolved to choose the eternal seat for New Rome, laying the foundations of Constantinople on the shores of the Bosporus. For nearly a millennium thereafter, generations of emperors meticulously planned upon this God-given city, making it the heart of the world and a beacon of the faith.\n\nYet the Empire's dominion did not end at the Golden Horn. Along the northern coast of Anatolia, the waves of the Black Sea crash against the rugged walls of Trebizond. This fortress, clinging to the mountains and the sea, was since antiquity the Empire's gateway to the Caucasus and the steppes, a meeting place for silk, spices, and warhorses. In 1204, when Constantinople fell to the Latins, Trebizond did not escape its fate. As the years passed, the beacon fires along the Black Sea coast rose and fell in succession. Turkish beyliks and pagan tribes vied for its harbors and mountain passes, leaving this city isolated from the Empire.\n\nNow, with the Imperial battle standards once again appearing on the Black Sea horizon, Trebizond has finally returned to Rome. The rusted chains in the harbor have been removed, and the banner of the Double-Headed Eagle flies once more above its gates. Embraced by the mountains, the sea wind carries the sound of bells, as if proclaiming—the exile is over, legitimacy is restored. Trebizond is no longer a city of remnants isolated upon a promontory, but will become a beacon upon the Empire's eastern maritime frontier. From this day forth, the Black Sea shall once again witness the wake of the Roman fleet, and the Imperial trumpet shall echo once more through the mountain passes."
DD_ERO_recover_events.13.a:0 "The pearl on the Black Sea, the gateway to the East!"

DD_ERO_recover_events.14.t:0 "Restoration of Antioch"
DD_ERO_recover_events.14.d:0 "Antioch on the Orontes was founded by Seleucus I. In classical antiquity, it was the most important central city of the Near East, standing alongside Rome and Alexandria. As a strategic hub connecting Syria with Mesopotamia, Antioch was a center of administration, trade, and learning since the Roman Imperial period, and also one of the five great patriarchates of Orthodox Christianity.\n\nYet, over the past several centuries, this city has been repeatedly ravaged by violent earthquakes and warfare. The illegal occupation by the Latins and prolonged border conflicts caused its population to dwindle drastically, and numerous magnificent public buildings were reduced to ruins. The former patriarchal cathedral fell silent for many years, and its walls gradually crumbled due to neglect.\n\nWith the Imperial forces reasserting control over this place, the restoration of Antioch has been designated as the foremost priority for the Eastern provinces. We shall undertake a comprehensive repair of the damaged urban defense system, reorganize the navigational functions of the Orontes River, and formally restore the legitimate status of the Patriarchate of Antioch within the sacred order."
DD_ERO_recover_events.14.a:0 "We have returned."

DD_ERO_recover_events.15.t:0 "Master of the Holy City"
DD_ERO_recover_events.15.d:0 "Jerusalem lies at the heart of the Judean highlands, a city of unique religious and legal status in the Mediterranean world. Ever since Constantine the Great and his mother Helena established its standing as a holy site, this city has been a central pillar of the Empire's theocratic authority. As one of the five great patriarchates of Orthodoxy, Jerusalem is not only the ultimate pilgrimage destination for believers worldwide, but also the cornerstone of the Empire's legitimacy, proclaiming its divine mandate as God's vicar on Earth.\n\nSince the fall of the Holy City in the seventh century, although generations of emperors repeatedly sought to reassert sovereignty through diplomacy or military means, for hundreds of years it remained under the control of either pagans or Latin heretics. Frequent changes of regime and religious conflicts led to repeated damage to the ancient water systems and sacred complexes within the city, and the once-unified ecclesiastical order was fragmented.\n\nWith the Empire formally taking control of the Damascus Gate, Jerusalem has, in a legal sense, been reintegrated into the sequence of Roman provinces. We shall immediately commence the restoration of the Church of the Holy Sepulchre and the surrounding sanctuaries, erase the traces of administrative usurpation by the Latin Church, and fully restore the jurisdiction of the Patriarch of Jerusalem over local spiritual affairs. By establishing firm dominion over the Holy City, the Empire not only completes the legal closure of its lost territories, but also unifies the faith order of the Mediterranean world from the pinnacle of theology."
DD_ERO_recover_events.15.a:0 "The sanctuaries of all cities have been restored to their place."

DD_ERO_recover_events.16.t:0 "The Name of Alexandria"
DD_ERO_recover_events.16.d:0 "Alexandria lies on the western edge of the Nile Delta, founded by Alexander the Great himself. As the largest port city of classical antiquity, it was a center of scholarship, commerce, and theology in the Mediterranean world. For centuries under Roman rule, it served as the 'Crown of the Egyptian Diocese,' not only shipping grain to the Imperial capital by sea, but also, through its vast library and community of scholars, dominating the intellectual development of Mediterranean civilization. Furthermore, it was the seat of one of the most highly regarded patriarchates among the five of Orthodoxy, whose theological debates profoundly influenced the formulation of canon law in the early Church.\n\nSince the loss of administrative control in the seventh century, this city gradually drifted from the Empire's core territories under long periods of Caliphate rule and subsequent local fragmentation. Although much of its former glory, embodied by the Lighthouse and the Library, has been lost to natural disasters and war, its strategic value as the gateway to the Nile Valley and the connector to the Red Sea trade routes has never diminished.\n\nWith the Imperial fleet re-establishing control over the waters of Pharos and occupying the city, Alexandria has formally returned to Roman dominion. We shall fully restore the tax system of the Egyptian Diocese, reorganize the port's trade capacity, and reaffirm Constantinople's protectorate over the See of Alexandria. With this as our base, the Empire will regain control of the spice routes to the East and ensure that the abundant produce of the Nile once again flows steadily to nourish every territory of the Empire."
DD_ERO_recover_events.16.a:0 "The fertile soil of Egypt shall once again feed the people of Rome."

DD_ERO_recover_events.17.t:0 "The Roman Triumph"
DD_ERO_recover_events.17.d:0 "The gold and purple banners snapped in the breeze on the Capitoline Hill, and the iron hooves of the Empire once again echoed along the stone-paved streets of Rome after so long. The great [This.Monarch.GetTitle] [Root.Monarch.GetName], with irresistible force, had reclaimed this Eternal City, lost to the Empire for so long, along with the glory and dignity that had been seized and trampled upon together with it. Yet, everything here was less fiery and passionate than imagined; the legions of [This.GetName] were greeted not with cheers and acclaim, but with wariness and examination. Rome had long grown accustomed to years lived apart from the Empire's protection and rule, and the gaze of its people was a mixture of confusion and anticipation.\n\nThe triumph celebrating the restoration of Rome proceeded as scheduled, but it was not pure celebration; it was more a magnificent declaration of Imperial authority. The commander chosen by [This.Monarch.GetTitle] raised high the battle standard embroidered with the images of the Virgin Mary and Christ, crossing the Tiber via the Milvian Bridge and advancing along the Via Flaminia. The soldiers behind him marched with steady, powerful steps, seeking to return the majesty of the New Rome on the Hellespont upon this ancient capital. The procession passed through the square of Trajan's Column. Flanked by the banners of the Double-Headed Eagle hanging along the route, they slowly crossed the enormous shadow cast by Trajan's Column upon the stone pavement in the harsh sun, silently paying the highest respects to this monument inscribed with the great deeds of the Emperor Trajan.\n\nSubsequently, the column entered the Roman Forum along the Via Sacra, this crossroads of history and power. The soldiers passed beneath the Arch of Titus, flanked by the scattered ruins of temples and the Senate house—columns and broken walls that had witnessed Rome's fall. Exquisite gold and silver vessels, recovered holy relics, and the manuscripts and sculptures once seized were all displayed before the assembled people, a solemn proclamation that these items had now returned to their rightful owners. The culmination of the triumph was the square before St. Peter's Basilica. As night fell, bells echoed beneath the dome, and torches illuminated the entire square. Bishops and clergy, holding sacred icons, welcomed the arrival of the Imperial army, sprinkling holy water as a blessing upon the soldiers and [This.Monarch.GetTitle]. The crowd gradually surged into the square, joining this celebration belonging to Rome and the Roman Empire. Musicians played ancient triumphal melodies, and the people reveled in the festive atmosphere. At this moment, Rome was no longer a distant memory or an unfamiliar name, but the most precious jewel of [This.GetName], once again set within the Empire's crown.\n\nThe reacquisition of Rome was not merely a military victory, but a spiritual homecoming. Though the city had not yet fully embraced the new order, the flame of revival had been kindled, and the state founded in its immortal name would surely continue to shine throughout the river of history."
DD_ERO_recover_events.17.a:0 "The path to restoring the ancient domains begins here..."

DD_ERO_recover_events.18.t:0 "Entry into Ravenna"
DD_ERO_recover_events.18.d:0 "Ravenna lies on the plains along the coast of the Adriatic Sea. In late antiquity, due to its advantageous defensive position, it served successively as the capital of the Western Empire and as the seat of the Imperial Exarchate of Italy. During the time of Justinian the Great, Ravenna was the political and military hub for Imperial rule over Italy. The exquisite mosaic murals preserved to this day in the Basilica of San Vitale bear witness to the era when Imperial authority deeply penetrated the Apennine peninsula, ensuring it was always regarded legally as the legitimate extension of Rome in the West.\n\nHowever, with the Lombard invasion and the subsequent centuries of domination by local powers, the administrative link between Ravenna and Constantinople was completely severed. Although the city nominally fell under various ecclesiastical and secular powers over time, its symbolic status as the representation of Imperial rule in the West was never erased.\n\nWith the Imperial army re-entering Ravenna, we have restored direct administrative control over the region. The Empire will utilize its existing coastal defenses and bureaucratic structures to re-establish Ravenna's function as an administrative center for Northern Italy. By securing this strategic stronghold, the Empire can not only effectively monitor movements in the Po Valley, but also formally proclaim to the West the comprehensive return of Roman governance."
DD_ERO_recover_events.18.a:0 "With this, we can still govern Italy."
DD_ERO_recover_events.19.t:0 "Restoration of Crete"
DD_ERO_recover_events.19.d:0 "Since ancient Greece, Crete has been the most dazzling jewel of the Aegean Sea, and a true cradle of Hellenic civilization. Legend holds that it was by slaying the Minotaur on Crete that Theseus ascended to the throne of Athens. Whoever controls Crete commands the trade of the Aegean and even the Eastern Mediterranean. For this reason, the island changed hands numerous times throughout history. During the dark ages of the early medieval period, Crete was occupied by Berber Muslim pirates for nearly one hundred and fifty years.\n\nIn 961, Nikephoros II, not yet Roman Emperor at the time, led a force of 40,000 men ashore on Crete, driving out the pirates who had entrenched themselves there for a century and a half, and successfully restored the entire island. As the heavily armored kataphraktoi slowly stepped forth from the ships' holds, they heralded the beginning of Rome's last golden age. After the Fourth Crusade, Crete was reduced to a Venetian colony. Although the local Greeks launched numerous large-scale uprisings, they could not overcome Venetian suppression. Now, after our rebuilt Imperial navy has decisively defeated the Venetian fleet, Crete is once again restored. This time, the island shall not fall into the hands of invaders again."
DD_ERO_recover_events.19.a:0 "We have regained the jewel of the Aegean."

DD_ERO_recover_events.20.t:0 "Restoration of Cyprus"
DD_ERO_recover_events.20.d:0 "Cyprus commands the strategic maritime crossroads of the Eastern Mediterranean. Since the Homeric age, it has been a land favored by Aphrodite and a brilliant manifestation of Hellenic civilization extending eastward. Legend holds that when the Apostle Barnabas consecrated this island to Christ, its eternal place within Roman Orthodoxy was foreordained.\n\nAmidst the tumultuous waves of the early medieval period, Cyprus experienced a unique era. From the seventh century onward, the purple banner of the Empire and the green banner of the Caliphate flew alternately over the island, creating a rare 'condominium' arrangement in the Mediterranean world. Taxes were divided, sovereignty was suspended. Though the island's people still spoke Greek and adhered to the Orthodox faith, Imperial authority there had indeed become as thin as the distant dawn.\n\nIn the year 965 AD, the Emperor Nikephoros II, who had just wrested Crete from the hands of pirates, did not pause in his work of restoration. His general, Niketas Chalkoutzes, leading the elite fleet, hardened by countless amphibious assaults, appeared silently on the horizon off Cyprus. That year, there were no lengthy sieges or protracted standoffs. Overawed by the might of the Imperial forces, the Arab garrisons either fled or surrendered; the 'condominium' agreement that had persisted for three centuries was torn asunder. This was the first time since the division of the Roman Empire that Cyprus had truly and completely returned to Rome's embrace. The establishment of the theme system once again made this land the most secure anchor in the Empire's Eastern Mediterranean defenses.\n\nYet this prosperity was not to last. With the Empire's decline and the surge of the Crusader tide, the island once again fell into foreign hands. Rebel scions of the Komnenian dynasty, Frankish Lusignans, Venetian merchants of Saint Mark—they trampled this land in succession like a revolving lantern, yet they could never erase the sound of the Orthodox church bells or the prayers before the tomb of Barnabas.\n\nNow, under the momentum of our successive reconquests, the Imperial navy sets sail once more. As the war banner of the Double-Headed Eagle unfurls in the wind upon the very shores where Nikephoros once landed, as our soldiers step again into the cities destroyed and rebuilt by the Saracens, Cyprus has at last ended its long exile. This is not merely the restoration of an island, but a renewed proclamation of Imperial mastery over the Eastern Mediterranean. The relics of the Apostle Barnabas seem to guide the path home, and the foam of Aphrodite's waves once again parts before the ships of Rome."
DD_ERO_recover_events.20.a:0 "A foothold for our advance into Syria."

