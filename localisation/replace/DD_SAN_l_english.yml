ERO_the_senate_reform:0 "Restore the Senate"
ERO_the_senate_reform_desc:0 "The Roman Senate continued to exist in name after the division of the Empire, carrying the weight of ancient traditions and aristocratic memory. However, under prolonged centralization and the strengthening of imperial power, its authority gradually weakened and became hollow. Now, with political ideals once again flourishing in the court and academies, reinvigorating the functions of the Senate is not only a response to classical tradition but can also infuse imperial governance with deliberation and checks and balances."
ERO_laesio_enormis_reform:0 "Doctrine of Laesio Enormis"
ERO_laesio_enormis_reform_desc:0 "The so-called 'Doctrine of Laesio Enormis' is a principle in Roman law designed to correct unjust transactions. If the price in a contract is grossly disproportionate, rendering it fundamentally unfair, the injured party can legally request its annulment or compensation. During the tumultuous transition of the Empire, many impoverished individuals transferred land and property at prices far below their value, bringing this legal principle into greater focus. By restoring this traditional doctrine, the Empire can seek balance between contract and justice, maintaining social order and property stability."
ERO_theme_system_reform:0 "Imperial Theme System"
ERO_theme_system_reform_desc:0 "The Theme System was an administrative and military structure established by Byzantium to address frontier crises. The Empire divided its territory into several themes (themata), with a strategos (military governor) overseeing both local military and civil affairs to ensure swift and sustained frontier defense. By closely integrating military command with administrative responsibility, this system not only strengthened border defense capabilities but also built a more robust mobilization structure at the local level, allowing the Empire to maintain resilience and order amidst prolonged warfare."
mechanic_ERO_Exarchate_enhence_effect_yes:2 "All §YExarchate§! subjects gain:\nInfantry Combat Ability: §G+5.0%§!\nCavalry Combat Ability: §G+5.0%§!\nArtillery Combat Ability: §G+5.0%§!"
ERO_Exarchate_vassal_enhence_modifier:0 "Refined Thematic Forces"
ERO_theme_system_reform_tooltip_effect:0 "Unlocks §MLevel 5§! Government Reform '§YImperial Theme System§!', with the following effects:"
ERO_laesio_enormis_reform_tooltip_effect:0 "Unlocks §MLevel 8§! Government Reform '§YDoctrine of Laesio Enormis§!', with the following effects:"
ERO_Universal_jurisdiction_reform_tooltip_effect:0 "Unlocks §MLevel 4§! Government Reform '§YUniversal Jurisdiction§!', with the following effects:"
ERO_Universal_jurisdiction_reform:0 "Universal Jurisdiction"
ERO_Universal_jurisdiction_reform_desc:0 "Since the time of Constantine the Great, imperial authority and ecclesiastical hierarchy have complemented each other, with the Emperor seen as the protector of the earthly Church and the guardian of order. Yet, during the years of the Empire's decline and the weakening of Patriarchal authority, this sacred duty gradually faded. Heresy ran rampant, faithful on the borders were oppressed, and holy sites were repeatedly desecrated, while the Empire failed to respond under legitimate authority.\nNow, we reaffirm the Empire's sacred mission to defend the faith: whenever the Orthodox faithful suffer persecution, whenever holy places are dishonored, the Empire may lawfully take up arms to defend the dignity of the faith and fulfill its sacred responsibility."

Eastern_Roman_system:0 "§YLocal Administration§!"
Eastern_Roman_system_short:0 "§YLocal Administration§!"
Eastern_Roman_system_full:0 "Local Administration"
ERO_holy_order1:0 "Establish Local Administrative Office"
ERO_holy_order1_desc:0 "By establishing permanent administrative offices in the province, we can dispatch clerks trained in law and finance to the local level. They will standardize local tax audits and ensure that imperial law supersedes local magnates."
ERO_holy_order2:0 "Restore Military Registration Office"
ERO_holy_order2_desc:0 "Restoring the Military Registration Office means that every eligible yeoman farmer in the area will be re-registered. By granting these soldiers an imperial stipend and providing their families with tax exemptions, we will secure their loyalty to the Empire."

