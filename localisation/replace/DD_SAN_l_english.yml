DD_ERO_Feast_of_Wolve_Pack_event.0.t:0 "The Feast of the Wolf Pack"
DD_ERO_Feast_of_Wolve_Pack_event.0.d1:0 "In the fourth century, when Constantine the Great laid the foundations of Nova Roma on the shores of the Bosporus, he perhaps already understood: the very existence of the Empire meant it would be perpetually tested and besieged from all directions. For centuries, enemies rose from the frontiers and the deserts, from the steppes and the forests, assaulting in relentless waves, each seeking to push Rome to the brink. The Persians, tenacious; the Arabs, fervent; the Franks, haughty; the Slavs, warlike; the Normans, fierce; the Latins, cunning; the Turks, swift—each believed themselves to be the terminator. Yet, the Empire endured.\n\nIn recent years, we have reclaimed lost territories, restored the walls, and rebuilt the legions, causing the fractured dominions to once again coalesce under the Imperial authority. The mountain passes of Anatolia, the plains of Thrace, the ports of the Black Sea are now linking together, forming the body of a slowly awakening giant.\n\nAnd once the giant opens its eyes, the wolves begin to stir.\n\nThe very nations that were slaying each other on battlefields yesterday now whisper together in the shadows. They may still harbor suspicions of one another, yet they have reached a consensus on one matter—if Rome completes its restoration, the old order of the world will be remeasured. Treaties will be reviewed, borders will be redrawn, and those who profited amidst the chaos of the past may face reckoning. Messengers now flit between courts and military camps. Alliances are being drafted. Swords have yet to be unsheathed, but the feast has already been laid out."
DD_ERO_Feast_of_Wolve_Pack_event.0.d2:0 "For too long, we have been immersed in the triumphs of reconquest, overlooking the quiet vows sworn by the defeated amidst the ruins. The enemy nations, once shattered by the iron hoof of the Empire, did not perish in disgrace but reshaped themselves, nurtured by hatred. Beyond our borders, a conspiracy has taken shape, aimed at dragging the Empire down. They have learned from their defeats, marshaled their forces, repaired their defenses, and gathered at the Empire's frontiers with a almost pathological unity. They are no longer content with skirmishes; they thirst for a full-scale counterattack, one capable of washing away old grievances. For them, Rome's resurgence means a threat; for us, it is merely the resurgence of unsettled accounts.\n\n[Root.Monarch.GetTitle] [Root.Monarch.GetName] stands before the map, as urgent dispatches from the borders arrive one after another. The smell of gunpowder in the air grows ever stronger—the enemy has assembled. They believe the Empire's footing is still unsteady, and that they can reclaim all that was lost.\n\nThey do not know that the Empire has been awaiting this moment as well."
DD_ERO_Feast_of_Wolve_Pack_event.0.a:0 "What they fear is precisely what they are powerless to prevent."
DD_ERO_Feast_of_Wolve_Pack_event.1.t:0 "The Anti-Roman Hegemony League"
DD_ERO_Feast_of_Wolve_Pack_event.1.d:0 "For the past hundred years and more, the Empire in the East has been regarded as a fading shadow of yesterday. Its territories were fragmented, its armies weary, its crown tarnished. We expanded our borders amidst its weakness, redrew spheres of influence, and believed the era when it held sway over kings was well and truly over. Yet, the wind is quietly shifting.\n\nThe military standards of Rome once again appear in the mountain passes of Anatolia, and the double-headed eagle emblem is hoisted anew in the ports of the Black Sea. From the borders of Thrace and Illyricum, the echo of legions marching in step can be heard. The Empire that once governed order has not perished—it is drawing breath once more.\n\nIf we allow this to continue, can we still guarantee that our own boundaries will not be remeasured? Who can be certain that treaties signed in olden days will not be declared void? What they call 'restoration'—does it truly mean reclaiming lost lands, or does it signify restoring dominion over all nations? We may quarrel among ourselves, we may have crossed swords over land and honor. Yet, in the face of a greater reality, our divisions will only see us consumed one by one. If we are to preserve our crowns and borders, we must unite before it can fully stand firm."
DD_ERO_Feast_of_Wolve_Pack_event.1.a:0 "We must unite and shatter this false Empire's delusions of grandeur."

DD_ERO_Feast_of_Wolve_Pack_event.2.t:0 "The Invitation to Counterattack"
DD_ERO_Feast_of_Wolve_Pack_event.2.d:0 "The resurgence of the Kingdom of the Greeks is no longer mere rumor. Envoys from [ero_wolve_pack_leader_target.GetName] have arrived, bearing letters stamped with the royal seal—words earnest in tone, yet edged with sharp intent. They propose a joint alliance to curb the expansion of the Eastern Empire. Some point out that the Roman legions are being rebuilt, and its legitimacy and prestige suffice to once again rally its former dominions. If we wait until it has firmly established itself, opposing it will only come at a greater cost. Now, while it is not yet fully consolidated, a united strike might secure our borders from being redrawn. Others counter that rashly joining the alliance could make us its primary target. Moreover, can standing shoulder-to-shoulder with former enemies truly be trusted? If the alliance crumbles from within, would we not be walking into a trap? The envoy awaits a reply. The wax seal on the covenant has not yet set, and the drums of war have yet to sound."
DD_ERO_Feast_of_Wolve_Pack_event.2.a:0 "We must strike, and without delay!"
DD_ERO_Feast_of_Wolve_Pack_event.2.b:0 "There is no need for us to be entangled in this."
DD_ERO_Feast_of_Wolve_Pack_event.3.t:0 "The Beacon of War Reignited"
DD_ERO_Feast_of_Wolve_Pack_event.3.d:0 "The beacon fires of war blaze once more upon the frontier. The armies of the Anti-Roman League, led by [ero_wolve_pack_leader_target.GetName], form a line along the horizon. Trade routes are blockaded, covenants are torn asunder, and old enemies now stand side-by-side. It seems the world has once again reached a consensus—Rome must not return. This is the trembling of the fearful, the frenzy of the envious, and a trial for us. Now, they have crossed the border.\n\nBut they have misjudged the gulf of reality.\n\nThe Roman Empire, once as fiercely strong as iron, trampled every ancient kingdom it beheld into dust; and like iron, it possesses an unparalleled resilience, enough to endure through the direst straits and strike back at all modern kingdoms that dare to defy it. The swords and sweat of generations have propelled the Empire back to the position it was always meant to occupy, towering high above all present-day Sovereigns of Christendom!\n\nIron untempered by the hammer is but cold ore; only fire, toil, and blood reveal its true edge. So it is with the Empire. This is the call of fate—and this is our resolve!"
DD_ERO_Feast_of_Wolve_Pack_event.3.a:0 "Shatter their delusions!"
DD_ERO_Feast_of_Wolve_Pack_event.4.t:0 "The Wolf Pack Scattered"
DD_ERO_Feast_of_Wolve_Pack_event.4.d:0 "They once drew arcs of encirclement upon the map, vowing to lock the Empire within its old boundaries. Nations allied, their military standards stood like a forest, and their oaths of mobilization shook the mountains and rivers. It was a war waged to prevent Rome's return.\n\nNow, the battlefield has rendered its verdict.\n\nThe mountain passes are held by our legions; the plains echo with the retreating footsteps of the broken enemy. The double-headed eagle banners are hoisted once more above the coastal ports. Commanders, once brimming with confidence, now flee, abandoning their armor in the mud and blood. Allies who stood together yesterday now fight for themselves, hurling recriminations at one another. One resounding victory after another—this is not merely tactical success, but the judgment of order. We have shattered not only their battle lines, but also their fantasy that 'Rome cannot be restored.'\n\nOur legions crushed their chaos with discipline, exhausted their combined forces with endurance, and pierced their battle lines with sheer will. The net of encirclement became a snare for them instead. The world once again tried to force us into the corner of history—and now, the world must once again face reality.\n\nRome has not merely survived,\nRome has won its trial."
DD_ERO_Feast_of_Wolve_Pack_event.4.a:0 "Let them relive their old dreams amidst their ruin!"

DD_ERO_Feast_of_Wolve_Pack_event.5.t:0 "The Hour of Dusk"
DD_ERO_Feast_of_Wolve_Pack_event.5.d:0 "The legions that once marched in disciplined ranks now retreat in disarray. Supply lines are severed; cities fall under siege. The Eagle standards, raised high but yesterday, have been quietly lowered after successive defeats. The war banners of the allied nations once again stand athwart the mountain passes and ports, pressing the Empire's domains back within its former borders.\n\nWe sought to answer the world's encirclement with iron and resolve, yet ultimately could not hold the line against the crushing weight. Our many enemies, though rife with mutual suspicion, achieved sufficient coordination on the battlefield. The net of encirclement was not torn asunder, but slowly drawn taut.\n\nRome has not perished, but its restoration has been forcibly interrupted. The treaties we hoped to rewrite remain in abeyance; the lands yet unretrieved remain in foreign hands. We are forced to recognize a harsh reality—the world is not yet prepared to accept the Empire's return."
DD_ERO_Feast_of_Wolve_Pack_event.5.a:0 "As long as a single ember remains, Rome shall rise again!"
# ERO_end_Feast_of_Wolve_Pack_dis_tip:0 "We must conclude this war with a peace deal that §Tasserts Roman Hegemony§! to permanently prevent the reformation of the §YAnti-Roman Hegemony League§!."
ERO_end_Feast_of_Wolve_Pack_dis_tip:0 "We must achieve §G80.0%§! war score to trigger the event '§YThe Wolf Pack Scattered§!' and permanently prevent the reformation of the §YAnti-Roman Hegemony League§!.\n"
DD_ERO_Feast_of_Wolve_Pack_event.7.t:0 "The Storm Clouds Linger"
DD_ERO_Feast_of_Wolve_Pack_event.7.d:0 "The war drums have fallen silent, and the smoke of conflict slowly dissipates. The armies along the border begin their withdrawal to camps; trade routes are reopening; the banners upon the battlements still stand against the wind. This war, waged over the fate of the Empire, did not conclude in total victory or utter ruin. The front lines swayed back and forth. Suspicions among the allies rose to the surface; attrition and exhaustion tempered their initial fervor. In the end, all parties halted, caught between weariness and caution.\n\nRome held its ground, yet could not shatter the hostility entirely. The nations contained the Empire, yet could not extinguish the possibility of its resurgence. For now, the world has returned to a semblance of balance—but it is a fragile, taut balance. The garrisons on the borders have not been disbanded. Diplomats still travel with great frequency. New alliances are brewing in the shadows. The idea of the coalition, though briefly broken, has not truly vanished.\n\nThe war is over—\nBut the doubt remains."
DD_ERO_Feast_of_Wolve_Pack_event.7.a:0 "We must remain vigilant, for the world is watching."

DD_ERO_western_recover_events.1.t:0 "The Recovery of Hispalis!"
DD_ERO_western_recover_events.1.d:0 "Hispalis was one of the principal cities of the Roman province of Baetica in Iberia. Its strategic location on the banks of the Guadalquivir River made it a vital commercial port for the Roman Empire in Spain. The Romans built its urban fortifications and magnificent public buildings, establishing it as the cultural heart of the Baetica region.\n\nWith the decline of the Roman Empire, Hispalis gradually fell into the hands of Germanic peoples and the Moors. Now, our armies have once again incorporated this city into the Imperial domain. Here, it shall be rebuilt as a center of commerce and military power in southern Iberia, securing the safety of the western Mediterranean."
DD_ERO_western_recover_events.1.a:0 "The banks of the Guadalquivir shall flourish once more!"
DD_ERO_western_recover_events.2.t:0 "The Recovery of Londinium!"
DD_ERO_western_recover_events.2.d:0 "Londinium, that great city on the banks of the Thames, has served as the gateway to Britannia since the age of the Roman Empire. The Romans laid its foundations, erecting walls, a port, and public baths, leaving an indelible mark. Yet, after the Empire withdrew from Britain, the city was not abandoned. Instead, it weathered the ensuing turmoil and gradually rose to become the heart of Britain.\n\nNow, our armies march beneath the Roman standard once more, re-entering Londinium. Though this city has attained new prosperity in the later medieval age, we shall bestow upon it a new purpose—to once again become the bridgehead for Roman rule in Britain, a trading hub connecting the island to the Imperial core. We shall restore Roman order upon the Thames, integrating Britannia once more into the great Imperial domain."
DD_ERO_western_recover_events.2.a:0 "The foundation of Britannia's revival."
DD_ERO_western_recover_events.3.t:0 "The Recovery of Lugdunum!"
DD_ERO_western_recover_events.3.d:0 "Lugdunum, the ancient capital of Gaul, was during the Roman era a center of western trade, culture, and religion, a place of great splendor. Though Imperial authority once receded after the barbarian invasions, Lugdunum did not decline. Instead, it weathered the ages, eventually becoming a prosperous and thriving commercial city in the medieval era, linking Gaul, Italy, and other parts of Europe.\n\nToday, our victorious legions re-enter Lugdunum, once again embracing this city within the Roman Empire. We shall honor and harness its existing prosperity, developing it into a powerful nexus connecting the Apennine Peninsula with Gaul, a vital pillar of the Western revival."
DD_ERO_western_recover_events.3.a:0 "The heart of Gaul shall beat once more!"

DD_ERO_western_recover_events.4.t:0 "The Recovery of Arelate!"
DD_ERO_western_recover_events.4.d:0 "Arelate, that radiant city on the banks of the Rhône, has played a vital role since the days of the Roman Empire. It was not only a trading hub for the Gallic provinces, but also a key gateway connecting the Apennine Peninsula with western Gaul. Emperor Constantine the Great once erected magnificent building complexes here, bestowing new splendor upon Arelate and making it a triple center of culture, commerce, and military power. The Empire's artists, scholars, and legions converged here, forging Arelate's golden age. Yet, with the Empire's decline and the barbarian invasions, this once-illustrious land gradually became a marginal place. Visigoths, Franks, and other barbarians all trod this ground, and the ships upon the Rhône no longer brimmed with the Empire's goods and wealth. The prosperous markets fell into ruin, the grand structures crumbled, and Arelate's brilliance was slowly buried by time.\n\nToday, our armies once again enter this city, raising high the banner of the Roman Empire. The port of Arelate shall be rebuilt as a center for the revival of Imperial trade. Goods from the Apennines, the Mediterranean, and Gaul will converge here, breathing new vitality into the Empire. At the same time, we shall strengthen Arelate's fortifications, making it once more a solid bridge between southern Gaul and the Mediterranean, guarding against any potential threat. The reconstruction of this city is not only a symbol of the Roman Empire's power, but also the starting point for revitalizing the prosperity of western Gaul. Arelate shall once again stand proudly on the banks of the Rhône, a witness to the Empire's glory."
DD_ERO_western_recover_events.4.a:0 "Let Arelate flourish once more!"
DD_ERO_western_recover_events.5.t:0 "The Recovery of Aurelianum!"
DD_ERO_western_recover_events.5.d:0 "Aurelianum, that great city named in honor of the Roman Emperor Aurelian, lies on the banks of the Loire River. Since ancient times, it has been a strategic stronghold of the Empire in the region of Gaul. During the period of Roman rule, it was not only an administrative center but also a vital part of the Empire's northern defenses, guarding the key passage leading into the territories of the northern barbarians. However, with the division and turmoil of the Roman Empire, Aurelianum changed hands many times. From the Franks to the Viking raiders, this city suffered greatly from the ravages of war. The Imperial fortifications of old gradually crumbled, its grand structures were destroyed, and the prosperity along the Loire vanished. Although the city slowly recovered some vitality during the medieval era, the light of Rome had long been buried.\n\nNow, we return to Aurelianum, raising the Imperial banner high, once again bringing the banks of the Loire back into the embrace of Rome. We shall consolidate its defenses and rebuild the city as a cornerstone of the Empire's north. Its walls shall stand anew, and legions shall be garrisoned here to guard Rome's northern frontier and repel any barbarian incursion. At the same time, we shall revive its trade, transforming the Loire into an economic artery linking Gaul, the Apennine Peninsula, and Western Europe. This is not merely the restoration of a single city; it is a declaration of Imperial power in the north. The rebuilding of Aurelianum symbolizes that Rome's glory once again echoes along the banks of the Loire, and that the Empire's north shall no longer be a land coveted by barbarians."
DD_ERO_western_recover_events.5.a:0 "The light upon the Loire shines anew!"

DD_ERO_western_recover_events.6.t:0 "The Recovery of Caesaraugusta!"
DD_ERO_western_recover_events.6.d:0 "Caesaraugusta, named in honor of the Emperor Augustus, was a vital city of the Roman Empire in the Iberian provinces. Its strategic location made it a center of trade and administration for the Empire in Iberia.\n\nWith the Empire's decline, Caesaraugusta gradually fell into the hands of barbarians and other powers. Today, we shall once again rule this great city, making it a symbol of Imperial authority in eastern Iberia."
DD_ERO_western_recover_events.6.a:0 "In the name of Augustus!"
DD_ERO_western_recover_events.7.t:0 "The Recovery of Lutetia!"
DD_ERO_western_recover_events.7.d:0 "Lutetia, that jewel upon the Seine, has been an important city of Gaul since Roman times. Roman engineers built theaters, aqueducts, and magnificent public structures here, bestowing upon the city a unique Roman imprint. In the centuries that followed, Lutetia did not decline but grew to become one of the most important metropolises in all of Western Europe, a center of art, culture, and commerce.\nWe do not enter Lutetia to bring destruction or plunder, but to reassert the sovereignty of the Roman Empire over this radiant city. The original will and order of the Romans shall be combined with the city's prosperity, making it not only the heart of Gaul but also a symbol of the Empire's Western revival. The Seine shall once again flow with the power and wealth of Rome."
DD_ERO_western_recover_events.7.a:0 "The brilliance upon the Seine!"

DD_ERO_western_recover_events.8.t:0 "The Recovery of Treveris!"
DD_ERO_western_recover_events.8.d:0 "Treveris, one of the oldest cities in the Western Empire, was once an imperial residence and a religious center. Though times have changed, the city's infrastructure and historical imprint have never been erased. It continues to stand as an important trading hub on the banks of the Moselle, enduring through turmoil and remaining unbroken.\n\nWe shall reassert Roman sovereignty, re-establishing Treveris as an administrative and religious center of the north. Here, we will restore the Empire's governing order, making it a meeting point between the barbarian world of the north and Roman civilization, providing support for the Empire's stability and expansion."
DD_ERO_western_recover_events.8.a:0 "Make Treveris great once more!"
DD_ERO_western_recover_events.9.t:0 "The Recovery of Vindobona!"
DD_ERO_western_recover_events.9.d:0 "Vindobona, that military fortress on the banks of the Danube, has been a vital pillar of the Empire's northern defenses since Roman times. Roman soldiers once stood here against countless threats from the north, and in the centuries that followed, the city gradually developed into a trading hub connecting Central Europe and the Balkans.\n\nOur reclamation of Vindobona is intended to restore its strategic value in the Empire's defensive lines. We shall strengthen its fortifications to ensure the security of the Empire's north, while also leveraging its strategic location to restore the prosperity of the Danube waterway, making this place a central hub for Central European trade and Roman governance."
DD_ERO_western_recover_events.9.a:0 "The Shield of the Danube!"
DD_ERO_western_recover_events.10.t:0 "The Recovery of Colonia Claudia Ara Agrippinensium!"
DD_ERO_western_recover_events.10.d:0 "Colonia Claudia Ara Agrippinensium, bearing the names of the Emperor Claudius and Agrippina, was a vital colony established by the Romans on the banks of the Rhine. It was not only the capital of the Germania province but also a crucial defensive stronghold on the Empire's northern frontier. Its walls stood towering, its temples were majestic, and it was a symbol of Imperial power, culture, and the Romanization of the Germanic lands.\n\nWith the decline of the Roman Empire and the collapse of the Rhine defensive line, this city suffered looting and occupation by barbarians. The Franks trod this ground, burying Rome's glory in the ruins, but the city's prosperity was not entirely extinguished. It gradually grew into an important node for northern trade, still guarding the crossing points of the Rhine. Today, our legions return to Claudia Ara Agrippinensium, once again raising high the Imperial banner. This city shall be rebuilt as Rome's forward bastion and trading center on the banks of the Rhine, guarding the northern defensive line and commanding the vital crossing points of the river. The temples and walls of old shall stand anew; Roman order shall return to the Rhine basin, making this place once again a pillar of the Empire's northern frontier.\n\nThe restoration of Colonia Claudia Ara Agrippinensium symbolizes Rome's reassertion of control over the north, once again driving the barbarians back beyond the Empire's borders."
DD_ERO_western_recover_events.10.a:0 "The radiance upon the Rhine shall shine forever!"

DD_SAN_11a_modifier: "§RThe Hour of Reckoning§!"

SAN_conquer_thessalia_title: "Return to Thessaly"
SAN_conquer_thessalia_desc: "Returning to these fertile plains is not merely to reclaim the Empire's granary, but to purge the Latin pretenders who lord over the ruins of Rome."

SAN_conquer_Epirus_title: "Epirus, Land of our Fathers" # The Foundation of Epirus
SAN_conquer_Epirus_desc: "Epirus is our cradle, and also our final bastion. Every rock must be inscribed with the sole Imperial authority, no longer permitting the selfish desires of any lord to run rampant."

SAN_pingtuosi_title: "Securing the Pindus"
SAN_pingtuosi_desc: "The chilling winds of the Pindus have witnessed past humiliations. Now, we shall build our defenses into the mountains, letting the perilous peaks become a reliable shield and eternal home for the Empire's subjects."

SAN_Dyrrhachium_title: "The Recovery of Dyrrhachium"
SAN_Dyrrhachium_desc: "The recovery of Dyrrhachium marks our reclamation of the key to the West. The scent of Italy can already be detected on the sea breeze."

SAN_Bari_title: "The Triumph of Bari"
SAN_Bari_desc: "The triumph at Bari is the strongest declaration against those traitors. We shall cross the strait and take back the lands that rightfully belong to the Romans."

SAN_great_greek_title: "Magna Graecia Hegemony" # The Hegemony of Magna Graecia
SAN_great_greek_desc: "Magna Graecia—the territories of Southern Italy, the Balkans, and the lands of the former Greek colonies in Asia Minor. We have now established our control over these regions. The era of Magna Graecia has returned!"

SAN_sardinia_title: "Tranquility of the Tyrrhenian" # The Tranquility of the Tyrrhenian Sea
SAN_sardinia_desc: "The tranquility of the Tyrrhenian Sea must not be violated. We shall purge the pirate lairs and ensure every merchant ship can sail in safety."

SAN_Sicily_title: "Fertile Sicily"
SAN_Sicily_desc: "Fertile Sicily is the Empire's treasury. We shall reclaim this land, making it once more the central hub of Mediterranean trade."

SAN_italiae_title: "Eternal City, Land of Origin" # The Primeval Land, The Eternal City
SAN_italiae_desc: "This is the primeval land, and also the Eternal City. We shall bring an end to that absurd division and let Rome once again embrace its heart."

SAN_rome_title: "Glorious Return to Italia"
SAN_rome_desc: "A glorious return to Italia, not to seek out ruins, but to rebuild order. Let Old Rome be revitalized beneath the wings of the Double-Headed Eagle."

SAN_the_only_empire_title: "§RThe One and Only Empire§!"
SAN_the_only_empire_desc: "Emperor of Emperors, Queen of Cities, we shall silence the clamor of history and usher in the sole era of Rome."

SAN_western_Emperor_title: "The Augustus of the West"
SAN_western_Emperor_desc: "There is but one Empire, and but one Emperor. Those usurpers entrenched in the West shall tremble and bow before the true Augustus."

SAN_iron_cavalry_title: "Iron Cavalry of the Empire" # The Iron Cavalry of the Empire
SAN_iron_cavalry_desc: "The Iron Cavalry of the Empire is the heavy hammer of God. When the cataphract charges, the entire world shall tremble in its wake."

SAN_Unconquered_Tagma_title: "Unconquered Tagma" # The Unconquered Tagma
SAN_Unconquered_Tagma_desc: "The Unconquered Tagma. They are the tireless slayers, the final iron gate guarding the Imperial Majesty."

SAN_authority_of_orthodox_title: "The Authority of the Church" # The Authority of the Orthodox Church
SAN_authority_of_orthodox_desc: "Since the Fourth Crusade, the authority of the Ecumenical Patriarchate of Constantinople has waned. Orthodox churches in other regions declared their autocephaly, refusing to recognize the Ecumenical Patriarch's authority. Now, with the rebirth of our Rome, the Orthodox Church shall reorganize its authority, compelling those autonomous Orthodox churches to return to the fold of the Ecumenical Patriarchate."

SAN_Pedum_Unicum_title: "The Singular Shepherd's Staff"
SAN_Pedum_Unicum_desc: "The blade may conquer the flesh, but only the shepherd's staff can guide the soul. Since God is the sole sovereign of the universe, then His agent on Earth—the Roman Emperor—must also wield singular authority. We shall reclaim the secular power scattered among feudal lords, and moreover, reclaim the sacred right of interpretation stolen by arrogant clerics. All under Heaven is the Emperor's land; all within the shores are subjects of God. We shall end a millennium of strife and division, bringing all nations and peoples under the jurisdiction of this one sacred law."

SAN_religion_vectory_title: "The Chosen Nation"
SAN_religion_vectory_desc: "The sword has been sheathed; order has been established. When you survey the realm, there are no rivals left; when you gaze up at the heavens, the divine will is manifest. We are no longer merely citizens of the Roman Empire; we are the saints of the Chosen Nation. Our laws are divine decrees; our sovereign is the reflection of the Messiah. Poverty, hunger, and injustice have been banished. The Eternal Peace (Pax Aeterna) has descended upon the world. History ends here; time loses its meaning. Behold, the tabernacle of God is with men. We are the ultimate form of the world; we are the Kingdom of God on Earth."

SAN_conquer_mission_on_start_title: "Lurking in the Shadows" # Lurking in the Shadows, Biding Time
SAN_conquer_mission_on_start_desc: "We have lurked long in the shadows of Arta, learning in silence to sharpen our claws and fangs, awaiting that opportunity capable of overturning the established order."

SAN_Eye_of_Storm_title: "The Eye of the Storm"
SAN_Eye_of_Storm_desc: "The force of a thunderbolt is often accumulated in the deepest silence. By the time the world perceives our existence, the storm will already be at its throat."

SAN_Revival_Mania_title: "The Surging Tide"
SAN_Revival_Mania_desc: "It concerns not life or death, only reckoning. This is the surging tide, consigning life to the flames, only to utterly consume the enemy."

SAN_Morea_title: "The Return of the Morea"
SAN_Morea_desc: "The return of the Morea signifies the purging of the Peloponnese. The castles of the Latins shall be torn down, serving as foundation stones to repair the Empire's walls."

SAN_dev_Athens_title: "The City of Radiant Light"
SAN_dev_Athens_desc: "Athens, that capital of light, crowned with violets, darling of the poets—you are the imperishable, brilliant bulwark of Greece."

SAN_Aegean_title: "Restoring the Islands"
SAN_Aegean_desc: "We have re-established control over the Aegean Islands. It is time to restore our island defensive line."

SAN_Dardania_title: "Advancing into Dardania"
SAN_Dardania_desc: "Advance into Dardania, consolidate the administrative heart of the Balkan hinterland, and ensure that edicts flow as smoothly as blood to the frontiers."

SAN_DaImatia_title: "Advancing into Dalmatia"
SAN_DaImatia_desc: "Advance into Dalmatia, seize those rugged coastal fortresses, and completely sever the tendrils the Westerners have stretched toward the Aegean Sea."

SAN_venetia_title: "§RThe Reckoning of Venetia§!"
SAN_venetia_desc: "March into Venetia. We shall call to account every last gold coin owed by those Venetian merchants, using their wealth to mend the Empire's damaged dignity."

SAN_Mediolanum_title: "The Return of Ravenna"
SAN_Mediolanum_desc: "The return of Ravenna signifies the end of chaos in Northern Italy. The Empire's administrative system shall once again operate here, like a precision timepiece."

SAN_Alps_title: "Crossing the Alps"
SAN_Alps_desc: "Cross the Alps. Like our ancestors, we shall look down from the heights upon those Western barbarians wandering in darkness."

SAN_Vienne_title: "Reconquest of Vienne" # The Reconquest of Vienne
SAN_Vienne_desc: "The reconquest of Vienne marks the initial restoration of our Gallic territories. The Roman law code shall once again hold sway on the banks of the Rhône."

SAN_Francia_title: "§RCrushing Francia§!"
SAN_Francia_desc: "Let us shatter the false Empire of the Franks. We shall make them understand that their so-called 'Carolingian Dream' is but a bubble before the true Rome."

SAN_Britanniae_title: "Expedition to Britannia"
SAN_Britanniae_desc: "Let us embark on an expedition to Britannia. Even at the ends of the ocean, the islanders must be made to remember the awe and order brought by the Roman legions."

SAN_iberia_title: "A New Era for Hispania"
SAN_iberia_desc: "Hispania shall welcome a new era. We shall sweep away the peninsula's warlords and establish a grand province stretching from the Atlantic to the Mediterranean."

SAN_Africa_title: "Carthage, Broken Anew"
SAN_Africa_desc: "We must completely seize control of the North African coast, shatter the kingdoms ruled by Crusaders, and once more transform the Mediterranean into a Roman lake."

SAN_military_system_title: "Reforming the Military System"
SAN_military_system_desc: "Reform the military system, abolish the corrupt old order, and establish a professional and lethal war machine that answers only to the Emperor's command."

SAN_Modernize_armament_title: "Modernizing Armaments"
SAN_Modernize_armament_desc: "Modernizing armaments means equipping our soldiers with the finest steel and gunpowder, letting the enemy's primitive shields be ground to dust before Roman technology."

SAN_Sword_of_Divine_title: "The Sword of Divine Wrath"
SAN_Sword_of_Divine_desc: "They pray for peace, but as the Lord said, He came not to bring peace, but a sword. We are that nation which wields the sword, the embodiment of God's wrath. We have had enough of forgiveness and forbearance. Now is the time to execute divine judgment. For the nations that have betrayed Rome and defiled the truth, we offer not mercy, only judgment. Where the sword points is justice; where the iron hoof treads is law."

SAN_Nation_of_Triumph_title: "The Nation of Triumph"
SAN_Nation_of_Triumph_desc: "The history of Rome is an epic of rising after every fall, but now, we have entered an era of eternal victory. Just as Christ conquered death, Rome has conquered the cyclical law of history. We no longer fear decline, for we have been reborn. This is a nation of triumph, where every war is a step towards glory, and every inch of conquered land is a sacrifice offered to God. In those final days, when the trumpets sound, only Rome shall remain standing."

SAN_Constantinople_1_title: "Contacting the Citizens"
SAN_Constantinople_1_desc: "Contact the loyal citizens through whispers in the shadows. Before the gates are opened, we must first capture the soul of this city."

SAN_Constantinople_2_title: "The Key of the Theotokos"
SAN_Constantinople_2_desc: "The Theotokos entrusts the key to the Chosen One. As the Golden Gate slowly swings open, we shall let the will of God return to its dwelling place on Earth."

SAN_Coronation_title: "§OThe Legitimate Coronation§!"
SAN_Coronation_desc: "Beneath the dome of the Hagia Sophia, the purple vestments shall no longer be the cloak of an exile, but the sole legitimate symbol of world order."

SAN_dawn_is_breaking_title: "The Eternal Night Ends"
SAN_dawn_is_breaking_desc: "The eternal night has passed. As the first rays of sunlight glance off the reconquered Golden Dome of Hagia Sophia, we ourselves have ended that accursed dark age."

SAN_glory_returns_title: "The New Dawn"
SAN_glory_returns_desc: "Glory is not a gift to be begged for, but a blood-soaked path we carved out through the eternal night. The New Dawn has arrived."

SAN_moesia_title: "Restoring Moesia"
SAN_moesia_desc: "Restore the administrative structure of Moesia, reincorporate the Danube into the Empire's administrative map, and bring long-awaited tranquility back to the northern frontier."

SAN_Illyricum_title: "The Dawn of Illyricum"
SAN_Illyricum_desc: "The flames of war in Illyricum have been extinguished. The dawn of Imperial law shall once again pierce the mists of the Adriatic Sea."

SAN_Noricum_title: "Advancing on Noricum"
SAN_Noricum_desc: "Noricum was once part of the Roman provinces. We shall re-establish order here."

SAN_Rhine_title: "Crossing the Rhine"
SAN_Rhine_desc: "The Germans delude themselves into believing the Rhine is their natural barrier, thinking they can hide behind it and remain safe. The Roman army will prove them profoundly wrong."

SAN_Labe_title: "Atoning at the Elbe"
SAN_Labe_desc: "Long ago, wicked Germans defeated the Roman army on the Elbe. Now we return, determined to atone for that disgrace and exact our revenge!"

SAN_Germania_title: "The Germania Limes"
SAN_Germania_desc: "We must establish a Germania Limes to prevent the Germans from mounting a comeback."

SAN_jerusalem_title: "Shielding Jerusalem"
SAN_jerusalem_desc: "Shielding Jerusalem is the sacred duty of the Emperor. We shall erect a sturdy shield of faith to guard this holy site of civilization."

SAN_egypt_title: "Lord of Aegyptus"
SAN_egypt_desc: "The Lord of Aegyptus is the master of life itself. The bounty of the Nile shall no longer nourish traitors, but shall sustain the Empire's restoration."

SAN_egypt2_title: "The Riches of the Nile"
SAN_egypt2_desc: "We shall set about rebuilding the war-ravaged region of Egypt, so that its grain may suffice to supply our core territories."

SAN_the_only_country_title: "The One True Roman Empire"
SAN_the_only_country_desc: "Gaze across the realm, and there are no challengers left; look down upon the masses, and only Rome stands tall."

SAN_Eternal_Empire_title: "The Land of Perpetual Day"
SAN_Eternal_Empire_desc: "The sun shall never set upon the domains of Rome, for we have transcended the past, transcended the trials of time, and shown the world the meaning of eternity. Though a thousand years may pass, Rome, like an enduring star, can once again cast the radiance of civilization upon every forgotten corner."

SAN_Storm_in_Silence_title: "The Wind Rises in Silence"
SAN_Storm_in_Silence_desc: "The wind carries the seeds of Rome, and time makes them sprout. Rome is not yet dead. From Thessaloniki, we shall rise anew and rebuild the glory of the Empire."

SAN_Realm_of_the_Rising_Light_title: "The Realm of the Rising Light"
SAN_Realm_of_the_Rising_Light_desc: "As our expansion continues, our strength is slowly being restored."

SAN_Parade_of_Return_title: "The Procession of Return"
SAN_Parade_of_Return_desc: "When the triumphant soldiers march into Hagia Sophia, it marks not only the end of war, but the eternal return of the sacred order."

SAN_conquer_Macedonia_title: "Restoring Macedonia"
SAN_conquer_Macedonia_desc: "To restore Macedonia is to recover the Empire's lost skeletal frame. Let the footsteps of Roman boots once again echo through the homeland of Alexander."

SAN_conquer_Thessaloniki_title: "Prosperous Thessaloniki"
SAN_conquer_Thessaloniki_desc: "Thessaloniki should not be merely a refuge. We shall fill its harbors once more with silk and spices, letting its radiance as the 'Second Imperial Capital' illuminate the entire Aegean Sea."

SAN_Evros_river_title: "The Evros Defensive Line"
SAN_Evros_river_desc: "The Evros River should not flow only with songs of lament. We shall forge this waterway into an impassable iron defensive line, guarding the gateway to Constantinople."

SAN_Bulgaria_title: "§RAtone for Past Humiliation§!" # Atoning for Past Humiliation§
SAN_Bulgaria_desc: "Those who once profited from the Empire's decline will finally understand that blood debts must be repaid with blood. The moment to atone for past humiliation is upon us."

SAN_Dacia_title: "Tranquilizing Dacia" # The Tranquility of Dacia
SAN_Dacia_desc: "Cross the Danube and pacify Dacia. We shall make its forests and mines serve the Roman war machine once more."

SAN_Pannonia_title: "The Frontier of Pannonia"
SAN_Pannonia_desc: "On the frontier of Pannonia, we shall draw an insurmountable line. Those who cross it shall meet their end beneath the iron hoof of Rome."

SAN_Boiohaemum_title: "Pacifying Boiohaemum"
SAN_Boiohaemum_desc: "We shall sweep away resistance in the forests of Bohemia, letting this heart of Europe beat with the pulse of Rome."

SAN_Smyrna_title: "Expanding Smyrna"
SAN_Smyrna_desc: "Expand Smyrna, making it the most brilliant port at the Empire's eastern gateway, receiving all the wealth that comes from the East."

SAN_Anatolia_title: "Advancing into Anatolia"
SAN_Anatolia_desc: "We shall follow the route of past eastern campaigns and march towards the heartland of Asia Minor."

SAN_Caucasus_title: "Embracing the Caucasus"
SAN_Caucasus_desc: "Embrace the Caucasus. We shall extend the Empire's will to the peaks of the mountains, establishing an outpost to monitor the eastern steppes."

SAN_Cilicia_title: "Marching into Cilicia"
SAN_Cilicia_desc: "March into Cilicia and seize those rugged passes. This shall become our solid springboard for penetrating deeper into the Levant."

SAN_orientis_title: "Gazing Back Upon Syria"
SAN_orientis_desc: "Gaze back upon Syria. We shall recreate the glory of our ancestors, letting the banners of Rome once again overshadow the skies of Damascus."

SAN_palaestina_title: "The Peace of Palaestina"
SAN_palaestina_desc: "Palaestina requires the peace of Rome. In the name of the one sacred authority, we shall bring an end to the endless strife upon this land."

SAN_Mesopotamia_title: "The Heart of Mesopotamia"
SAN_Mesopotamia_desc: "The heart of Mesopotamia is the crossroads of power between East and West. We shall seize this land, making the land between the two rivers submit to Rome once more."

SAN_Arab_heart_title: "§RShattering the Scimitar§!"
SAN_Arab_heart_desc: "The scimitars of the Arabs once brought shame upon the Empire. We shall shatter their scimitars and make them taste the bitterness of defeat."

SAN_persia_title: "§RAscending Over Persia§!"
SAN_persia_desc: "We shall ascend over Persia, ending a millennia of rivalry, and make the descendants of that ancient empire bow low before the Double-Headed Eagle."

SAN_warehouse_title: "The Hub of Trade"
SAN_warehouse_desc: "We shall establish a network of warehouses spanning three continents, ensuring that Rome levies tribute upon all the wealth that flows through the world."

SAN_restore_navy_title: "Restoring the Fleet"
SAN_restore_navy_desc: "We shall rebuild the vast fleets of former days, raising the banner of Rome upon every sea."

SAN_greek_fire_title: "The Fire of the Sea"
SAN_greek_fire_desc: "The Fire of the Sea is the Empire's deadliest secret. We shall let it burn upon the waters of the Bosporus, turning the sails of every invader to ash."

SAN_Our_Sea_title: "Mare Nostrum"
SAN_Our_Sea_desc: "When the last hostile sea has been swept clean, this blue domain shall become the Empire's most secure inland lake."

SAN_peaceful_country_title: "The Land of Tranquility"
SAN_peaceful_country_desc: "Under the Empire's iron-fisted governance, turmoil has become history, and peace has taken root and blossomed in every province."

SAN_conquer_thrace_title: "Advancing on Thrace"
SAN_conquer_thrace_desc: "Advance on Thrace, sweeping away the final barrier on the road to Constantinople. We shall pave the path home with the bones of our enemies."

SAN_Hadrianopolis_title: "Fortifying Adrianople"
SAN_Hadrianopolis_desc: "Adrianople is the shield of the Imperial City. Here we shall garrison our most elite tagmas, ensuring that any ambitious foe breaks their teeth upon this shield."

SAN_over_Hellespont_title: "Crossing the Hellespont"
SAN_over_Hellespont_desc: "Cross the Hellespont. The flames of vengeance shall sweep across Asia Minor. The nomadic peoples entrenched here will finally learn that their master has returned."

SAN_Nicomedia_title: "A Foothold in Nicomedia" # Establishing a Foothold in Nicomedia
SAN_Nicomedia_desc: "Establish a foothold in Nicomedia, building a solid base to support the Anatolian expedition, ensuring the unimpeded flow of logistics and resolve."

SAN_Nicaea_title: "Rebuilding Nicaea"
SAN_Nicaea_desc: "Rebuild Nicaea, not merely to commemorate those years of obscurity, but to establish a political center for governing the East."

SAN_heihai_title: "The Anatolian Campaign"
SAN_heihai_desc: "The Anatolian campaign is a thorough purge. We shall drive the enemy from every valley, restoring order to the land."

SAN_asian_title: "§RExpelling the Barbarians§!"
SAN_asian_desc: "Expel those barbarians who only know destruction. This land belongs to the Romans, who understand law and civilization, not to the hooves of plunderers."

SAN_Pontic_title: "Absorbing Pontus"
SAN_Pontic_desc: "Absorb the remnants of Pontus, forging Cherson into a sturdy nail driven into the pagan lands of the north."

SAN_Crimean_title: "Gateway to the Steppe"
SAN_Crimean_desc: "The path to the steppe now lies open. Crimea shall become our watchtower, overseeing the north."

SAN_Moscow_title: "Controlling the Rus"
SAN_Moscow_desc: "Control the Rus. We shall make the forest lords of the north understand that the source of civilization forever lies in Constantinople."

SAN_rus_title: "Establishing Authority"
SAN_rus_desc: "The conversion of the Slavs is not merely a unification of faith, but a political submission. With the unification of the Orthodox Church, we have also reshaped our own authority."

SAN_king_of_kings_title: "The Eastern King of Kings" # The King of Kings of the East
SAN_king_of_kings_desc: "The King of Kings of the East. As we rule the vast lands from Egypt to the Rus, no title in the world suffices to describe such majesty."

SAN_Prosperous_handicraft_title: "Flourishing Handicrafts"
SAN_Prosperous_handicraft_desc: "Flourishing handicrafts. We shall make the hammering of craftsmen ring louder than war drums, filling every known market with the Empire's goods."

SAN_return_to_gold_title: "Introducing New Coinage"
SAN_return_to_gold_desc: "Introduce new coinage, let pure gold coins replace all base currency, and let the credit of Rome become the standard by which all things are measured."

SAN_exquisite_craft_title: "Exquisite Craftsmanship"
SAN_exquisite_craft_desc: "Exquisite craftsmanship is the medal of civilization. We shall make the possession of a Roman artifact the ultimate aspiration of the powerful throughout the world."

SAN_prosperous_country_title: "A Prosperous Nation" # The Prosperous Nation
SAN_prosperous_country_desc: "Wealth is no longer the preserve of a few, but the solid foundation upon which this vast Empire stands, forever unassailable."

SAN_iberia0_title: "The Dawn of Hispania"
SAN_iberia0_desc: "The Christians of Hispania have waited too long for light; they are in dire need of salvation by Rome."

SAN_Kherson_title: "Returning to Cherson"
SAN_Kherson_desc: "Cherson was once our garrison on the Black Sea. Now, let us re-establish control here, preparing for further expansion."

SAN_gate_of_new_world_title: "Gateway to the New World" # The Gateway to the New World
SAN_gate_of_new_world_desc: "It is said that beyond the Pillars of Hercules lies a mysterious continent. The legendary Elysium, the promised land, must surely be there..."

SAN_towards_the_East_title: "Preeminence in the East" # Preeminent in the Eastern Lands
SAN_towards_the_East_desc: "The empires of the East may be great, but together they are not as great as our Rome. Let us overawe them with our formidable strength."

