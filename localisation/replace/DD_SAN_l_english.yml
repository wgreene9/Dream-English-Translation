desc_SAN_revenge_Corpse_Feater:0 "The plunderers of the Lagoon once dismembered the body of the Empire with their greedy charters. Now, every gold coin exacted from the hands of Venetian merchants carries the lingering warmth of justice. We shall revoke all unlawful immunities and reclaim every inch of trade sovereignty that was stolen. This reckoning will not cease until the Lagoon once again falls into silence."
desc_SAN_revenge_Pretender_Crown:0 "Those usurpers who style themselves Frankish Dukes and Latin Lords are but parasites upon the altar. Clad in stolen purple, they lord it over the bones of our ancestors. We shall eradicate these Latin tumors, both in law and in flesh, so that beneath the dome of Hagia Sophia, there will be no more mutterings from these infidels."
desc_SAN_revenge_Northern_Usurper:0 "The false emperor in Aachen has stolen the name of Rome, presuming to call himself Augustus amidst the snows of Germania. This challenge to the cosmic order must end. We shall shatter the northern counterfeit crown and tear asunder the Pope's unlawful decree. There is but one Emperor in the world, and his will is the sole truth."
desc_SAN_revenge_Border_Wolves:0 "The hoofbeats of the Turks have trampled the garden of civilization into wasteland; these nomadic carrion wolves know only destruction. We shall negotiate with the pack no longer, driving them back with steel to that desert which has never known law. Every inch of scorched earth in Anatolia shall be irrigated anew by their blood."
desc_SAN_revenge_Eternal_Rival:0 "Across a millennium of light and shadow, the banks of the Tigris have always echoed with the confrontation of two kings. As long as the fire temples of Persia still yearn to challenge the Sun of Rome, there will be no peace in the East. We shall utterly destroy that presumptuous dream of the high plateau, consigning the title 'King of Kings' forever to the dust of history."
desc_SAN_revenge_Plunder_of_Zealots:0 "They cut off the path of the faith, imprisoning the glory of the Five Patriarchates beyond the sands. This long, unlawful occupation has shamed the people of God for too long. The Roman eagle shall again soar over Jerusalem and Alexandria, reclaiming those sacred territories exiled by fanatical plunderers for centuries."
desc_SAN_revenge_Shadow_of_Backstabber:0 "The Bulgarians learned in our court how to don the imperial purple, yet turned and drove a fatal dagger into the heart of their benefactor. This betrayal, born of a kinship nurtured within the palace, is the lingering shadow in the marrow of the Empire. We shall erase those detestable traitors from within our own house, leaving nothing south of the Danube but Roman law and the lamentations of the apostates."

