l_english:

3_I_DD_iberian_almogavars:"@ARA§YIberian Almogavars§!"
3_I_DD_iberian_almogavarsDESCR:"Almogavars were militiamen, shepherds, farmers, and woodsmen who lived simple lives in their homeland, supplementing their livelihood by periodically extracting 'subsidies' from Muslim settlements. Through these raids, they accumulated considerable combat experience. Their equipment was poor; many wore no armor beyond an iron helmet, while a few wealthier individuals might add a half-chainmail shirt riddled with holes or a leather cuirass. Their typical weapons included a spear over a meter long, four or five javelins about 80 centimeters in length, a sling used for herding sheep, and a knife resembling a butcher's cleaver or a short sword for close-quarters combat. They favored fighting in loose formations of three to five men, relying on individual prowess, but could also form dense squares to confront disciplined troops or large cavalry forces."

5_I_DD_catalan_unit:"@CAT§YCatalan Crossbowmen§!"
5_I_DD_catalan_unitDESCR:"Catalan Crossbowmen were formidable elite mercenary ranged infantry of the Mediterranean world during the 13th and 14th centuries. They primarily wielded heavy steel crossbows that required a winch to draw, offering long range, high accuracy, and tremendous armor-piercing capability. They could effectively slay heavily armored foes in both boarding actions and set-piece battles. Their extraordinary reputation rested upon strict discipline and professional mercenary contracts; in combat, they often employed dense volley formations to shatter their adversaries."
5_I_DD_genonese_crossbowman:"@GEN§YGenoese Crossbowmen§!"
5_I_DD_genonese_crossbowmanDESCR:"Genoese Crossbowmen were professional mercenary ranged infantry from Italy during the 13th to 15th centuries. They were not a standing army of the Republic of Genoa but elite troops officially organized and trained by the Republic, then leased to the monarchs of Europe. Their very existence embodied the commercial and military composite power of Genoa’s maritime empire. Their core strengths lay in discipline, equipment, and tactics. They carried the finest and most powerful steel-armed crossbows of their era, requiring rigorous training to operate. On the battlefield, they typically formed dense lines, shielded by pavisiers bearing large shields, delivering devastating volleys. These crossbows possessed immense armor-piercing power, capable of penetrating knightly plate armor at effective range, posing a lethal threat to heavy cavalry. During the Century of Chaos in France, they were a favored ranged force of the French monarchs."
5_I_DD_pikeman:"Swiss Pikemen"
5_I_DD_pikemanDESCR:"Swiss Pikemen were the most formidable professional infantry in Europe from the late 14th century to the early 16th century, their rise fundamentally challenging the dominance of knights on the medieval battlefield. They were not merely spearmen but a killing machine built upon iron discipline and dense square formations.\n\nTheir core tactic involved forming tight squares with depths reaching over ten ranks, soldiers wielding pikes five to six meters long, creating a moving steel hedgehog. The front ranks leveled their pikes forward while the rear ranks angled theirs upward, forming an impenetrable forest of steel. In decisive battles such as Morgarten and Nancy, their unparalleled discipline and resilience repeatedly shattered French cavalry, proving that infantry squares could overwhelm even the finest knights head-on."


6_C_DD_franch_gendarme:"@FR2§YFrench Gendarmes§!"
6_C_DD_franch_gendarmeDESCR:"French Gendarmes were the first true national standing heavy cavalry force in Europe from the mid-15th to the 16th century. They were professional cavalrymen paid directly by the king and bound by strict discipline, replacing the chaotic and inefficient feudal levies. They were quintessential knights in full plate armor, delivering devastating massed charges in tight formations. Unlike the medieval knights who fought as individuals, the Gendarmes operated under unified command and underwent regular training, achieving high tactical coordination. They formed the core shock force that made France nearly invincible during the early Italian Wars."
6_C_DD_iberian_lanzas:"@CAS§YIberian Lancers§!"
6_C_DD_iberian_lanzasDESCR:"Iberian Lancers were the primary cavalry forces of the Christian kingdoms during the Reconquista period in the 15th century. Initially formed under the leadership of the Kingdom of Asturias to combat the Muslim states, they were professional military forces directly funded, trained, and paid by the crown or high nobility. Their core tactic was the disciplined, massed lance charge, serving as the key shock force during the Reconquista and subsequent expansion."

7_I_DD_iberian_late_almogavars:"@ARA§YReformed Iberian Almogavars§!"
7_I_DD_iberian_late_almogavarsDESCR:"As the age advanced, the Almogavars were transformed from militiamen into a regular military force. Their weapons were fully upgraded to more reliable wheellock carbines and improved arquebuses, with standardized ammunition. For close combat, they retained broadswords and daggers, but their armor was further lightened—most wore only sturdy leather armor or a cuirass to maximize mobility. Their role expanded from purely guerrilla harassment to becoming a key tactical element in formal pitched battles. In combat, they were deployed on the flanks or in front of large squares as skirmisher screens, tasked with fire reconnaissance and mobile defense."

DD_BOH_chelei: "@BOH§YWagenburg§!"
DD_BOH_cheleiDESCR: "Each Wagenburg unit typically consists of 10-20 men with corresponding armaments. Above this basic group, ten wagons form a larger tactical unit, which then scales up to formations of dozens or even hundreds of wagons at the company level. The modified wagons provide soldiers with protection against ranged weapons, while the elevated position and protective plates also effectively deter enemy melee attacks. More importantly, the formed wagon fortifications sufficiently withstand large-scale cavalry charges, ensuring that infantry of common origin with simple equipment won't be terrified into rout. The civilian soldiers will fire crossbows and firearms from inside and outside the wagons to repel enemy forces."
