BANNER_LIMIT_CULTURE:0 "$OROVINCE$ is a province of $CULTURE$ culture, therefore §OHellenic Legion§! infantry cannot be recruited here."
BANNERS_DESC:2 "Amidst endless turmoil and the shadow of foreign rule, the Empire's subjects finally realized that only native sons could truly defend this ravaged land. Thus, the Hellenic Legions – a standing army composed of pure Greek blood – were born. Their recruitment is strict and demanding, their size quite limited, yet their discipline is severe and their courage fierce. Within their ranks, the spark of restoration endures.\n§OHellenic Legions§! can only be recruited in owned provinces with §YThessalonian§! or §YGreek§! culture. The recruitment limit is determined by the development of these provinces."
