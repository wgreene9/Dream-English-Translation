BANNERS_FROM_TT:3 "§YHellenic Legion Force Limit§!\nThis is the maximum number of §OHellenic Legions§! our nation can currently have.\nHellenic Legions are recruited at the cost of increased corruption and possess higher combat prowess than regular troops.\n\nProvinces that are in a state, fully cored, and have Greek or Thessalonian culture can recruit Hellenic Legions.\n\n$NAME$ provides $AMOUNT|Y$ to the Hellenic Legion force limit, due to its development of:\n"
STATE_CORRUPTION_INC:2 "Recruiting $RAISED|Y$ §OHellenic Legion§! regiment(s) will increase corruption by $INC$.\n"
