ERO_Ecumenical_council_event.0.t:0 "Restore the Ecumenical Orthodox Church"
ERO_Ecumenical_council_event.0.d:0 "The eagle banner, symbol of the glory of the House of [Root.Monarch.Dynasty.GetName], once again flies over the Golden Horn. The long humiliation has finally been washed away. The heart of the Empire – Constantinople – is back in Orthodox hands; the supreme cathedral of the Orthodox faith – Hagia Sophia – is cleansed of the defilement of the Latin infidels.\n\nYet, what lies before [Root.Monarch.GetTitle] is not merely the reconstruction of a ruined city, but the restoration of a shattered world of faith. Centuries of turmoil and division, the usurpation and flight of the Latin Patriarchs, have left local churches governing themselves for years. Doctrinal disputes and the loss of authority have intensified, leaving the faithful disoriented. Now, the censers are lit once more beneath the dome of Hagia Sophia, and the echoes of prayer resound again through its marble halls. [Root.Monarch.GetTitle] solemnly declares before the icons and scriptures: the order of the Ecumenical Orthodox Church shall be reborn, both theologically and legally. It is time to reshape the true order of God and let faith once again become the pillar of the Empire."
ERO_Ecumenical_council_event.0.a:0 "A new era is at hand."
Restore_greek_Ecumenical_councill_tooltip:0 "Enables the §YOrthodox Church Interface§!. (Located at the bottom right of the screen)"
ERO_Ecumenical_council_event.2.t:0 "Ecumenical Council"
ERO_Ecumenical_council_event.2.d:0 "Summoned and driven by the authority of [Root.Monarch.GetTitle], the five Patriarchs have gathered once more in [ERO_council_prov.GetName]. An unprecedented Ecumenical Council is being prepared with great urgency. Centuries later, this assembly not only symbolizes the revival of ancient tradition but also heralds the redefinition of the relationship between the Empire and the Church in a new era. Chaos shall end here; integration and unity shall begin here. In discussions over the printing of the Bible, one sees how tradition and renewal intersect; in the resolution of doctrinal disputes, one seeks the original consensus of the early Church; in the adjustment of the Ecumenical Patriarch's authority, one attempts to establish a new order for future church-state relations. The outcome of this Council, whether successful or a compromise, will undoubtedly leave a profound mark on the direction of all Christendom."
ERO_Ecumenical_council_event.2.a:0 "Strengthen the authority of the Ecumenical Patriarch."
ERO_Ecumenical_council_event.2.b:0 "Spread the Word of Christ to all corners."
ERO_Ecumenical_council_event.2.c:0 "Guide the path through debate."
ERO_Ecumenical_council_event.2.e:0 "Elevate the veneration of icons."
ERO_Ecumenical_council_event.3.t:0 "Restore the Five Patriarchates"
ERO_Ecumenical_council_event.3.d:0 "The Ecumenical Church once fell into a state of gradual decline. The fierce Arab invasions and the Great Schism of 1054 left an indelible mark, making the Five Patriarchates seem consigned to historical memory. Yet, with the rise of the House of [Root.Monarch.Dynasty.GetName], these fragmented territories are converging once more. Now, the five Patriarchs may finally return to the same hall, bringing new hope for Christian unity and common endeavor."
ERO_Ecumenical_council_event.3.a:0 "Christendom shall be united."



