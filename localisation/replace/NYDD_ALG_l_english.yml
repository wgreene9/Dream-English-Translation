DD_ALG_31_t:"The Wild Rebellion of the Soul"
DD_ALG_31_d:"‘The Wild Rebellion of the Soul’ is a work by Alp Arslan, a scholar from the mysterious East of the Seljuk realm. It proposes a concept of a state that transcends religion, arguing that the perfect form of a nation can break free from religious constraints to achieve a universal realm embracing all peoples regardless of faith. This has sparked a fervor in our Republic, which champions secularism and religious coexistence. Many have come to embrace this view and hope our government will set an example. Some Latin scholars from Italy have coincidentally arrived at a similar idea, drawing upon the universalist concepts of ancient Rome, and believe our nation can boldly move toward secularization—that is, a reform granting freedom of belief to all, with no state religion."
DD_ALG_31a:"Open the Sun!"
DD_ALG_31b:"This is utterly absurd."
DD_ALG_31a_tt:"§YThis is the April Fools path!§!\n"
DD_ALG_31a_modifier:"The Wild Rebellion of the Soul"

DD_ALG_32_t:"The Ideal State"
DD_ALG_32_d:"Suspended precariously in North Africa, propped up by fragile crusading fervor and Latin settlers, the Kingdom of Africa has finally succumbed to the combined onslaught of countless uprisings from its people, irresolvable internal contradictions, and deepening decay. The glory of the Crusades is gone, never to return. The zeal of holy war and the obsession of the Latin warriors have long since faded with the passage of time. We have already drawn a clear line between ourselves and the obstinate ministers and warriors of the kingdom; we will not pitifully mistake the fire and chaos born of that old fanaticism for glory. We have cast off the corrupt monarchy and stand firm in our honorable republican traditions. We are not wallowing in degradation, but actively seeking a path to survival in this vast expanse of sand. We can win over more people of different faiths who nonetheless share our ideals and choose to join us.\n\nWe yearn for the freedom and liberation of the soul, rejecting the shackles that religion imposes on humanity. We revere God, yet we will never wield His name to commit atrocities against the innocent. We once believed in the Cross, yet we have chosen to unite with Muslims to forge a shared future.\n\nThe doom of the Crusader kingdom was foreordained. We shall be witnesses to its decline, and finally, the gravediggers who bury the cross upon its swords and armor. The embers of the kingdom shall be swallowed entirely by the endless sea of sand, vanishing along with all the suffering and sorrow it once brought to this land. A new power shall rise—a great state uniting all peoples, Christian and Muslim alike—and emerge from the desert, bringing our great ideal of unity beyond religion and ethnicity to this war-torn, benighted world, and delivering the light of hope to all who struggle to survive amid chaos."
DD_ALG_32a:"That gate of truth and light shall at last be opened by those who believe in God and yearn for freedom."
# Effect: Enact Tier 1 Reform Algerian Republic -2 Unrest -5 Separatism, +20 Manpower, +2 Diplomatic Reputation, Unlock Secularization Ability. At 100 progress: +3 Tolerance of Heathens, +3 Maximum Tolerance of Heathens, -20% Technology Cost, -20% Idea Cost, -20% Development Cost.
# Converting provinces -5 Secularization Progress. Negative Tolerance of Heathens: -1 progress per month. Negative Stability: -1 progress per month. Positive Unrest: -2 progress per month.
# Hiring Theologian: +0.25 progress per month. Positive Tolerance of Heathens: +0.5 progress per month. Stability above +2: +0.5 progress per month. Completing Humanist Ideas: +1 progress per month.
DD_ALG_33_t:"The Hour of Dawn"
DD_ALG_33_d:"Whenever the sun sets, when dusk arrives and the long night descends into dreams; whenever the bitter struggle between Crusaders and Muslims dyes the yellow sands a crimson hue, reducing sparse villages and cities to ruin and rubble—the people always hope that tomorrow will come as promised. The two warring sides scheme to utterly annihilate one another, while the innocent masses wonder whether they will live to see the dawn, struggling to survive through the interminable night.\n\nEmbers still smolder, the blood has not yet dried. Death's shadow reaches out across the land, tainting every grain of sand with the stench of calamity and suffering. Even the great cities within the kingdom are not spared. After all, its citizens never know when the dreaded banner of the True Word might appear in their streets, when a Muslim soldier's scimitar might slice across their neck—a moment, and the head falls, eyes staring sightless into eternity.\n\nWhat is peace? What is justice? The two entrenched powers in the Maghreb seem to agree on the answer to both: only the complete destruction of the other will bring true peace; only the utter defeat of the infidel will deliver true justice. They have contested and fought for so long that even their sharpened blades have grown notched, and the convictions of both sides have worn and wavered like those damaged weapons.\n\nWe shall end their strife. We shall end the centuries-old cycle of conquest and subjugation, oppression and resistance, death and chaos—that hopeless spiral. The corrupt and brutal kingdom has perished utterly. The fierce and zealous Muslim warriors, too, have relinquished their thoughts of jihad under our conciliation. Perhaps to outsiders, the establishment of a realm where Christians and Muslims coexist seems the purest fantasy. Yet we have already taken the first steps toward that dream."
DD_ALG_33a:"Step out from the darkness, stride toward the light, until the hour of dawn arrives, until the sun rises and the flames of war recede into the distance."
DD_ALG_33a_modifier2:"Calming Turmoil"
desc_DD_ALG_33a_modifier2:"Hope lies in lasting peace."
DD_ALG_33a_modifier:"Uncharted Territory"
desc_DD_ALG_33a_modifier:"Dawn is approaching. Look outward."

DD_ALG_34_t:"Dispelling the Shadows"
DD_ALG_34_d:"Iberia may be an even more turbulent and benighted land than our own homeland of the Maghreb. From the Arab conquest, to the fragmentation of the Taifa kingdoms, the rise of the Reconquista in the north, the invasions of the Berbers from the south—wave upon wave of holy war shattered the Iberian people's longing for peace, and destroyed much of the legacy of Al-Andalus's golden age, leaving the former jewel of Europe dimmed and shrouded in dust.\n\nThus has Iberia lingered amidst the ashes, awaiting unification and division time and again—whether in the Christian kingdoms of the north or the Muslim taifas of the south. Their faiths differ, their cultures diverge, yet the history they have traversed is so strikingly similar: a powerful ruler unites the region, only for his descendants to unleash waves of civil war, tearing the realm apart through courtly intrigue and blood feuds. And for this very reason, Christians and Muslims have remained locked in stalemate for centuries, unable to vanquish one another, yet unwilling to abandon the enmity born of religious fervor and ancestral grudges—a struggle unto death.\n\nThrough a combination of military might and diplomatic maneuvering, we have come to rule over all of Iberia, dispelling the shadows of war that have long shrouded its skies. Both the Muslim taifas and the Christian princes have submitted to us, paying homage and reverence. Though geographically we stand at the starting point of the Arab and Berber invaders of centuries past, we bring not a new wave of bloody conquest, but the precious gift of peace. The many peoples of Iberia shall prosper and flourish under the rule of our great secular republic."
DD_ALG_34a:"The curse and shadow that long hung over the skies of Iberia have at last been scattered by us."

DD_ALG_35_t:"Hayreddin Barbarossa"
DD_ALG_35_d:"Hızır Reis—a semi-legendary pirate of Turkish origin, a Muslim naval commander known to Europeans as ‘Barbarossa.’ In his early years, he and his two brothers engaged in piracy across the Mediterranean. Later, he participated in an uprising against the Crusaders in Africa, and after its failure, was forced to flee to the Mediterranean islands. For repeatedly defeating and plundering Crusader vessels in naval engagements, he was granted the name ‘Hayreddin’—meaning ‘the virtue of trust’—by a sultan he had once served. The Balearic Islands, Sicily, Crete, and even Cyprus all bear the mark of this legendary pirate and the tales passed down of his exploits.\n\nAfter we reorganized our navy, Hayreddin suddenly appeared in the towns of Algiers, offering his services to our fleet and vowing to build a navy that would outshine all the nations of Europe. We accepted his proposal, trusting that under the command of this legendary pirate, the Algerian navy would become unrivalled, unmatched by any before or after."
DD_ALG_35a:"Let us appoint him as Grand Admiral!"
DD_ALG_35a_modifier:"King of Pirates"
desc_DD_ALG_35a_modifier:"Go on, that elder brother who sails the seas as a pirate."

DD_ALG_36_t:"The Lighthouse Shines Ever Bright"
DD_ALG_36_d:"Since our Republic rose and stood firm in the world, the Catholic Church seated in Rome has always regarded us as a thorn in its side. Our very existence offers other Catholic nations a path to harmony and prosperity that does not require adherence to the principle of holy war or the reconciliation with infidels—a path the Church and the Pope could never accept nor acknowledge. We were branded heretics from the very beginning, the Pope ceaselessly cursing the false Catholics of the southern lands who had made peace with Muslims. In the Catholic world, we have been met with hostility at every turn, until this very day.\n\nThrough overwhelming military force, we have conquered Rome. A mixed army of Muslims and Catholics now marches through this city of marble. The once-arrogant bishops have gone into hiding, praying not to be discovered by the troops, while the hapless Pope has been dragged out and paraded through the streets. And for a time, the alleys and squares of Rome have filled with citizens railing against the corruption and depravity of the Church.\n\nAt last, we are able to spread the secular ideals of equality and freedom to the heart of Christendom—ideals the people here have longed for and now welcome with open arms. No more the absolute authority of the Pope, no more the Church bleeding the faithful dry."
DD_ALG_36a:"We have always believed in ourselves. That has never changed."
DD_ALG_36a_tt:"By enlightening the faithful, no nation will suffer penalties for §Yoccupying Rome§! or §Yvassalizing the Papal State§!.\n"
DD_ALG_36a_modifier:"Reconciliation with Catholicism"
desc_DD_ALG_36a_modifier:"Catholics, you need no longer put your faith in Rome."
# Effect: Rome gains province modifier "Reconciliation with Catholicism" with effects: +2 Tolerance of Heathens, +2 Tolerance of Heretics, +2 Maximum Tolerance of Heathens. Gain half of the Papal treasury's gold. Gain permanent claims on the Italy region.

DD_ALG_37_t:"The Universal State"
DD_ALG_37_d:"In this age where religious fanaticism reigns supreme, our great Republic stands like an unquenchable, ever-brilliant star in the night sky, illuminating those corners that the sun's light cannot reach during the day. We believe in God, and in the name of His mercy, we proclaim peace and justice to the world. The power we wield has repeatedly proven that a state untainted by divisions of faith or ethnicity can become a mighty and unbreakable whole. Different beliefs are not inherently irreconcilable. Rooted in secular ideals, we have drawn countless warriors who share our vision to fight for the Republic, to bring hope to lands ravaged by war, to kindle the candle of freedom in this benighted, dark age, until it becomes a raging, unstoppable inferno.\n\nThe wars in the West are nearly at an end. Yet in the distant East, there still exist countless peoples plunged into despair by conflict and corrupt rule. It is our duty to go forth and deliver them from endless suffering and bondage, to liberate them from their chains."
DD_ALG_37a:"So long as the night endures, we shall remain those shimmering stars, scattering the darkness and lighting the world."
DD_ALG_37a_tt:"Thank you for playing @ALG§Y[Root.GetName]§! §MApril Fools Path§!!\n"
DD_ALG_37a_modifier:"Embers in the Long Night"
desc_DD_ALG_37a_modifier:"Though the night may be endless, there are always stars to dispel the darkness."
# Effect: Gain 50 permanent power projection, gain 100 Secularization progress, gain permanent claims on Anatolia, Persia, and the Levant, unlock cosmetic name "The Universal State"

DD_ALG_38_t:"The End of Divine Wrath"
DD_ALG_38_d:"Jerusalem—the holy city of the Abrahamic faiths, bearing millennia of strife. Countless believers have rushed forward, one after another, for Jerusalem. The blood of adherents from three religions has stained the Jordan River red. This land, once prophesied as a land of milk and honey, has become a realm of desolation and death. Let this be the end. War and slaughter bring neither holiness nor redemption; they leave only endless hatred and a scarred, barren wasteland. We shall establish a new demonstration zone in Jerusalem, where there shall be no distinction of friend or foe by faith, where people may live together in harmony and happiness. Sincerely and fervently, we welcome all to come. Jerusalem shall at last be worthy of her name—the City of Peace—bringing to her people a life of security and prosperity."
DD_ALG_38a:"The suffering of the Jordan shall flow no more; the fires of divine wrath shall burn to ash. After this, there shall be no more strife."
DD_ALG_38a_tt:"The great project ‘§YHoly City of Jerusalem§!’ no longer grants §Ymissionary strength§! or §Ymissionaries§!. Instead, each level provides:\n[tolerance_of_heathens_capacity]: §G+1.00§!\n[tolerance_heathen]: §G+1.00§!\n"
DD_ALG_38a_tt2:"§RSuch a bold move will displease all §YAbrahamic§! nations!§!\n"
DD_ALG_38a_modifier:"Embers of Divine Fire"
desc_DD_ALG_38a_modifier:"Rest in peace, O God!"
DD_ALG_secure_control_peace_modifier:"Control, Protect, Peace"
desc_DD_ALG_secure_control_peace_modifier:"We control. We protect. We bring peace."
DD_ALG_39_t:"Change the Country Name?"
DD_ALG_39_d:"Though we have not yet reached the heights of a certain empire, our people have already proclaimed that enough is enough—without a resounding name, how can we make our uniqueness and incomparability shine?"
DD_ALG_39a:"Adopt a more resounding name."
DD_ALG_39b:"Keep things as they are."
DD_ALG_39NAME:"The Universal State"
DD_ALG_39NAME_ADJ:"Universal State"

estate_semu:"Semu"
NYDD_ALG_noreligous_reform:"Universal Belief"
NYDD_ALG_noreligous_reform_desc:"Born from the Seljuk scholar Alp Arslan’s work ‘The Wild Rebellion of the Soul,’ our people have come to believe that even with different religions, humanity can live together in happiness. The book employs a term from the mysterious East, ‘Semu,’ meaning ‘people of varied hues and appearances,’ to describe all believers. This resonant name was quickly embraced and widely spread."
DD_estate_dhimmi_ALG_freedom:"State Without a State Religion"
DD_estate_dhimmi_ALG_freedom_desc:"Do not misunderstand. Our country does not lack faith; it simply has no fixed state religion. Every person enjoys equal treatment. We are certainly not the atheists some claim us to be.\n"

NYDD_ALG_heart_betrayer_title:"Rebellion of the Soul" # The Wild Rebellion of the Soul
NYDD_ALG_heart_betrayer_desc:"Recently, a strange and mysterious book has been circulating within our borders…"
NYDD_ALG_iberia_peace_title:"Extinguishing the Embers"
NYDD_ALG_iberia_peace_desc:"Warriors of Iberia, you need no longer sacrifice yourselves to your wars. The cycle of cause and consequence shall find its rest; the shadows shall be dispelled; peace shall come."
DD_ALG_34a_modifier:"Cycle Unending, Civilization Unceasing"
desc_DD_ALG_34a_modifier:"You know full well that all of this is but a play on repeat."
DD_ALG_34a_modifier2:"A History Book of Monsters"
desc_DD_ALG_34a_modifier2:"Perhaps, in the future, someone will find a way to solve it."
NYDD_ALG_unite_magreb_title:"Dawn of a New Sun"
NYDD_ALG_unite_magreb_desc:"Once upon a time, the Maghreb was merely an extension of war. From the great Arab invasions to the Crusader conquests, this land has never seemed to escape the fate of strife. Now, the hour of dawn has come. The sun rises, and the flames of war recede into the distance."
NYDD_ALG_universe_empire_title:"Farewell to Yesterday" # Farewell to Yesterday, Toward Tomorrow
NYDD_ALG_universe_empire_desc:"Someone must remain in the past. Let us stride toward the future."
NYDD_ALG_italy_title:"Lighthouse of Freedom"
NYDD_ALG_italy_desc:"The Roman Curia in Italy has never seen eye to eye with us, dismissing our ideals as naive and impossible. If there is no sun, let us plant our banner in Rome and become a lighthouse for all, illuminating the path ahead."
NYDD_ALG_italy_ttt:"No §YChristian§! country has a land force limit §Mgrea§!er than ours"
NYDD_ALG_jerusalem_title:"The Ideal Land"
NYDD_ALG_jerusalem_desc:"They said our dreams could never be realized. Now they watch in fear and trembling as the new master takes hold of the Holy Land. Yet we have not come for war—we have come for peace."

NYDD_ALG_humanity_title:"Altruism"
NYDD_ALG_humanity_desc:"Some may ask: what do we seek, throwing ourselves so fervently into the cause of a pluralistic society? Indeed, what do we seek? It is nothing other than altruism—placing the interests of others, even of entire nations, before one’s own. When others suffer, we suffer too, and cannot look away. This pure ethic has shaped us, moved us. This is the true meaning of the Wild Rebellion of the Soul: to betray oneself, to betray God."
NYDD_ALG_humanity_modifier:"Altruism"
desc_NYDD_ALG_humanity_modifier:"An ethic that places the interests of others above one's own."
NYDD_ALG_humanity_tt:"When acquiring §Ynew provinces§!, for every §G+2.00§! tolerance of heathens, the province loses §G-5.0%§! local autonomy and §G-5§! years of separatism. Up to §G-25.0%§! local autonomy and §G-25§! years of separatism can be lost in this way.\n"